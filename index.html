<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>зҙ…жңҲиЁҲз®—еЎҫ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;900&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --crimson:#9B1B30;--crimson-dk:#6D0F20;--crimson-lt:#C84054;
  --gold:#C9972C;--gold-lt:#F0C060;
  --ink:#1A1410;--paper:#F9F4ED;--paper-dk:#EDE5D8;
  --stone:#8A7F74;--stone-lt:#C4BAB0;--white:#FFFFFF;
  --shadow:rgba(26,20,16,.18);--r:8px;
}
html,body,#root{height:100%;width:100%;font-family:'Noto Sans JP',sans-serif;background:var(--paper);color:var(--ink);}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--paper-dk);}::-webkit-scrollbar-thumb{background:var(--stone-lt);border-radius:3px;}
.mono{font-family:'DM Mono',monospace;}.serif{font-family:'Noto Serif JP',serif;}
.app{min-height:100vh;display:flex;flex-direction:column;}

/* Header */
.header{background:var(--crimson-dk);color:var(--paper);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px var(--shadow);}
.header-logo{display:flex;align-items:center;gap:10px;font-family:'Noto Serif JP',serif;font-size:18px;font-weight:900;letter-spacing:.05em;cursor:pointer;user-select:none;}
.header-logo .moon{width:28px;height:28px;background:var(--gold);border-radius:50%;position:relative;overflow:hidden;flex-shrink:0;}
.header-logo .moon::after{content:'';position:absolute;top:3px;left:8px;width:22px;height:22px;background:var(--crimson-dk);border-radius:50%;}
.header-nav{display:flex;gap:8px;align-items:center;}
.nav-btn{padding:6px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,.35);background:transparent;color:var(--paper);font-size:13px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .18s;}
.nav-btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.6);}
.nav-btn.active{background:var(--gold);border-color:var(--gold);color:var(--ink);font-weight:700;}

/* Layout */
.main{flex:1;padding:32px 24px;max-width:1100px;margin:0 auto;width:100%;}

/* Landing */
.landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 58px);text-align:center;gap:32px;padding:40px 24px;}
.landing-title{font-family:'Noto Serif JP',serif;font-size:clamp(32px,6vw,52px);font-weight:900;color:var(--crimson-dk);letter-spacing:.08em;line-height:1.2;}
.landing-subtitle{font-size:15px;color:var(--stone);line-height:1.8;max-width:460px;}
.landing-cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;max-width:700px;}
.landing-card{flex:1;min-width:240px;max-width:300px;background:var(--white);border:2px solid var(--paper-dk);border-radius:16px;padding:28px 24px;display:flex;flex-direction:column;gap:12px;cursor:pointer;transition:all .22s cubic-bezier(.25,.8,.25,1);box-shadow:0 2px 8px var(--shadow);text-align:left;}
.landing-card:hover{border-color:var(--crimson);box-shadow:0 8px 28px rgba(155,27,48,.15);transform:translateY(-4px);}
.card-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.card-icon.teacher{background:rgba(155,27,48,.1);}.card-icon.student{background:rgba(201,151,44,.1);}
.card-label{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;color:var(--crimson-dk);}
.card-desc{font-size:13px;color:var(--stone);line-height:1.7;}
.card-cta{margin-top:8px;display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--crimson);}

/* Forms */
.form-box{background:var(--white);border:2px solid var(--paper-dk);border-radius:16px;padding:36px;max-width:480px;margin:0 auto;box-shadow:0 4px 20px var(--shadow);}
.form-title{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;color:var(--crimson-dk);margin-bottom:24px;}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
.form-label{font-size:13px;font-weight:700;color:var(--ink);}
.form-hint{font-size:12px;color:var(--stone);margin-top:2px;}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 14px;border:2px solid var(--paper-dk);border-radius:var(--r);background:var(--paper);font-family:'Noto Sans JP',sans-serif;font-size:15px;color:var(--ink);transition:border-color .15s;outline:none;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--crimson);background:var(--white);}
.form-textarea{resize:vertical;min-height:80px;}

/* Buttons */
.btn{padding:11px 24px;border-radius:8px;border:none;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:8px;white-space:nowrap;}
.btn-primary{background:var(--crimson);color:var(--white);}
.btn-primary:hover{background:var(--crimson-dk);box-shadow:0 4px 14px rgba(155,27,48,.3);}
.btn-secondary{background:transparent;border:2px solid var(--crimson);color:var(--crimson);}
.btn-secondary:hover{background:rgba(155,27,48,.06);}
.btn-gold{background:var(--gold);color:var(--ink);}.btn-gold:hover{background:var(--gold-lt);}
.btn-ghost{background:var(--paper-dk);color:var(--stone);}.btn-ghost:hover{background:var(--stone-lt);color:var(--ink);}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:6px;}
.btn-lg{padding:14px 32px;font-size:16px;border-radius:10px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-full{width:100%;justify-content:center;}
.btn-approve{background:#D1FAE5;color:#065F46;border:none;}.btn-approve:hover{background:#A7F3D0;}
.btn-reject{background:#FEE2E2;color:#991B1B;border:none;}.btn-reject:hover{background:#FECACA;}
.btn-live{background:#7C3AED;color:white;}.btn-live:hover{background:#6D28D9;}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.03em;}
.badge-published{background:#D1FAE5;color:#065F46;}
.badge-draft{background:var(--paper-dk);color:var(--stone);}
.badge-pending{background:#FEF3C7;color:#92400E;}
.badge-approved{background:#D1FAE5;color:#065F46;}
.badge-rejected{background:#FEE2E2;color:#991B1B;}
.badge-live{background:#EDE9FE;color:#5B21B6;}

/* Dashboard tabs */
.dash-tabs{display:flex;gap:0;margin-bottom:28px;border:2px solid var(--paper-dk);border-radius:12px;overflow:hidden;background:var(--paper-dk);}
.dash-tab{flex:1;padding:11px 8px;background:transparent;color:var(--stone);font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all .15s;font-family:'Noto Sans JP',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;}
.dash-tab.active{background:var(--white);color:var(--crimson);box-shadow:0 1px 4px var(--shadow);}

/* Dashboard */
.dashboard-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
.dashboard-title{font-family:'Noto Serif JP',serif;font-size:26px;font-weight:700;color:var(--crimson-dk);}
.filter-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.filter-tab{padding:7px 16px;border-radius:20px;border:2px solid var(--paper-dk);background:var(--white);font-size:13px;font-weight:700;color:var(--stone);cursor:pointer;transition:all .15s;}
.filter-tab:hover{border-color:var(--crimson-lt);color:var(--crimson);}
.filter-tab.active{background:var(--crimson);border-color:var(--crimson);color:var(--white);}

/* Task grid */
.task-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;}
.task-card{background:var(--white);border:2px solid var(--paper-dk);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:10px;transition:all .2s;box-shadow:0 1px 6px var(--shadow);}
.task-card:hover{border-color:var(--crimson-lt);box-shadow:0 4px 16px rgba(155,27,48,.12);}
.task-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.task-card-title{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:700;color:var(--ink);line-height:1.4;}
.task-card-meta{font-size:12px;color:var(--stone);}
.task-card-code{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--crimson);letter-spacing:.12em;background:rgba(155,27,48,.06);padding:6px 12px;border-radius:6px;display:inline-block;}
.task-card-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.stat-row{display:flex;gap:20px;margin-bottom:28px;flex-wrap:wrap;}
.stat-box{flex:1;min-width:120px;background:var(--white);border:2px solid var(--paper-dk);border-radius:12px;padding:18px 20px;text-align:center;}
.stat-num{font-family:'DM Mono',monospace;font-size:32px;font-weight:500;color:var(--crimson);}
.stat-label{font-size:12px;color:var(--stone);margin-top:4px;}

/* Creator */
.creator-layout{display:grid;grid-template-columns:1fr 300px;gap:24px;align-items:start;}
@media(max-width:800px){.creator-layout{grid-template-columns:1fr;}}
.canvas-wrapper{background:var(--white);border:2px solid var(--paper-dk);border-radius:14px;overflow:hidden;min-height:420px;position:relative;}
.canvas-toolbar{background:var(--paper-dk);padding:10px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;border-bottom:2px solid var(--stone-lt);}
.canvas-area{position:relative;width:100%;user-select:none;cursor:crosshair;background:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(155,27,48,.04) 27px,rgba(155,27,48,.04) 28px),repeating-linear-gradient(90deg,transparent,transparent 27px,rgba(155,27,48,.04) 27px,rgba(155,27,48,.04) 28px);}
.canvas-area img{width:100%;height:auto;display:block;pointer-events:none;}
.canvas-placeholder{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--stone-lt);padding:40px;}
.canvas-placeholder .big-icon{font-size:52px;}
.canvas-placeholder p{font-size:14px;text-align:center;line-height:1.7;}
.field-overlay{position:absolute;border:2.5px solid var(--crimson);background:rgba(155,27,48,.08);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .12s;}
.field-overlay:hover{background:rgba(155,27,48,.18);}
.field-overlay.selected{border-color:var(--gold);background:rgba(201,151,44,.15);box-shadow:0 0 0 3px rgba(201,151,44,.25);}
.field-label-chip{position:absolute;top:-12px;left:0;background:var(--crimson);color:var(--white);font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;white-space:nowrap;pointer-events:none;}
.draw-rect{position:absolute;border:2px dashed var(--crimson);background:rgba(155,27,48,.07);pointer-events:none;border-radius:4px;}
.side-panel{background:var(--white);border:2px solid var(--paper-dk);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:16px;}
.side-panel-title{font-family:'Noto Serif JP',serif;font-size:15px;font-weight:700;color:var(--crimson-dk);border-bottom:2px solid var(--paper-dk);padding-bottom:10px;}
.field-list{display:flex;flex-direction:column;gap:8px;}
.field-item{background:var(--paper);border:1.5px solid var(--paper-dk);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all .15s;}
.field-item:hover{border-color:var(--crimson-lt);}
.field-item.selected{border-color:var(--gold);background:rgba(201,151,44,.07);}
.field-item-num{width:22px;height:22px;background:var(--crimson);color:var(--white);border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.field-item-info{flex:1;min-width:0;}
.field-item-name{font-size:13px;font-weight:700;color:var(--ink);}
.field-item-type{font-size:11px;color:var(--stone);}
.type-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.type-text{background:#DBEAFE;color:#1E40AF;}.type-number{background:#F3E8FF;color:#6B21A8;}
.empty-hint{font-size:12px;color:var(--stone-lt);text-align:center;line-height:1.8;padding:8px 0;}

/* Answer sheet */
.answer-sheet-wrap{max-width:780px;margin:0 auto;display:flex;flex-direction:column;gap:20px;}
.sheet-header{background:var(--crimson-dk);color:var(--white);border-radius:14px;padding:20px 24px;display:flex;flex-direction:column;gap:4px;}
.sheet-title{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:700;}
.sheet-desc{font-size:13px;opacity:.8;}
.sheet-canvas-wrapper{background:var(--white);border:2px solid var(--paper-dk);border-radius:14px;overflow:hidden;position:relative;}
.sheet-canvas{position:relative;width:100%;}
.sheet-canvas img{width:100%;height:auto;display:block;}
.answer-input{position:absolute;background:rgba(255,255,255,.92);border:2.5px solid var(--gold);border-radius:5px;padding:4px 8px;font-family:'DM Mono',monospace;font-size:15px;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s;width:100%;height:100%;}
.answer-input:focus{border-color:var(--crimson);box-shadow:0 0 0 3px rgba(155,27,48,.15);}
.answer-input:disabled{background:rgba(235,235,235,.8);border-color:var(--stone-lt);color:var(--stone);cursor:not-allowed;}
.sheet-submit-bar{background:var(--white);border:2px solid var(--paper-dk);border-radius:14px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.sheet-progress{display:flex;flex-direction:column;gap:6px;flex:1;}
.progress-bar-bg{height:6px;border-radius:3px;background:var(--paper-dk);overflow:hidden;}
.progress-bar-fill{height:100%;background:var(--gold);border-radius:3px;transition:width .4s ease;}
.progress-text{font-size:12px;color:var(--stone);}

/* Explanation box (shown after submit) */
.explanation-box{background:var(--white);border:2px solid var(--gold);border-radius:14px;padding:24px;display:flex;flex-direction:column;gap:14px;}
.explanation-title{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:8px;}
.explanation-text{font-size:14px;line-height:1.9;color:var(--ink);white-space:pre-wrap;}
.explanation-img{width:100%;border-radius:10px;border:1.5px solid var(--paper-dk);}

/* Review table */
.review-header{display:flex;align-items:center;gap:14px;margin-bottom:24px;flex-wrap:wrap;}
.review-title{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;color:var(--crimson-dk);}
.sub-table{width:100%;border-collapse:collapse;background:var(--white);border:2px solid var(--paper-dk);border-radius:12px;overflow:hidden;box-shadow:0 2px 8px var(--shadow);}
.sub-table th,.sub-table td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--paper-dk);font-size:13px;}
.sub-table th{background:var(--paper-dk);font-weight:700;color:var(--stone);font-size:12px;text-transform:uppercase;letter-spacing:.05em;}
.sub-table tr:last-child td{border-bottom:none;}
.sub-table tr:hover td{background:rgba(155,27,48,.03);}
.answer-chip{font-family:'DM Mono',monospace;background:var(--paper-dk);padding:2px 8px;border-radius:4px;font-size:13px;color:var(--ink);margin-right:4px;display:inline-block;margin-bottom:2px;}

/* Scoring marks */
.mark-btn{width:36px;height:36px;border-radius:8px;border:2px solid var(--paper-dk);background:var(--paper);font-size:16px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;font-family:sans-serif;}
.mark-btn:hover{transform:scale(1.1);}
.mark-btn.correct.active{background:#D1FAE5;border-color:#065F46;}
.mark-btn.partial.active{background:#FEF3C7;border-color:#D97706;}
.mark-btn.wrong.active{background:#FEE2E2;border-color:#DC2626;}
.score-total{font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--crimson);}

/* Code entry */
.code-entry{max-width:380px;margin:60px auto;text-align:center;display:flex;flex-direction:column;gap:20px;}
.code-title{font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:var(--crimson-dk);}
.code-input{width:100%;text-align:center;font-family:'DM Mono',monospace;font-size:28px;font-weight:500;letter-spacing:.25em;padding:16px;border:3px solid var(--paper-dk);border-radius:12px;background:var(--white);color:var(--crimson);outline:none;transition:border-color .15s;}
.code-input:focus{border-color:var(--crimson);}

/* Whiteboard */
.wb-wrap{display:flex;flex-direction:column;gap:16px;}
.wb-toolbar{background:var(--paper-dk);border:2px solid var(--stone-lt);border-radius:12px;padding:10px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.wb-canvas{width:100%;border:2px solid var(--paper-dk);border-radius:14px;background:var(--white);cursor:crosshair;display:block;touch-action:none;}
.wb-tool-btn{width:34px;height:34px;border-radius:8px;border:2px solid var(--paper-dk);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;}
.wb-tool-btn.active{border-color:var(--crimson);background:rgba(155,27,48,.08);}
.wb-color-btn{width:24px;height:24px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .15s;}
.wb-color-btn.active{border-color:var(--ink);}
.wb-viewer{background:var(--white);border:2px solid var(--paper-dk);border-radius:14px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:#7C3AED;color:white;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;}
.live-dot{width:8px;height:8px;border-radius:50%;background:#EF4444;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(26,20,16,.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.modal{background:var(--white);border-radius:16px;padding:28px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal-wide{max-width:620px;}
.modal-title{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;color:var(--crimson-dk);margin-bottom:16px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}

/* Toast */
.toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:8px;align-items:center;}
.toast{background:var(--ink);color:var(--white);padding:11px 20px;border-radius:30px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.25);animation:toastIn .25s ease;display:flex;align-items:center;gap:8px;white-space:nowrap;}
.toast.success{background:#065F46;}.toast.error{background:var(--crimson-dk);}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Done page */
.done-page{text-align:center;padding:40px 24px;display:flex;flex-direction:column;align-items:center;gap:20px;}
.done-icon{font-size:64px;}
.done-title{font-family:'Noto Serif JP',serif;font-size:28px;font-weight:700;color:var(--crimson-dk);}
.done-sub{font-size:15px;color:var(--stone);line-height:1.8;max-width:360px;}

/* Upload */
.upload-zone{border:3px dashed var(--stone-lt);border-radius:12px;padding:36px;text-align:center;cursor:pointer;transition:all .2s;background:var(--paper);}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--crimson);background:rgba(155,27,48,.03);}
.upload-zone p{font-size:13px;color:var(--stone);margin-top:10px;line-height:1.7;}
.upload-zone .big{font-size:36px;}

/* Spinner */
.spinner{display:inline-block;width:18px;height:18px;border:3px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
.spinner.dark{border-color:rgba(155,27,48,.2);border-top-color:var(--crimson);}
@keyframes spin{to{transform:rotate(360deg)}}

/* Approval */
.approval-item{background:var(--paper);border:1.5px solid var(--paper-dk);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.approval-item-info{flex:1;min-width:0;}
.approval-item-id{font-family:'DM Mono',monospace;font-size:15px;font-weight:700;color:var(--ink);}

/* еӨүжҸӣ */
function camelTask(r) {
  return {
    id:r.id, title:r.title, description:r.description,
    imageDataUrl:r.image_data_url, accessCode:r.access_code,
    createdBy:r.created_by, createdAt:r.created_at,
    isPublished:r.is_published, answerFields:r.answer_fields||[],
    explanationText:r.explanation_text||'',
    explanationImageUrl:r.explanation_image_url||null,
  };
}
function snakeTask(t) {
  const o = {};
  if (t.id!==undefined)                o.id=t.id;
  if (t.title!==undefined)             o.title=t.title;
  if (t.description!==undefined)       o.description=t.description;
  if (t.imageDataUrl!==undefined)      o.image_data_url=t.imageDataUrl;
  if (t.accessCode!==undefined)        o.access_code=t.accessCode;
  if (t.createdBy!==undefined)         o.created_by=t.createdBy;
  if (t.isPublished!==undefined)       o.is_published=t.isPublished;
  if (t.answerFields!==undefined)      o.answer_fields=t.answerFields;
  if (t.explanationText!==undefined)   o.explanation_text=t.explanationText;
  if (t.explanationImageUrl!==undefined) o.explanation_image_url=t.explanationImageUrl;
  return o;
}
function camelSub(r) { return { id:r.id, taskId:r.task_id, nickname:r.nickname, answers:r.answers||{}, submittedAt:r.submitted_at }; }
function snakeSub(s) { return { id:s.id, task_id:s.taskId, nickname:s.nickname, answers:s.answers, submitted_at:s.submittedAt }; }

/* Utils */
let _uid = 1;
function genId() { return 'id_'+(_uid++)+'_'+Date.now(); }
function genCode() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join('');
}
function useToast() {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((msg, type='default') => {
    const id = genId();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)), 2800);
  }, []);
  return { toasts, show };
}

  return (
    <div className="config-banner">
      вҡ пёҸ <strong>SupabaseжңӘиЁӯе®ҡпјҡ</strong> <code>SUPABASE_URL</code> гҒЁ <code>SUPABASE_ANON</code> гӮ’жӣёгҒҚжҸӣгҒҲгҒҰгҒҸгҒ гҒ•гҒ„гҖӮ
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   ж•ҷеё«иӘҚиЁј
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function TeacherAuth({ onLogin, toast }) {
  const [tab, setTab] = useState('login');
  return (
    <div className="main" style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'calc(100vh - 58px)'}}>
      <div className="form-box" style={{maxWidth:460}}>
        <div style={{textAlign:'center',marginBottom:20}}><Kamon size={52}/></div>
        <ConfigBanner/>
        <div className="tab-row">
          <button className={`tab-btn ${tab==='login'?'active':''}`} onClick={()=>setTab('login')}>гғӯгӮ°гӮӨгғі</button>
          <button className={`tab-btn ${tab==='register'?'active':''}`} onClick={()=>setTab('register')}>ж–°иҰҸзҷ»йҢІз”іи«Ӣ</button>
        </div>
        {tab==='login' ? <TeacherLogin onLogin={onLogin} toast={toast}/> : <TeacherRegister onDone={()=>setTab('login')} toast={toast}/>}
      </div>
    </div>
  );
}
function TeacherLogin({ onLogin, toast }) {
  const [tid,setTid]=useState(''); const [pass,setPass]=useState(''); const [err,setErr]=useState(''); const [loading,setLoading]=useState(false);
  const handle = async () => {
    if (!tid.trim()||!pass){setErr('ж•ҷеё«IDгҒЁгғ‘гӮ№гғҜгғјгғүгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„');return;}
    setLoading(true); setErr('');
    try {
      const teacher = await DB.verifyTeacher(tid.trim(), pass);
      if (!teacher){setErr('IDгҒҫгҒҹгҒҜгғ‘гӮ№гғҜгғјгғүгҒҢйҒ•гҒ„гҒҫгҒҷ');return;}
      onLogin({ uid:teacher.id, teacherId:teacher.teacher_id, displayName:teacher.teacher_id });
    } catch(e){setErr('гӮЁгғ©гғј: '+e.message);}
    finally{setLoading(false);}
  };
  return (
    <>
      <div className="form-group"><label className="form-label">ж•ҷеё«ID</label><input className="form-input" placeholder="дҫӢ: tanaka_sensei" value={tid} onChange={e=>{setTid(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&handle()}/></div>
      <div className="form-group"><label className="form-label">гғ‘гӮ№гғҜгғјгғү</label><input className="form-input" type="password" value={pass} onChange={e=>{setPass(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&handle()}/></div>
      {err&&<div style={{color:'var(--crimson)',fontSize:13,marginBottom:12}}>{err}</div>}
      <button className="btn btn-primary btn-full btn-lg" onClick={handle} disabled={loading}>{loading?<><span className="spinner"/> гғӯгӮ°гӮӨгғідёӯвҖҰ</>:'гғӯгӮ°гӮӨгғі'}</button>
    </>
  );
}
function TeacherRegister({ onDone, toast }) {
  const [tid,setTid]=useState(''); const [pass,setPass]=useState(''); const [pass2,setPass2]=useState(''); const [err,setErr]=useState(''); const [loading,setLoading]=useState(false); const [done,setDone]=useState(false);
  const handle = async () => {
    if (!tid.trim()){setErr('ж•ҷеё«IDгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„');return;}
    if (pass.length<6){setErr('гғ‘гӮ№гғҜгғјгғүгҒҜ6ж–Үеӯ—д»ҘдёҠ');return;}
    if (pass!==pass2){setErr('гғ‘гӮ№гғҜгғјгғүгҒҢдёҖиҮҙгҒ—гҒҫгҒӣгӮ“');return;}
    setLoading(true); setErr('');
    try {
      const existing = await DB.findTeacher(tid.trim());
      if (existing){setErr('гҒ“гҒ®IDгҒҜж—ўгҒ«зҷ»йҢІгҒ•гӮҢгҒҰгҒ„гҒҫгҒҷ');setLoading(false);return;}
      await DB.createApplication({ id:genId(), teacher_id:tid.trim(), password_hash:pass, status:'pending', applied_at:new Date().toISOString() });
      setDone(true); toast.show('з”іи«ӢгӮ’йҖҒдҝЎгҒ—гҒҫгҒ—гҒҹ','success');
    } catch(e){setErr('гӮЁгғ©гғј: '+e.message);}
    finally{setLoading(false);}
  };
  if (done) return (
    <div style={{textAlign:'center',padding:'20px 0'}}>
      <div style={{fontSize:48,marginBottom:12}}>рҹ“¬</div>
      <div style={{fontFamily:'Noto Serif JP',fontSize:17,fontWeight:700,color:'var(--crimson-dk)',marginBottom:8}}>з”іи«ӢгӮ’йҖҒдҝЎгҒ—гҒҫгҒ—гҒҹ</div>
      <div style={{fontSize:13,color:'var(--stone)',lineHeight:1.8,marginBottom:20}}>ж—ўеӯҳгҒ®ж•ҷеё«е…Ёе“ЎгҒ®жүҝиӘҚеҫҢгҒ«гғӯгӮ°гӮӨгғігҒ§гҒҚгҒҫгҒҷгҖӮ<br/>пјҲж•ҷеё«гҒҢгҒ„гҒӘгҒ„е ҙеҗҲгҒҜеҚіжҷӮжүҝиӘҚпјү</div>
      <button className="btn btn-ghost btn-full" onClick={onDone}>гғӯгӮ°гӮӨгғіз”»йқўгҒё</button>
    </div>
  );
  return (
    <>
      <div className="form-group"><label className="form-label">ж•ҷеё«ID <span style={{color:'var(--crimson)'}}>*</span></label><input className="form-input" placeholder="дҫӢ: tanaka_sensei" value={tid} onChange={e=>{setTid(e.target.value);setErr('');}} maxLength={30}/><div className="form-hint">еҚҠи§’иӢұж•°еӯ—гғ»гӮўгғігғҖгғјгӮ№гӮігӮўдҪҝз”ЁеҸҜ</div></div>
      <div className="form-group"><label className="form-label">гғ‘гӮ№гғҜгғјгғү <span style={{color:'var(--crimson)'}}>*</span></label><input className="form-input" type="password" placeholder="6ж–Үеӯ—д»ҘдёҠ" value={pass} onChange={e=>{setPass(e.target.value);setErr('');}}/></div>
      <div className="form-group"><label className="form-label">гғ‘гӮ№гғҜгғјгғүпјҲзўәиӘҚпјү</label><input className="form-input" type="password" value={pass2} onChange={e=>{setPass2(e.target.value);setErr('');}}/></div>
      {err&&<div style={{color:'var(--crimson)',fontSize:13,marginBottom:12}}>{err}</div>}
      <button className="btn btn-primary btn-full btn-lg" onClick={handle} disabled={loading}>{loading?<><span className="spinner"/> з”іи«ӢдёӯвҖҰ</>:'зҷ»йҢІз”іи«ӢгҒҷгӮӢ'}</button>
    </>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   ж•ҷеё«гғҖгғғгӮ·гғҘгғңгғјгғүпјҲгӮҝгғ–д»ҳгҒҚпјү
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function TeacherDashboard({ teacher, onCreate, onEdit, onReview, toast, onLogout }) {
  const [activeTab, setActiveTab] = useState('tasks');

  return (
    <div className="main">
      <ConfigBanner/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:10}}>
        <div style={{fontFamily:'Noto Serif JP',fontSize:20,fontWeight:700,color:'var(--crimson-dk)'}}>
          рҹ‘Ө {teacher.teacherId}
        </div>
        <button className="btn btn-ghost btn-sm" style={{color:'var(--crimson)'}} onClick={onLogout}>гғӯгӮ°гӮўгӮҰгғҲ</button>
      </div>

      <div className="dash-tabs">
        <button className={`dash-tab ${activeTab==='tasks'?'active':''}`} onClick={()=>setActiveTab('tasks')}>рҹ“Ӣ иӘІйЎҢз®ЎзҗҶ</button>
        <button className={`dash-tab ${activeTab==='scoring'?'active':''}`} onClick={()=>setActiveTab('scoring')}>рҹ“қ жҺЎзӮ№</button>
        <button className={`dash-tab ${activeTab==='whiteboard'?'active':''}`} onClick={()=>setActiveTab('whiteboard')}>рҹ–Ҡ гғӣгғҜгӮӨгғҲгғңгғјгғү</button>
        <button className={`dash-tab ${activeTab==='chat'?'active':''}`} onClick={()=>setActiveTab('chat')}>рҹ’¬ гғҒгғЈгғғгғҲ</button>
      </div>

      {activeTab==='tasks'      && <TasksTab teacher={teacher} onCreate={onCreate} onEdit={onEdit} onReview={onReview} toast={toast}/>}
      {activeTab==='scoring'    && <ScoringTab teacher={teacher} toast={toast}/>}
      {activeTab==='whiteboard' && <WhiteboardTab teacher={teacher} toast={toast}/>}
      {activeTab==='chat'       && <TeacherChatTab teacher={teacher} toast={toast}/>}
    </div>
  );
}

/* в”Җв”Җ иӘІйЎҢз®ЎзҗҶгӮҝгғ– в”Җв”Җ */
function TasksTab({ teacher, onCreate, onEdit, onReview, toast }) {
  const [tasks,setTasks]=useState([]); const [loading,setLoading]=useState(true); const [subCounts,setSubCounts]=useState({}); const [filter,setFilter]=useState('all'); const [showApprovals,setShowApprovals]=useState(false); const [applications,setApplications]=useState([]); const [appVotes,setAppVotes]=useState({}); const [teachers,setTeachers]=useState([]); const [appLoading,setAppLoading]=useState(false);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const ts = await DB.getTasks(); setTasks(ts);
      const counts = {};
      await Promise.all(ts.map(async t=>{ counts[t.id]=await DB.countSubmissions(t.id); }));
      setSubCounts(counts);
    } catch(e){toast.show('гғҮгғјгӮҝеҸ–еҫ—гӮЁгғ©гғј: '+e.message,'error');}
    finally{setLoading(false);}
  },[]);
  useEffect(()=>{load();},[load]);

  const loadApprovals = async () => {
    setAppLoading(true);
    try {
      const apps = await DB.getApplications();
      const pending = apps.filter(a=>a.status==='pending');
      setApplications(pending);
      const votes = {};
      await Promise.all(pending.map(async a=>{votes[a.id]=await DB.getVotes(a.id);}));
      setAppVotes(votes);
      setTeachers(await DB.getTeachers());
    } catch(e){toast.show('еҸ–еҫ—гӮЁгғ©гғј: '+e.message,'error');}
    finally{setAppLoading(false);}
  };

  const handleVote = async (app, approve) => {
    try {
      await DB.vote(app.id, teacher.teacherId, approve);
      const updatedVotes = await DB.getVotes(app.id);
      const allTeachers  = await DB.getTeachers();
      if (updatedVotes.some(v=>!v.approve)) {
        await DB.rejectApplication(app.id);
        toast.show(`${app.teacher_id} гҒ®з”іи«ӢгӮ’еҚҙдёӢгҒ—гҒҫгҒ—гҒҹ`);
      } else if (updatedVotes.filter(v=>v.approve).length >= allTeachers.length && allTeachers.length>0) {
        await DB.approveApplication(app.id, app.teacher_id, app.password_hash);
        toast.show(`${app.teacher_id} гӮ’ж•ҷеё«гҒЁгҒ—гҒҰжүҝиӘҚгҒ—гҒҫгҒ—гҒҹпјҒ`,'success');
      } else {
        toast.show(approve?'жүҝиӘҚзҘЁгӮ’е…ҘгӮҢгҒҫгҒ—гҒҹ':'еҗҰжұәзҘЁгӮ’е…ҘгӮҢгҒҫгҒ—гҒҹ', approve?'success':'default');
      }
      loadApprovals();
    } catch(e){toast.show('гӮЁгғ©гғј: '+e.message,'error');}
  };

  const togglePublish = async (task) => {
    try {
      await DB.updateTask(task.id, {isPublished:!task.isPublished});
      toast.show(task.isPublished?'йқһе…¬й–ӢгҒ«гҒ—гҒҫгҒ—гҒҹ':'е…¬й–ӢгҒ—гҒҫгҒ—гҒҹ', task.isPublished?'default':'success');
      load();
    } catch(e){toast.show('жӣҙж–°гӮЁгғ©гғј','error');}
  };
  const deleteTask = async (task) => {
    if (!window.confirm(`гҖҢ${task.title}гҖҚгӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢпјҹ`)) return;
    try { await DB.deleteTask(task.id); toast.show('еүҠйҷӨгҒ—гҒҫгҒ—гҒҹ'); load(); } catch(e){toast.show('еүҠйҷӨгӮЁгғ©гғј','error');}
  };
  const copyCode = (code) => { navigator.clipboard?.writeText(code).catch(()=>{}); toast.show('гӮігғјгғүгӮ’гӮігғ”гғјгҒ—гҒҫгҒ—гҒҹ','success'); };

  const totalSubs = Object.values(subCounts).reduce((a,b)=>a+b,0);
  const filtered = tasks.filter(t=>filter==='published'?t.isPublished:filter==='draft'?!t.isPublished:true);

  return (
    <>
      <div className="stat-row">
        <div className="stat-box"><div className="stat-num">{tasks.length}</div><div className="stat-label">иӘІйЎҢж•°</div></div>
        <div className="stat-box"><div className="stat-num">{tasks.filter(t=>t.isPublished).length}</div><div className="stat-label">е…¬й–Ӣдёӯ</div></div>
        <div className="stat-box"><div className="stat-num">{tasks.filter(t=>!t.isPublished).length}</div><div className="stat-label">йқһе…¬й–Ӣ</div></div>
        <div className="stat-box"><div className="stat-num">{totalSubs}</div><div className="stat-label">жҸҗеҮәд»¶ж•°</div></div>
      </div>
      <div className="dashboard-header">
        <div className="dashboard-title">иӘІйЎҢдёҖиҰ§</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>{setShowApprovals(true);loadApprovals();}}>рҹ‘Ҙ ж•ҷеё«з®ЎзҗҶ</button>
          <button className="btn btn-ghost btn-sm" onClick={load} disabled={loading}>{loading?<span className="spinner dark"/>:'вҶ»'} жӣҙж–°</button>
          <button className="btn btn-primary" onClick={onCreate}>пјӢ ж–°гҒ—гҒ„иӘІйЎҢ</button>
        </div>
      </div>
      <div className="filter-tabs">
        <button className={`filter-tab ${filter==='all'?'active':''}`} onClick={()=>setFilter('all')}>гҒҷгҒ№гҒҰ ({tasks.length})</button>
        <button className={`filter-tab ${filter==='published'?'active':''}`} onClick={()=>setFilter('published')}>рҹҹў е…¬й–Ӣдёӯ ({tasks.filter(t=>t.isPublished).length})</button>
        <button className={`filter-tab ${filter==='draft'?'active':''}`} onClick={()=>setFilter('draft')}>в¬ң йқһе…¬й–Ӣ ({tasks.filter(t=>!t.isPublished).length})</button>
      </div>
      {loading ? (
        <div style={{textAlign:'center',padding:'60px 0'}}><span className="spinner dark" style={{width:32,height:32,borderWidth:4}}/></div>
      ) : filtered.length===0 ? (
        <div style={{textAlign:'center',padding:'60px 0',color:'var(--stone)'}}>
          <div style={{fontSize:48,marginBottom:12}}>рҹ“Ӣ</div>
          <div>{filter==='all'?'гҒҫгҒ иӘІйЎҢгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“':filter==='published'?'е…¬й–ӢдёӯгҒ®иӘІйЎҢгҒҜгҒӮгӮҠгҒҫгҒӣгӮ“':'йқһе…¬й–ӢгҒ®иӘІйЎҢгҒҜгҒӮгӮҠгҒҫгҒӣгӮ“'}</div>
        </div>
      ) : (
        <div className="task-grid">
          {filtered.map(task=>(
            <div key={task.id} className="task-card">
              <div className="task-card-top">
                <div className="task-card-title">{task.title}</div>
                <span className={`badge ${task.isPublished?'badge-published':'badge-draft'}`}>{task.isPublished?'е…¬й–Ӣдёӯ':'йқһе…¬й–Ӣ'}</span>
              </div>
              {task.description&&<div className="task-card-meta">{task.description}</div>}
              <div>
                <div className="text-muted" style={{fontSize:11,marginBottom:4}}>гӮўгӮҜгӮ»гӮ№гӮігғјгғү</div>
                <div className="task-card-code" style={{cursor:'pointer'}} onClick={()=>copyCode(task.accessCode)}>
                  {task.accessCode} <span style={{fontSize:11,marginLeft:8,opacity:.6}}>рҹ“Ӣ</span>
                </div>
              </div>
              {(task.explanationText||task.explanationImageUrl)&&<div style={{fontSize:11,color:'var(--gold)',fontWeight:700}}>рҹ’Ў и§ЈиӘ¬гҒӮгӮҠ</div>}
              <div className="task-card-meta">еӣһзӯ”ж¬„ {(task.answerFields||[]).length} еҖӢ гғ» жҸҗеҮә {subCounts[task.id]||0} д»¶</div>
              <div className="task-card-actions">
                <button className="btn btn-sm btn-secondary" onClick={()=>togglePublish(task)}>{task.isPublished?'йқһе…¬й–ӢгҒ«гҒҷгӮӢ':'е…¬й–ӢгҒҷгӮӢ'}</button>
                <button className="btn btn-sm btn-ghost" onClick={()=>onEdit(task)}>вңҸпёҸ з·ЁйӣҶ</button>
                <button className="btn btn-sm btn-ghost" onClick={()=>onReview(task)}>еӣһзӯ”зўәиӘҚ</button>
                <button className="btn btn-sm btn-ghost" style={{color:'var(--crimson)'}} onClick={()=>deleteTask(task)}>еүҠйҷӨ</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ж•ҷеё«з®ЎзҗҶгғўгғјгғҖгғ« */}
      {showApprovals&&(
        <div className="modal-overlay" onClick={()=>setShowApprovals(false)}>
          <div className="modal modal-wide" onClick={e=>e.stopPropagation()} style={{maxHeight:'85vh',overflowY:'auto'}}>
            <div className="modal-title">рҹ‘Ҙ ж•ҷеё«з®ЎзҗҶ</div>
            {appLoading?(<div style={{textAlign:'center',padding:'40px 0'}}><span className="spinner dark" style={{width:28,height:28,borderWidth:3}}/></div>):(
              <>
                <div style={{fontWeight:700,fontSize:14,color:'var(--crimson-dk)',marginBottom:10}}>жүҝиӘҚеҫ…гҒЎгҒ®з”іи«Ӣ ({applications.length}д»¶)</div>
                {applications.length===0?(
                  <div style={{fontSize:13,color:'var(--stone)',marginBottom:20,padding:'12px',background:'var(--paper)',borderRadius:8}}>жүҝиӘҚеҫ…гҒЎгҒ®з”іи«ӢгҒҜгҒӮгӮҠгҒҫгҒӣгӮ“</div>
                ):(
                  <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:20}}>
                    {applications.map(app=>{
                      const votes=appVotes[app.id]||[];
                      const myVote=votes.find(v=>v.teacher_id===teacher.teacherId);
                      return (
                        <div key={app.id} className="approval-item">
                          <div className="approval-item-info">
                            <div className="approval-item-id">рҹҶ” {app.teacher_id}</div>
                            <div className="approval-item-meta">з”іи«Ӣж—ҘжҷӮ: {app.applied_at?.slice(0,16).replace('T',' ')}</div>
                            <div className="approval-votes">жүҝиӘҚзҘЁ: <span className="vote-count">{votes.filter(v=>v.approve).length}</span>/{teachers.length}дәә{myVote&&<span style={{marginLeft:8,fontSize:11,color:myVote.approve?'#065F46':'#991B1B',fontWeight:700}}>{myVote.approve?'вң“жүҝиӘҚжёҲгҒҝ':'вң•еҗҰжұәжёҲгҒҝ'}</span>}</div>
                          </div>
                          {!myVote&&<div style={{display:'flex',gap:6}}><button className="btn btn-sm btn-approve" onClick={()=>handleVote(app,true)}>вң“ жүҝиӘҚ</button><button className="btn btn-sm btn-reject" onClick={()=>handleVote(app,false)}>вң• еҗҰжұә</button></div>}
                        </div>
                      );
                    })}

                    </div>

      <StudentApprovalSection teacher={teacher} toast={toast}/>
    </>
  );
}
function ScoringTab({ teacher, toast }) {
  const [tasks,setTasks]=useState([]); const [selTask,setSelTask]=useState(null); const [subs,setSubs]=useState([]); const [scorings,setScorings]=useState([]); const [config,setConfig]=useState({}); const [loading,setLoading]=useState(false); const [saving,setSaving]=useState(false);

  useEffect(()=>{
    DB.getTasks().then(setTasks).catch(e=>toast.show('еҸ–еҫ—гӮЁгғ©гғј','error'));
  },[]);

  const selectTask = async (task) => {
    setSelTask(task); setLoading(true);
    try {
      const [s, sc, cfg] = await Promise.all([DB.getSubmissions(task.id), DB.getScorings(task.id), DB.getScoringConfig(task.id)]);
      setSubs(s); setScorings(sc); setConfig(cfg);
    } catch(e){toast.show('еҸ–еҫ—гӮЁгғ©гғј: '+e.message,'error');}
    finally{setLoading(false);}
  };

  const getMark = (submissionId, fieldId) => {
    const s = scorings.find(s=>s.submission_id===submissionId&&s.field_id===fieldId);
    return s ? s.mark : null;
  };

  const setMark = async (submissionId, fieldId, mark) => {
    try {
      await DB.saveScoring(selTask.id, submissionId, fieldId, mark);
      setScorings(prev=>{
        const filtered = prev.filter(s=>!(s.submission_id===submissionId&&s.field_id===fieldId));
        return [...filtered, {submission_id:submissionId, field_id:fieldId, mark, task_id:selTask.id}];
      });
    } catch(e){toast.show('дҝқеӯҳгӮЁгғ©гғј: '+e.message,'error');}
  };

  const saveConfig = async () => {
    if (!selTask) return;
    setSaving(true);
    try { await DB.saveScoringConfig(selTask.id, config); toast.show('й…ҚзӮ№гӮ’дҝқеӯҳгҒ—гҒҫгҒ—гҒҹ','success'); }
    catch(e){toast.show('дҝқеӯҳгӮЁгғ©гғј: '+e.message,'error');}
    finally{setSaving(false);}
  };

  const calcScore = (sub) => {
    const fields = selTask.answerFields||[];
    let total=0, earned=0;
    fields.forEach(f=>{
      const pts = Number(config[f.id]||0);
      total += pts;
      const mark = getMark(sub.id, f.id);
      if (mark==='correct') earned+=pts;
      else if (mark==='partial') earned+=Math.floor(pts/2);
    });
    return {earned, total};
  };

  const markLabels = {correct:'в—Ӣ', partial:'в–і', wrong:'вң•'};
  const markColors = {correct:'#065F46', partial:'#D97706', wrong:'#DC2626'};

  if (!selTask) return (
    <div>
      <div className="dashboard-title" style={{marginBottom:20}}>жҺЎзӮ№гҒҷгӮӢиӘІйЎҢгӮ’йҒёжҠһ</div>
      {tasks.length===0?(
        <div style={{textAlign:'center',padding:'40px',color:'var(--stone)'}}>иӘІйЎҢгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“</div>
      ):(
        <div className="task-grid">
          {tasks.map(task=>(
            <div key={task.id} className="task-card" style={{cursor:'pointer'}} onClick={()=>selectTask(task)}>

              <div style={{marginTop:4}}><span className={`badge ${task.isPublished?'badge-published':'badge-draft'}`}>{task.isPublished?'е…¬й–Ӣдёӯ':'йқһе…¬й–Ӣ'}</span></div>
              <div className="task-card-meta">еӣһзӯ”ж¬„ {(task.answerFields||[]).length} еҖӢ</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );

  const fields = selTask.answerFields||[];

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20,flexWrap:'wrap'}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setSelTask(null)}>вҶҗ иӘІйЎҢдёҖиҰ§</button>
        <div className="dashboard-title">{selTask.title} вҖ” жҺЎзӮ№</div>
      </div>

      {/* й…ҚзӮ№иЁӯе®ҡ */}
      <div className="side-panel" style={{marginBottom:24}}>
        <div className="side-panel-title">вҡ–пёҸ й…ҚзӮ№иЁӯе®ҡпјҲе•ҸйЎҢгҒ”гҒЁгҒ®зӮ№ж•°пјү</div>
        <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'flex-end'}}>
          {fields.map(f=>(
            <div key={f.id} style={{display:'flex',flexDirection:'column',gap:4,minWidth:80}}>
              <label style={{fontSize:12,fontWeight:700,color:'var(--stone)'}}>{f.label}</label>
              <input className="form-input" type="number" min="0" max="100" style={{width:80,textAlign:'center',padding:'8px'}}
                value={config[f.id]||''} placeholder="0"
                onChange={e=>setConfig(c=>({...c,[f.id]:e.target.value}))}/>
            </div>
          ))}
          <button className="btn btn-gold btn-sm" onClick={saveConfig} disabled={saving}>
            {saving?<><span className="spinner dark"/> дҝқеӯҳдёӯвҖҰ</>:'рҹ’ҫ й…ҚзӮ№гӮ’дҝқеӯҳ'}
          </button>
        </div>
        <div style={{fontSize:12,color:'var(--stone)'}}>
          еҗҲиЁҲй…ҚзӮ№: {fields.reduce((s,f)=>s+Number(config[f.id]||0),0)} зӮ№гҖҖ
          в–ігҒҜй…ҚзӮ№гҒ®еҚҠеҲҶгҒЁгҒ—гҒҰиЁҲз®—гҒ•гӮҢгҒҫгҒҷ
        </div>
      </div>

      {/* жҺЎзӮ№гғҶгғјгғ–гғ« */}
      {loading?(
        <div style={{textAlign:'center',padding:'40px'}}><span className="spinner dark" style={{width:28,height:28,borderWidth:3}}/></div>
      ):subs.length===0?(
        <div style={{textAlign:'center',padding:'60px',color:'var(--stone)'}}>
          <div style={{fontSize:40,marginBottom:10}}>рҹ“ӯ</div>гҒҫгҒ жҸҗеҮәгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“
        </div>
      ):(
        <div style={{overflowX:'auto'}}>
          <table className="sub-table">
            <thead>
              <tr>
                <th>з”ҹеҫ’</th>
                <th>жҸҗеҮәж—ҘжҷӮ</th>
                {fields.map(f=>(
                  <th key={f.id}>
                    {f.label}<br/>
                    <span style={{fontWeight:400,color:'var(--stone)'}}>{config[f.id]||0}зӮ№</span>
                  </th>
                ))}
                <th>еҫ—зӮ№</th>
              </tr>
            </thead>
            <tbody>
              {subs.map(sub=>{
                const {earned,total}=calcScore(sub);
                return (
                  <tr key={sub.id}>
                    <td><strong>{sub.nickname}</strong></td>
                    <td className="mono" style={{fontSize:11}}>{sub.submittedAt?.slice(0,16).replace('T',' ')}</td>
                    {fields.map(f=>{
                      const mark=getMark(sub.id,f.id);
                      return (
                        <td key={f.id}>
                          <div style={{fontSize:11,color:'var(--stone)',marginBottom:4}}>
                            <span className="answer-chip">{sub.answers[f.id]||'вҖ”'}</span>
                          </div>
                          <div style={{display:'flex',gap:4}}>
                            {['correct','partial','wrong'].map(m=>(
                              <button key={m} className={`mark-btn ${m} ${mark===m?'active':''}`}
                                title={m==='correct'?'жӯЈи§Ј':m==='partial'?'йғЁеҲҶзӮ№':'дёҚжӯЈи§Ј'}
                                onClick={()=>setMark(sub.id,f.id,m)}>
                                {markLabels[m]}
                              </button>
                            ))}
                          </div>
                        </td>
                      );
                    })}
                    <td>
                      <span className="score-total">{earned}</span>
                      <span style={{fontSize:12,color:'var(--stone)'}}> / {total}</span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   гғӣгғҜгӮӨгғҲгғңгғјгғүпјҲSupabase Broadcastпјү
   DBгҒёгҒ®гӮ№гғҲгғӯгғјгӮҜдҝқеӯҳгҒӘгҒ—
   supabase.channel Broadcast гҒ§зӣҙйҖҒ
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function WhiteboardTab({ teacher, toast }) {
  const [tasks,setTasks]             = useState([]);
  const [isLive,setIsLive]           = useState(false);
  const [sessionCode,setSessionCode] = useState('');
  const [selTaskId,setSelTaskId]     = useState('');
  const [selTask,setSelTask]         = useState(null);
  const [showStart,setShowStart]     = useState(false);
  const [tool,setTool]               = useState('pen');
  const [color,setColor]             = useState('#1A1410');
  const [lineWidth,setLineWidth]     = useState(3);
  const [undoStack,setUndoStack]     = useState([]);
  const [students,setStudents]       = useState([]);
  const [perms,setPerms]             = useState({});
  const [permTab,setPermTab]         = useState('wb');

  /* refs вҖ“ event handlers always read latest values */
  const canvasRef    = useRef(null);
  const bgCanvasRef  = useRef(null);
  const channelRef   = useRef(null);
  const sessionIdRef = useRef(null);
  const isLiveRef    = useRef(false);
  const toolRef      = useRef('pen');
  const colorRef     = useRef('#1A1410');
  const lwRef        = useRef(3);
  const drawing      = useRef(false);
  const startPos     = useRef({x:0,y:0});
  const strokeSnap   = useRef(null);

  useEffect(()=>{ DB.getTasks().then(setTasks).catch(()=>{}); },[]);
  useEffect(()=>{ loadStudentsAndPerms(); },[]);

  const loadStudentsAndPerms = async () => {
    try {
      const studs = await DB.getStudents();
      setStudents(studs);
      const permMap = {};
      await Promise.all(studs.map(async s => {
        permMap[s.student_id] = await DB.getStudentPermissions(s.student_id);
      }));
      setPerms(permMap);
    } catch(e) {}
  };

  const togglePerm = async (studentId, type) => {
    const current = perms[studentId] || { vc_enabled: false, wb_enabled: false };
    const newVc = type === 'vc' ? !current.vc_enabled : current.vc_enabled;
    const newWb = type === 'wb' ? !current.wb_enabled : current.wb_enabled;
    try {
      await DB.setStudentPermissions(studentId, newVc, newWb);
      setPerms(p => ({ ...p, [studentId]: { ...current, vc_enabled: newVc, wb_enabled: newWb } }));
      toast.show(`${studentId} гҒ®жЁ©йҷҗгӮ’жӣҙж–°гҒ—гҒҫгҒ—гҒҹ`, 'success');
    } catch(e) { toast.show('жЁ©йҷҗжӣҙж–°гӮЁгғ©гғј: '+e.message, 'error'); }
  };

  /* sync refs */
  useEffect(()=>{ isLiveRef.current = isLive; },  [isLive]);
  useEffect(()=>{ toolRef.current   = tool; },    [tool]);
  useEffect(()=>{ colorRef.current  = color; },   [color]);
  useEffect(()=>{ lwRef.current     = lineWidth; },[lineWidth]);

  /* canvas size */
  useEffect(()=>{
    const c=canvasRef.current; if(!c)return;
    c.width=900; c.height=600;
  },[]);

  /* иӘІйЎҢйҒёжҠһ вҶ’ selTask */
  useEffect(()=>{
    if(!selTaskId){ setSelTask(null); return; }
    setSelTask(tasks.find(t=>t.id===selTaskId)||null);
  },[selTaskId,tasks]);

  /* иғҢжҷҜз”»еғҸжҸҸз”»пјҲи–„гҒҸпјүвҖ“ иғҢжҷҜе°Ӯз”ЁгӮӯгғЈгғігғҗгӮ№гҒё */
  useEffect(()=>{
    const c=canvasRef.current; if(!c)return;
    const ctx=c.getContext('2d');
    ctx.clearRect(0,0,c.width,c.height);
    if(selTask?.imageDataUrl){
      const img=new Image();
      img.onload=()=>{
        ctx.globalAlpha=0.25;
        ctx.drawImage(img,0,0,c.width,c.height);
        ctx.globalAlpha=1.0;
      };
      img.src=selTask.imageDataUrl;
    }
  },[selTask]);

  /* broadcast helper */
  const broadcast=(event,payload)=>{
    const ch=channelRef.current;
    if(!ch)return;
    ch.send({type:'broadcast',event,payload});
  };

  /* й…ҚдҝЎй–Ӣе§Ӣ */
  const startLive=async()=>{
    if(!supabase){ toast.show('SupabaseжңӘиЁӯе®ҡ','error'); return; }
    const code=genCode();
    const id=genId();
    try{
      await DB.createWbSession({id,access_code:code,task_id:selTaskId||null,is_live:true,created_by:teacher.teacherId,created_at:new Date().toISOString()});
    }catch(e){ toast.show('й…ҚдҝЎй–Ӣе§ӢгӮЁгғ©гғј: '+e.message,'error'); return; }

    sessionIdRef.current=id;

    const ch=supabase.channel('wb:'+code,{config:{broadcast:{self:false}}});
    ch.subscribe(status=>{
      if(status==='SUBSCRIBED'){
        channelRef.current=ch;
        setSessionCode(code);
        setIsLive(true);
        setShowStart(false);
        setUndoStack([]);
        toast.show('й…ҚдҝЎй–Ӣе§ӢпјҒгӮігғјгғү: '+code,'success');
      }
    });
  };

  /* й…ҚдҝЎзөӮдәҶ */
  const stopLive=async()=>{
    broadcast('end',{});
    const ch=channelRef.current;
    if(ch){ supabase.removeChannel(ch); channelRef.current=null; }
    const sid=sessionIdRef.current;
    if(sid){
      try{ await DB.clearWbStrokes(sid); await DB.endWbSession(sid); }catch(e){}
    }
    sessionIdRef.current=null;
    setIsLive(false); setSessionCode(''); setUndoStack([]);
    const c=canvasRef.current;
    if(c){ const ctx=c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height); }
    toast.show('й…ҚдҝЎгӮ’зөӮдәҶгҒ—гҒҫгҒ—гҒҹ');
  };

  /* гӮҜгғӘгӮўпјҲжҸҸз”»гғ¬гӮӨгғӨгғјгҒ®гҒҝпјү */
  const clearCanvas=()=>{
    const c=canvasRef.current; if(!c)return;
    setUndoStack(s=>[...s,c.toDataURL('image/png')]);
    const ctx=c.getContext('2d');
    ctx.clearRect(0,0,c.width,c.height);
    /* иғҢжҷҜгӮ’еҶҚжҸҸз”» */
    if(selTask?.imageDataUrl){
      const img=new Image();
      img.onload=()=>{ ctx.globalAlpha=0.25; ctx.drawImage(img,0,0,c.width,c.height); ctx.globalAlpha=1.0; broadcast('snapshot',{data:c.toDataURL('image/png')}); };
      img.src=selTask.imageDataUrl;
    } else {
      broadcast('clear',{});
    }
  };

  /* гӮ„гӮҠзӣҙгҒ— */
  const undo=()=>{
    if(!undoStack.length)return;
    const prev=undoStack[undoStack.length-1];
    setUndoStack(s=>s.slice(0,-1));
    const c=canvasRef.current; if(!c)return;
    const ctx=c.getContext('2d');
    ctx.clearRect(0,0,c.width,c.height);
    if(prev){
      const img=new Image();
      img.onload=()=>{ ctx.drawImage(img,0,0); broadcast('snapshot',{data:c.toDataURL('image/png')}); };
      img.src=prev;
    } else {
      broadcast('clear',{});
    }
  };

  /* pointer helpers */
  const getPos=(e,c)=>{
    const r=c.getBoundingClientRect();
    const sx=c.width/r.width, sy=c.height/r.height;
    const src=e.touches?e.touches[0]:e;
    return {x:(src.clientX-r.left)*sx, y:(src.clientY-r.top)*sy};
  };

  const onDown=(e)=>{
    if(!isLiveRef.current)return;
    e.preventDefault();
    const c=canvasRef.current; const ctx=c.getContext('2d');
    const pos=getPos(e,c);
    setUndoStack(s=>[...s,c.toDataURL('image/png')]);
    drawing.current=true; startPos.current=pos;
    strokeSnap.current=ctx.getImageData(0,0,c.width,c.height);
    if(toolRef.current==='pen'||toolRef.current==='eraser'){ ctx.beginPath(); ctx.moveTo(pos.x,pos.y); }
  };

  const onMove=(e)=>{
    if(!drawing.current||!isLiveRef.current)return;
    e.preventDefault();
    const c=canvasRef.current; const ctx=c.getContext('2d');
    const pos=getPos(e,c);
    ctx.lineCap='round'; ctx.lineJoin='round';

    if(toolRef.current==='eraser'){
      /* ж¶ҲгҒ—гӮҙгғ пјҡdestination-out гҒ§жҸҸз”»гғ”гӮҜгӮ»гғ«гҒ®гҒҝж¶ҲгҒҷ */
      ctx.globalCompositeOperation='destination-out';
      ctx.strokeStyle='rgba(0,0,0,1)';
      ctx.lineWidth=lwRef.current*4;
      ctx.lineTo(pos.x,pos.y); ctx.stroke();
      ctx.globalCompositeOperation='source-over';
    } else {
      ctx.strokeStyle=colorRef.current; ctx.lineWidth=lwRef.current;
      if(toolRef.current==='pen'){
        ctx.lineTo(pos.x,pos.y); ctx.stroke();
      } else {
        ctx.putImageData(strokeSnap.current,0,0);
        ctx.beginPath();
        if(toolRef.current==='line'){
          ctx.moveTo(startPos.current.x,startPos.current.y);
          ctx.lineTo(pos.x,pos.y); ctx.stroke();
        } else {
          const rx=Math.abs(pos.x-startPos.current.x)/2;
          const ry=Math.abs(pos.y-startPos.current.y)/2;
          const cx=startPos.current.x+(pos.x-startPos.current.x)/2;
          const cy=startPos.current.y+(pos.y-startPos.current.y)/2;
          ctx.ellipse(cx,cy,Math.max(1,rx),Math.max(1,ry),0,0,2*Math.PI); ctx.stroke();
        }
      }
    }
  };

  const onUp=(e)=>{
    if(!drawing.current||!isLiveRef.current)return;
    if(e.type!=='touchend') e.preventDefault();
    drawing.current=false;
    /* ж¶ҲгҒ—гӮҙгғ дҪҝз”ЁжҷӮгҒҜcompositeOperationжҲ»гҒҷ */
    const c=canvasRef.current;
    const ctx=c.getContext('2d');
    ctx.globalCompositeOperation='source-over';
    broadcast('snapshot',{data:c.toDataURL('image/png')});
  };

  const colors=['#1A1410','#9B1B30','#C9972C','#1E40AF','#065F46','#7C3AED','#FFFFFF'];

  return (
    <div className="wb-wrap">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10,marginBottom:8}}>
        <div className="dashboard-title">рҹ–Ҡ гғӣгғҜгӮӨгғҲгғңгғјгғү</div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          {isLive&&(<>
            <div className="live-badge"><span className="live-dot"/>LIVE</div>
            <div style={{fontFamily:'DM Mono',fontSize:18,fontWeight:700,color:'var(--crimson)',letterSpacing:'.1em',background:'rgba(155,27,48,.07)',padding:'4px 12px',borderRadius:8}}>{sessionCode}</div>
            <button className="btn btn-ghost btn-sm" onClick={undo} disabled={!undoStack.length}>вҶ© гӮ„гӮҠзӣҙгҒ—</button>
            <button className="btn btn-ghost btn-sm" onClick={clearCanvas}>рҹ—‘ гӮҜгғӘгӮў</button>
            <button className="btn btn-reject btn-sm" onClick={stopLive}>вҸ№ й…ҚдҝЎзөӮдәҶ</button>
          </>)}
          {!isLive&&<button className="btn btn-live" onClick={()=>setShowStart(true)}>в–¶ й…ҚдҝЎй–Ӣе§Ӣ</button>}
        </div>
      </div>

      <div className="wb-toolbar">
        <span style={{fontSize:12,fontWeight:700,color:'var(--stone)'}}>гғ„гғјгғ«пјҡ</span>

      <div style={{fontSize:12,color:'var(--stone)'}}>й…ҚдҝЎдёӯгҖҒз”ҹеҫ’гҒҢLIVEгӮігғјгғүгӮ’е…ҘеҠӣгҒҷгӮӢгҒЁгғӘгӮўгғ«гӮҝгӮӨгғ гҒ§жқҝжӣёгҒҢиҰӢгӮүгӮҢгҒҫгҒҷ</div>

                <option value="">в”Җв”Җ зҷҪзҙҷгғңгғјгғү в”Җв”Җ</option>

              <div className="form-hint">йҒёжҠһгҒ—гҒҹиӘІйЎҢгҒ®гғ—гғӘгғігғҲгҒҢи–„гҒҸиғҢжҷҜгҒ«иЎЁзӨәгҒ•гӮҢгҒҫгҒҷ</div>

              <img src={selTask.imageDataUrl} alt="гғ—гғ¬гғ“гғҘгғј"
                style={{width:'100%',borderRadius:8,border:'2px solid var(--paper-dk)',marginBottom:12,maxHeight:140,objectFit:'contain',background:'#f5f5f5'}}/>
            )}
            <div style={{background:'var(--paper)',borderRadius:10,padding:14,fontSize:13,color:'var(--stone)',lineHeight:1.8}}>
              й…ҚдҝЎгҒҷгӮӢгҒЁLIVEгӮігғјгғүгҒҢзҷәиЎҢгҒ•гӮҢгҒҫгҒҷгҖӮз”ҹеҫ’гҒҜгҒқгҒ®гӮігғјгғүгӮ’е…ҘеҠӣгҒҷгӮӢгҒЁжқҝжӣёгӮ’гғӘгӮўгғ«гӮҝгӮӨгғ гҒ§иҰ–иҒҙгҒ§гҒҚгҒҫгҒҷгҖӮ
            </div>

              <button className="btn btn-ghost" onClick={()=>setShowStart(false)}>гӮӯгғЈгғігӮ»гғ«</button>

/* в”Җв”Җ з”ҹеҫ’пјҡгғӣгғҜгӮӨгғҲгғңгғјгғүиҰ–иҒҙпјҲBroadcastзүҲпјү в”Җв”Җ */
function WhiteboardViewer({ session, nickname, onBack }) {
  const canvasRef=useRef(null);
  const [ended,setEnded]=useState(false);

  useEffect(()=>{
    if(!supabase||!session)return;
    const c=canvasRef.current; if(!c)return;
    c.width=900; c.height=600;

    /* BroadcastгғҒгғЈгғігғҚгғ«гӮ’иіјиӘӯ вҖ“ DBгҒ®ReplicationиЁӯе®ҡдёҚиҰҒ */
    const ch=supabase.channel('wb:'+session.access_code,{
      config:{broadcast:{self:false}}
    })
    .on('broadcast',{event:'snapshot'},msg=>{
      const data=msg.payload?.data; if(!data)return;
      const img=new Image();
      img.onload=()=>{
        const ctx=c.getContext('2d');
        ctx.clearRect(0,0,c.width,c.height);
        ctx.drawImage(img,0,0,c.width,c.height);
      };
      img.src=data;
    })
    .on('broadcast',{event:'clear'},()=>{
      const ctx=c.getContext('2d');
      ctx.clearRect(0,0,c.width,c.height);
    })
    .on('broadcast',{event:'end'},()=>{
      setEnded(true);
    })
    .subscribe();

    return()=>{ supabase.removeChannel(ch); };
  },[session]);

  if(ended)return(
    <div className="done-page">
      <div className="done-icon">рҹ“ә</div>
      <div className="done-title">й…ҚдҝЎзөӮдәҶ</div>
      <div className="done-sub">е…Ҳз”ҹгҒҢй…ҚдҝЎгӮ’зөӮдәҶгҒ—гҒҫгҒ—гҒҹгҖӮ<br/>гҒҠз–ІгӮҢж§ҳгҒ§гҒ—гҒҹпјҒ</div>
      <button className="btn btn-ghost mt-16" onClick={onBack||(() =>window.location.reload())}>жҲ»гӮӢ</button>
    </div>
  );

  return(
    <div style={{maxWidth:960,margin:'0 auto',padding:'20px 16px',display:'flex',flexDirection:'column',gap:16}}>
      <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
        {onBack&&<button className="btn btn-ghost btn-sm" onClick={onBack}>вҶҗ жҲ»гӮӢ</button>}
        <div className="live-badge"><span className="live-dot"/>LIVE иҰ–иҒҙдёӯ</div>
        <div style={{fontFamily:'Noto Serif JP',fontSize:16,fontWeight:700,color:'var(--crimson-dk)'}}>е…Ҳз”ҹгҒ®гғӣгғҜгӮӨгғҲгғңгғјгғү</div>
        <div style={{marginLeft:'auto',fontSize:13,color:'var(--stone)'}}>рҹ‘Ө {nickname}</div>
      </div>
      <div style={{borderRadius:14,overflow:'hidden',boxShadow:'0 2px 12px var(--shadow)'}}>
        <canvas ref={canvasRef} style={{width:'100%',display:'block',background:'white'}}/>
      </div>
      <div style={{fontSize:12,color:'var(--stone)',textAlign:'center'}}>е…Ҳз”ҹгҒҢжӣёгҒ„гҒҹеҶ…е®№гҒҢгғӘгӮўгғ«гӮҝгӮӨгғ гҒ§иЎЁзӨәгҒ•гӮҢгҒҫгҒҷ</div>
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   иӘІйЎҢдҪңжҲҗ
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function TaskCreator({ teacher, onDone, toast }) {
  const [title,setTitle]=useState(''); const [desc,setDesc]=useState('');
  const [imgUrl,setImgUrl]=useState(null); const [fields,setFields]=useState([]);
  const [selField,setSelField]=useState(null); const [drawing,setDrawing]=useState(null);
  const [mode,setMode]=useState('text'); const [step,setStep]=useState(1);
  const [saving,setSaving]=useState(false);
  const [showLabelModal,setShowLabelModal]=useState(false); const [pendingField,setPendingField]=useState(null); const [labelInput,setLabelInput]=useState('');
  /* и§ЈиӘ¬ */
  const [expText,setExpText]=useState(''); const [expImg,setExpImg]=useState(null);

  const canvasRef=useRef(null); const fileRef=useRef(null); const expImgRef=useRef(null);

  const getPct=(clientX,clientY)=>{const rect=canvasRef.current.getBoundingClientRect();return{x:Math.max(0,Math.min(100,((clientX-rect.left)/rect.width)*100)),y:Math.max(0,Math.min(100,((clientY-rect.top)/rect.height)*100))};};
  const getClient=(e)=>e.touches?.length?{clientX:e.touches[0].clientX,clientY:e.touches[0].clientY}:{clientX:e.clientX,clientY:e.clientY};
  const onPointerDown=(e)=>{if(!imgUrl)return;e.preventDefault();const{clientX,clientY}=getClient(e);const p=getPct(clientX,clientY);setDrawing({x0:p.x,y0:p.y,x1:p.x,y1:p.y});setSelField(null);};
  const onPointerMove=(e)=>{if(!drawing)return;e.preventDefault();const{clientX,clientY}=getClient(e);const p=getPct(clientX,clientY);setDrawing(d=>({...d,x1:p.x,y1:p.y}));};
  const onPointerUp=(e)=>{if(!drawing)return;e.preventDefault();const x=Math.min(drawing.x0,drawing.x1),y=Math.min(drawing.y0,drawing.y1),w=Math.abs(drawing.x1-drawing.x0),h=Math.abs(drawing.y1-drawing.y0);setDrawing(null);if(w<1||h<1)return;const nf={id:genId(),type:mode,x,y,width:w,height:h,label:`е•Ҹ${fields.length+1}`};setPendingField(nf);setLabelInput(nf.label);setShowLabelModal(true);};
  const confirmLabel=()=>{const f={...pendingField,label:labelInput||pendingField.label};setFields(fs=>[...fs,f]);setSelField(f.id);setShowLabelModal(false);setPendingField(null);};
  const deleteField=(id)=>{setFields(fs=>fs.filter(f=>f.id!==id));if(selField===id)setSelField(null);};
  const handleFile=(file)=>{if(!file)return;if(!file.type.startsWith('image/')&&file.type!=='application/pdf'){toast.show('з”»еғҸгҒҫгҒҹгҒҜPDFгӮ’йҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„','error');return;}const reader=new FileReader();reader.onload=(ev)=>{setImgUrl(ev.target.result);setStep(3);};reader.readAsDataURL(file);};
  const handleExpImg=(file)=>{if(!file)return;const reader=new FileReader();reader.onload=(ev)=>setExpImg(ev.target.result);reader.readAsDataURL(file);};

  const save=async()=>{
    if(!title.trim()){toast.show('иӘІйЎҢгӮҝгӮӨгғҲгғ«гӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„','error');return;}
    setSaving(true);
    try {
      await DB.createTask({id:genId(),title:title.trim(),description:desc.trim(),imageDataUrl:imgUrl,accessCode:genCode(),createdBy:teacher.teacherId,isPublished:false,answerFields:fields,explanationText:expText.trim(),explanationImageUrl:expImg});
      toast.show('иӘІйЎҢгӮ’дҝқеӯҳгҒ—гҒҫгҒ—гҒҹ','success');
      onDone();
    } catch(e){toast.show('дҝқеӯҳгӮЁгғ©гғј: '+e.message,'error');}
    finally{setSaving(false);}
  };

  const drawRect=drawing?{left:Math.min(drawing.x0,drawing.x1)+'%',top:Math.min(drawing.y0,drawing.y1)+'%',width:Math.abs(drawing.x1-drawing.x0)+'%',height:Math.abs(drawing.y1-drawing.y0)+'%'}:null;

  const stepLabels=['иӘІйЎҢжғ…е ұ','гғ—гғӘгғігғҲгӮўгғғгғ—гғӯгғјгғү','еӣһзӯ”ж¬„гҒ®й…ҚзҪ®','и§ЈиӘ¬гӮ’иЁӯе®ҡ'];

  return (
    <div className="main">
      <div className="flex-row" style={{marginBottom:20,gap:6,flexWrap:'wrap'}}>
        <button className="btn btn-ghost btn-sm" onClick={onDone}>вҶҗ жҲ»гӮӢ</button>
        <div style={{flex:1}}/>
        {stepLabels.map((s,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:4,opacity:step===i+1?1:.45,fontSize:12,fontWeight:step===i+1?700:400,color:step===i+1?'var(--crimson)':'var(--stone)'}}>
            <div style={{width:20,height:20,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,background:step>i?'var(--crimson)':step===i+1?'var(--crimson)':'var(--paper-dk)',color:step>=i+1?'white':'var(--stone)',fontWeight:700}}>{i+1}</div>
            <span style={{display:window.innerWidth<600?'none':'inline'}}>{s}</span>
          </div>
        ))}
      </div>

      {/* Step1: иӘІйЎҢжғ…е ұ */}
      {step===1&&(
        <div className="form-box" style={{maxWidth:560}}>
          <div className="form-title">в‘  иӘІйЎҢжғ…е ұгӮ’е…ҘеҠӣ</div>
          <div className="form-group"><label className="form-label">иӘІйЎҢгӮҝгӮӨгғҲгғ« <span style={{color:'var(--crimson)'}}>*</span></label><input className="form-input" placeholder="дҫӢ: дёҖж¬Ўж–№зЁӢејҸ з·ҙзҝ’гғ—гғӘгғігғҲв‘ " value={title} onChange={e=>setTitle(e.target.value)}/></div>
          <div className="form-group"><label className="form-label">иӘ¬жҳҺпјҲд»»ж„Ҹпјү</label><textarea className="form-textarea" placeholder="дҫӢ: ж•ҷз§‘жӣё p.42гҖң43 гҒ®е•ҸйЎҢгҒ§гҒҷ" value={desc} onChange={e=>setDesc(e.target.value)}/></div>
          <button className="btn btn-primary btn-full mt-8" disabled={!title.trim()} onClick={()=>setStep(2)}>ж¬ЎгҒё вҶ’</button>
        </div>
      )}

      {/* Step2: Upload */}
      {step===2&&(
        <div className="form-box" style={{maxWidth:560}}>
          <div className="form-title">в‘Ў гғ—гғӘгғігғҲгӮ’гӮўгғғгғ—гғӯгғјгғү</div>
          <div className="upload-zone" onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();handleFile(e.dataTransfer.files?.[0]);}} onClick={()=>fileRef.current.click()}>
            <div className="big">рҹ“„</div>
            <p>гӮҜгғӘгғғгӮҜгҒҫгҒҹгҒҜгғүгғ©гғғгӮ°пјҶгғүгғӯгғғгғ—гҒ§<br/>з”»еғҸпјҲPNG/JPGпјүгҒҫгҒҹгҒҜPDFгӮ’гӮўгғғгғ—гғӯгғјгғү</p>
            <input ref={fileRef} type="file" accept="image/*,application/pdf" style={{display:'none'}} onChange={e=>handleFile(e.target.files?.[0])}/>
          </div>
          <div className="divider"/>
          <div style={{textAlign:'center'}}><div className="text-muted" style={{marginBottom:12}}>гҒҫгҒҹгҒҜ</div><button className="btn btn-ghost btn-full" onClick={()=>{setImgUrl(null);setStep(3);}}>з”»еғҸгҒӘгҒ—гҒ§йҖІгӮҖ</button></div>
          <button className="btn btn-ghost btn-sm mt-16" onClick={()=>setStep(1)}>вҶҗ жҲ»гӮӢ</button>
        </div>
      )}

      {/* Step3: Fields */}
      {step===3&&(
        <>
          <div className="creator-layout">
            <div className="canvas-wrapper">
              <div className="canvas-toolbar">
                <span style={{fontSize:12,fontWeight:700,color:'var(--stone)'}}>еӣһзӯ”ж¬„гҒ®зЁ®йЎһпјҡ</span>
                <button className={`btn btn-sm ${mode==='text'?'btn-primary':'btn-ghost'}`} onClick={()=>setMode('text')}>рҹ“қ гғҶгӮӯгӮ№гғҲ</button>
                <button className={`btn btn-sm ${mode==='number'?'btn-primary':'btn-ghost'}`} onClick={()=>setMode('number')}>рҹ”ў ж•°еҖӨ</button>
                <div style={{flex:1}}/><span style={{fontSize:11,color:'var(--stone)'}}>{imgUrl?'гғүгғ©гғғгӮ°гҒ—гҒҰй…ҚзҪ®':'гғ—гғӘгғігғҲгҒӘгҒ—'}</span>
              </div>
              <div className="canvas-area" ref={canvasRef} onMouseDown={onPointerDown} onMouseMove={onPointerMove} onMouseUp={onPointerUp} onTouchStart={onPointerDown} onTouchMove={onPointerMove} onTouchEnd={onPointerUp}>
                {imgUrl?(<>
                  <img src={imgUrl} alt="гғ—гғӘгғігғҲ" draggable={false}/>

                </div>
              )}

              <div className="divider"/>
              <button className="btn btn-primary btn-full" onClick={()=>setStep(4)}>ж¬ЎгҒёпјҡи§ЈиӘ¬гӮ’иЁӯе®ҡ вҶ’</button>
              <button className="btn btn-ghost btn-full btn-sm" onClick={()=>setStep(2)}>вҶҗ жҲ»гӮӢ</button>
            </div>

      {step===4&&(
        <div className="form-box" style={{maxWidth:640}}>
          <div className="form-title">в‘Ј и§ЈиӘ¬гӮ’иЁӯе®ҡпјҲд»»ж„Ҹпјү</div>
          <div style={{fontSize:13,color:'var(--stone)',marginBottom:20,lineHeight:1.8}}>
            з”ҹеҫ’гҒҢеӣһзӯ”гӮ’жҸҗеҮәгҒ—гҒҹеҫҢгҒ«иЎЁзӨәгҒ•гӮҢгӮӢи§ЈиӘ¬гҒ§гҒҷгҖӮиЁӯе®ҡгҒ—гҒӘгҒ„е ҙеҗҲгҒҜжҸҗеҮәе®ҢдәҶз”»йқўгҒ®гҒҝиЎЁзӨәгҒ•гӮҢгҒҫгҒҷгҖӮ
          </div>
          <div className="form-group">
            <label className="form-label">и§ЈиӘ¬гғҶгӮӯгӮ№гғҲ</label>
            <textarea className="form-textarea" style={{minHeight:140}} placeholder="дҫӢпјҡгҒ“гҒ®е•ҸйЎҢгҒҜдёЎиҫәгҒ«3гӮ’гҒӢгҒ‘гҒҰвҖҰ" value={expText} onChange={e=>setExpText(e.target.value)}/>
          </div>
          <div className="form-group">
            <label className="form-label">и§ЈиӘ¬з”»еғҸпјҲд»»ж„Ҹпјү</label>
            {expImg?(
              <div style={{position:'relative',display:'inline-block'}}>
                <img src={expImg} alt="и§ЈиӘ¬з”»еғҸ" style={{width:'100%',borderRadius:8,border:'2px solid var(--paper-dk)'}}/>
                <button className="btn btn-ghost btn-sm" style={{position:'absolute',top:8,right:8,color:'var(--crimson)'}} onClick={()=>setExpImg(null)}>вң• еүҠйҷӨ</button>
              </div>
            ):(
              <div className="upload-zone" onClick={()=>expImgRef.current.click()} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();handleExpImg(e.dataTransfer.files?.[0]);}}>

                <p>и§ЈиӘ¬з”»еғҸгӮ’гӮўгғғгғ—гғӯгғјгғүпјҲPNG/JPGпјү</p>
                <input ref={expImgRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>handleExpImg(e.target.files?.[0])}/>

          <div className="divider"/>

            {saving?<><span className="spinner"/> дҝқеӯҳдёӯвҖҰ</>:'рҹ’ҫ иӘІйЎҢгӮ’дҝқеӯҳгҒҷгӮӢ'}
