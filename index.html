<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>紅月計算塾</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;900&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --crimson:#9B1B30;--crimson-dk:#6D0F20;--crimson-lt:#C84054;
  --gold:#C9972C;--gold-lt:#F0C060;
  --ink:#1A1410;--paper:#F9F4ED;--paper-dk:#EDE5D8;
  --stone:#8A7F74;--stone-lt:#C4BAB0;--white:#FFFFFF;
  --shadow:rgba(26,20,16,.18);--r:8px;
}
html,body,#root{height:100%;width:100%;font-family:'Noto Sans JP',sans-serif;background:var(--paper);color:var(--ink);}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--paper-dk);}::-webkit-scrollbar-thumb{background:var(--stone-lt);border-radius:3px;}
.mono{font-family:'DM Mono',monospace;}.serif{font-family:'Noto Serif JP',serif;}
.app{min-height:100vh;display:flex;flex-direction:column;}

/* Header */
.header{background:var(--crimson-dk);color:var(--paper);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px var(--shadow);}
.header-logo{display:flex;align-items:center;gap:10px;font-family:'Noto Serif JP',serif;font-size:18px;font-weight:900;letter-spacing:.05em;cursor:pointer;user-select:none;}
.header-logo .moon{width:28px;height:28px;background:var(--gold);border-radius:50%;position:relative;overflow:hidden;flex-shrink:0;}
.header-logo .moon::after{content:'';position:absolute;top:3px;left:8px;width:22px;height:22px;background:var(--crimson-dk);border-radius:50%;}
.header-nav{display:flex;gap:8px;align-items:center;}
.nav-btn{padding:6px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,.35);background:transparent;color:var(--paper);font-size:13px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .18s;}
.nav-btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.6);}
.nav-btn.active{background:var(--gold);border-color:var(--gold);color:var(--ink);font-weight:700;}

/* Layout */
.main{flex:1;padding:32px 24px;max-width:1100px;margin:0 auto;width:100%;}

/* Landing */
.landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 58px);text-align:center;gap:32px;padding:40px 24px;}
.landing-title{font-family:'Noto Serif JP',serif;font-size:clamp(32px,6vw,52px);font-weight:900;color:var(--crimson-dk);letter-spacing:.08em;line-height:1.2;}
.landing-subtitle{font-size:15px;color:var(--stone);line-height:1.8;max-width:460px;}
.landing-cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;max-width:700px;}
.landing-card{flex:1;min-width:240px;max-width:300px;background:var(--white);border:2px solid var(--paper-dk);border-radius:16px;padding:28px 24px;display:flex;flex-direction:column;gap:12px;cursor:pointer;transition:all .22s cubic-bezier(.25,.8,.25,1);box-shadow:0 2px 8px var(--shadow);text-align:left;}
.landing-card:hover{border-color:var(--crimson);box-shadow:0 8px 28px rgba(155,27,48,.15);transform:translateY(-4px);}
.card-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.card-icon.teacher{background:rgba(155,27,48,.1);}.card-icon.student{background:rgba(201,151,44,.1);}
.card-label{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;color:var(--crimson-dk);}
.card-desc{font-size:13px;color:var(--stone);line-height:1.7;}
.card-cta{margin-top:8px;display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--crimson);}

/* Forms */
.form-box{background:var(--white);border:2px solid var(--paper-dk);border-radius:16px;padding:36px;max-width:480px;margin:0 auto;box-shadow:0 4px 20px var(--shadow);}
.form-title{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;color:var(--crimson-dk);margin-bottom:24px;}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
.form-label{font-size:13px;font-weight:700;color:var(--ink);}
.form-hint{font-size:12px;color:var(--stone);margin-top:2px;}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 14px;border:2px solid var(--paper-dk);border-radius:var(--r);background:var(--paper);font-family:'Noto Sans JP',sans-serif;font-size:15px;color:var(--ink);transition:border-color .15s;outline:none;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--crimson);background:var(--white);}
.form-textarea{resize:vertical;min-height:80px;}

/* Buttons */
.btn{padding:11px 24px;border-radius:8px;border:none;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:8px;white-space:nowrap;}
.btn-primary{background:var(--crimson);color:var(--white);}
.btn-primary:hover{background:var(--crimson-dk);box-shadow:0 4px 14px rgba(155,27,48,.3);}
.btn-secondary{background:transparent;border:2px solid var(--crimson);color:var(--crimson);}
.btn-secondary:hover{background:rgba(155,27,48,.06);}
.btn-gold{background:var(--gold);color:var(--ink);}.btn-gold:hover{background:var(--gold-lt);}
.btn-ghost{background:var(--paper-dk);color:var(--stone);}.btn-ghost:hover{background:var(--stone-lt);color:var(--ink);}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:6px;}
.btn-lg{padding:14px 32px;font-size:16px;border-radius:10px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-full{width:100%;justify-content:center;}
.btn-approve{background:#D1FAE5;color:#065F46;border:none;}.btn-approve:hover{background:#A7F3D0;}
.btn-reject{background:#FEE2E2;color:#991B1B;border:none;}.btn-reject:hover{background:#FECACA;}
.btn-live{background:#7C3AED;color:white;}.btn-live:hover{background:#6D28D9;}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.03em;}
.badge-published{background:#D1FAE5;color:#065F46;}
.badge-draft{background:var(--paper-dk);color:var(--stone);}
.badge-pending{background:#FEF3C7;color:#92400E;}
.badge-approved{background:#D1FAE5;color:#065F46;}
.badge-rejected{background:#FEE2E2;color:#991B1B;}
.badge-live{background:#EDE9FE;color:#5B21B6;}

/* Dashboard tabs */
.dash-tabs{display:flex;gap:0;margin-bottom:28px;border:2px solid var(--paper-dk);border-radius:12px;overflow:hidden;background:var(--paper-dk);}
.dash-tab{flex:1;padding:11px 8px;background:transparent;color:var(--stone);font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all .15s;font-family:'Noto Sans JP',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;}
.dash-tab.active{background:var(--white);color:var(--crimson);box-shadow:0 1px 4px var(--shadow);}

/* Dashboard */
.dashboard-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
.dashboard-title{font-family:'Noto Serif JP',serif;font-size:26px;font-weight:700;color:var(--crimson-dk);}
.filter-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.filter-tab{padding:7px 16px;border-radius:20px;border:2px solid var(--paper-dk);background:var(--white);font-size:13px;font-weight:700;color:var(--stone);cursor:pointer;transition:all .15s;}
.filter-tab:hover{border-color:var(--crimson-lt);color:var(--crimson);}
.filter-tab.active{background:var(--crimson);border-color:var(--crimson);color:var(--white);}

/* Task grid */
.task-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;}
.task-card{background:var(--white);border:2px solid var(--paper-dk);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:10px;transition:all .2s;box-shadow:0 1px 6px var(--shadow);}
.task-card:hover{border-color:var(--crimson-lt);box-shadow:0 4px 16px rgba(155,27,48,.12);}
.task-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.task-card-title{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:700;color:var(--ink);line-height:1.4;}
.task-card-meta{font-size:12px;color:var(--stone);}
.task-card-code{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--crimson);letter-spacing:.12em;background:rgba(155,27,48,.06);padding:6px 12px;border-radius:6px;display:inline-block;}
.task-card-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.stat-row{display:flex;gap:20px;margin-bottom:28px;flex-wrap:wrap;}
.stat-box{flex:1;min-width:120px;background:var(--white);border:2px solid var(--paper-dk);border-radius:12px;padding:18px 20px;text-align:center;}
.stat-num{font-family:'DM Mono',monospace;font-size:32px;font-weight:500;color:var(--crimson);}
.stat-label{font-size:12px;color:var(--stone);margin-top:4px;}

/* Creator */
.creator-layout{display:grid;grid-template-columns:1fr 300px;gap:24px;align-items:start;}
@media(max-width:800px){.creator-layout{grid-template-columns:1fr;}}
.canvas-wrapper{background:var(--white);border:2px solid var(--paper-dk);border-radius:14px;overflow:hidden;min-height:420px;position:relative;}
.canvas-toolbar{background:var(--paper-dk);padding:10px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;border-bottom:2px solid var(--stone-lt);}
.canvas-area{position:relative;width:100%;user-select:none;cursor:crosshair;background:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(155,27,48,.04) 27px,rgba(155,27,48,.04) 28px),repeating-linear-gradient(90deg,transparent,transparent 27px,rgba(155,27,48,.04) 27px,rgba(155,27,48,.04) 28px);}
.canvas-area img{width:100%;height:auto;display:block;pointer-events:none;}
.canvas-placeholder{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--stone-lt);padding:40px;}
.canvas-placeholder .big-icon{font-size:52px;}
.canvas-placeholder p{font-size:14px;text-align:center;line-height:1.7;}
.field-overlay{position:absolute;border:2.5px solid var(--crimson);background:rgba(155,27,48,.08);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .12s;}
.field-overlay:hover{background:rgba(155,27,48,.18);}
.field-overlay.selected{border-color:var(--gold);background:rgba(201,151,44,.15);box-shadow:0 0 0 3px rgba(201,151,44,.25);}
.field-label-chip{position:absolute;top:-12px;left:0;background:var(--crimson);color:var(--white);font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;white-space:nowrap;pointer-events:none;}
.draw-rect{position:absolute;border:2px dashed var(--crimson);background:rgba(155,27,48,.07);pointer-events:none;border-radius:4px;}
.side-panel{background:var(--white);border:2px solid var(--paper-dk);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:16px;}
.side-panel-title{font-family:'Noto Serif JP',serif;font-size:15px;font-weight:700;color:var(--crimson-dk);border-bottom:2px solid var(--paper-dk);padding-bottom:10px;}
.field-list{display:flex;flex-direction:column;gap:8px;}
.field-item{background:var(--paper);border:1.5px solid var(--paper-dk);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all .15s;}
.field-item:hover{border-color:var(--crimson-lt);}
.field-item.selected{border-color:var(--gold);background:rgba(201,151,44,.07);}
.field-item-num{width:22px;height:22px;background:var(--crimson);color:var(--white);border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.field-item-info{flex:1;min-width:0;}
.field-item-name{font-size:13px;font-weight:700;color:var(--ink);}
.field-item-type{font-size:11px;color:var(--stone);}
.type-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.type-text{background:#DBEAFE;color:#1E40AF;}.type-number{background:#F3E8FF;color:#6B21A8;}
.empty-hint{font-size:12px;color:var(--stone-lt);text-align:center;line-height:1.8;padding:8px 0;}

/* Answer sheet */
.answer-sheet-wrap{max-width:780px;margin:0 auto;display:flex;flex-direction:column;gap:20px;}
.sheet-header{background:var(--crimson-dk);color:var(--white);border-radius:14px;padding:20px 24px;display:flex;flex-direction:column;gap:4px;}
.sheet-title{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:700;}
.sheet-desc{font-size:13px;opacity:.8;}
.sheet-canvas-wrapper{background:var(--white);border:2px solid var(--paper-dk);border-radius:14px;overflow:hidden;position:relative;}
.sheet-canvas{position:relative;width:100%;}
.sheet-canvas img{width:100%;height:auto;display:block;}
.answer-input{position:absolute;background:rgba(255,255,255,.92);border:2.5px solid var(--gold);border-radius:5px;padding:4px 8px;font-family:'DM Mono',monospace;font-size:15px;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s;width:100%;height:100%;}
.answer-input:focus{border-color:var(--crimson);box-shadow:0 0 0 3px rgba(155,27,48,.15);}
.answer-input:disabled{background:rgba(235,235,235,.8);border-color:var(--stone-lt);color:var(--stone);cursor:not-allowed;}
.sheet-submit-bar{background:var(--white);border:2px solid var(--paper-dk);border-radius:14px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.sheet-progress{display:flex;flex-direction:column;gap:6px;flex:1;}
.progress-bar-bg{height:6px;border-radius:3px;background:var(--paper-dk);overflow:hidden;}
.progress-bar-fill{height:100%;background:var(--gold);border-radius:3px;transition:width .4s ease;}
.progress-text{font-size:12px;color:var(--stone);}

/* Explanation box (shown after submit) */
.explanation-box{background:var(--white);border:2px solid var(--gold);border-radius:14px;padding:24px;display:flex;flex-direction:column;gap:14px;}
.explanation-title{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:8px;}
.explanation-text{font-size:14px;line-height:1.9;color:var(--ink);white-space:pre-wrap;}
.explanation-img{width:100%;border-radius:10px;border:1.5px solid var(--paper-dk);}

/* Review table */
.review-header{display:flex;align-items:center;gap:14px;margin-bottom:24px;flex-wrap:wrap;}
.review-title{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;color:var(--crimson-dk);}
.sub-table{width:100%;border-collapse:collapse;background:var(--white);border:2px solid var(--paper-dk);border-radius:12px;overflow:hidden;box-shadow:0 2px 8px var(--shadow);}
.sub-table th,.sub-table td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--paper-dk);font-size:13px;}
.sub-table th{background:var(--paper-dk);font-weight:700;color:var(--stone);font-size:12px;text-transform:uppercase;letter-spacing:.05em;}
.sub-table tr:last-child td{border-bottom:none;}
.sub-table tr:hover td{background:rgba(155,27,48,.03);}
.answer-chip{font-family:'DM Mono',monospace;background:var(--paper-dk);padding:2px 8px;border-radius:4px;font-size:13px;color:var(--ink);margin-right:4px;display:inline-block;margin-bottom:2px;}

/* Scoring marks */
.mark-btn{width:36px;height:36px;border-radius:8px;border:2px solid var(--paper-dk);background:var(--paper);font-size:16px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;font-family:sans-serif;}
.mark-btn:hover{transform:scale(1.1);}
.mark-btn.correct.active{background:#D1FAE5;border-color:#065F46;}
.mark-btn.partial.active{background:#FEF3C7;border-color:#D97706;}
.mark-btn.wrong.active{background:#FEE2E2;border-color:#DC2626;}
.score-total{font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--crimson);}

/* Code entry */
.code-entry{max-width:380px;margin:60px auto;text-align:center;display:flex;flex-direction:column;gap:20px;}
.code-title{font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;color:var(--crimson-dk);}
.code-input{width:100%;text-align:center;font-family:'DM Mono',monospace;font-size:28px;font-weight:500;letter-spacing:.25em;padding:16px;border:3px solid var(--paper-dk);border-radius:12px;background:var(--white);color:var(--crimson);outline:none;transition:border-color .15s;}
.code-input:focus{border-color:var(--crimson);}

/* Whiteboard */
.wb-wrap{display:flex;flex-direction:column;gap:16px;}
.wb-toolbar{background:var(--paper-dk);border:2px solid var(--stone-lt);border-radius:12px;padding:10px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.wb-canvas{width:100%;border:2px solid var(--paper-dk);border-radius:14px;background:var(--white);cursor:crosshair;display:block;touch-action:none;}
.wb-tool-btn{width:34px;height:34px;border-radius:8px;border:2px solid var(--paper-dk);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;}
.wb-tool-btn.active{border-color:var(--crimson);background:rgba(155,27,48,.08);}
.wb-color-btn{width:24px;height:24px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .15s;}
.wb-color-btn.active{border-color:var(--ink);}
.wb-viewer{background:var(--white);border:2px solid var(--paper-dk);border-radius:14px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:#7C3AED;color:white;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;}
.live-dot{width:8px;height:8px;border-radius:50%;background:#EF4444;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(26,20,16,.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.modal{background:var(--white);border-radius:16px;padding:28px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal-wide{max-width:620px;}
.modal-title{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;color:var(--crimson-dk);margin-bottom:16px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}

/* Toast */
.toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:8px;align-items:center;}
.toast{background:var(--ink);color:var(--white);padding:11px 20px;border-radius:30px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.25);animation:toastIn .25s ease;display:flex;align-items:center;gap:8px;white-space:nowrap;}
.toast.success{background:#065F46;}.toast.error{background:var(--crimson-dk);}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Done page */
.done-page{text-align:center;padding:40px 24px;display:flex;flex-direction:column;align-items:center;gap:20px;}
.done-icon{font-size:64px;}
.done-title{font-family:'Noto Serif JP',serif;font-size:28px;font-weight:700;color:var(--crimson-dk);}
.done-sub{font-size:15px;color:var(--stone);line-height:1.8;max-width:360px;}

/* Upload */
.upload-zone{border:3px dashed var(--stone-lt);border-radius:12px;padding:36px;text-align:center;cursor:pointer;transition:all .2s;background:var(--paper);}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--crimson);background:rgba(155,27,48,.03);}
.upload-zone p{font-size:13px;color:var(--stone);margin-top:10px;line-height:1.7;}
.upload-zone .big{font-size:36px;}

/* Spinner */
.spinner{display:inline-block;width:18px;height:18px;border:3px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
.spinner.dark{border-color:rgba(155,27,48,.2);border-top-color:var(--crimson);}
@keyframes spin{to{transform:rotate(360deg)}}

/* Approval */
.approval-item{background:var(--paper);border:1.5px solid var(--paper-dk);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.approval-item-info{flex:1;min-width:0;}
.approval-item-id{font-family:'DM Mono',monospace;font-size:15px;font-weight:700;color:var(--ink);}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ══════════════════════════════════
   ★ SUPABASE 設定 ★
══════════════════════════════════ */
const SUPABASE_URL  = 'https://ugtnpkvrlvlgyjcuwotb.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVndG5wa3ZybHZsZ3lqY3V3b3RiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzI4MTEsImV4cCI6MjA4ODEwODgxMX0.2EvzmxxmtX2lplCUWfmfqIXFyzrDGBGfnDSkNU2z93Y';

const isConfigured = SUPABASE_URL !== 'YOUR_SUPABASE_URL';
const supabase = isConfigured ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON) : null;

/* ══════════════════════════════════
   DB API
══════════════════════════════════ */
const DB = {
  /* 教師 */
  async getTeachers() {
    if (!supabase) return [];
    const { data, error } = await supabase.from('teachers').select('*').order('created_at');
    if (error) throw error;
    return data || [];
  },
  async verifyTeacher(teacherId, password) {
    if (!supabase) return null;
    const { data } = await supabase.from('teachers').select('*').eq('teacher_id', teacherId).eq('password_hash', password).eq('is_approved', true).maybeSingle();
    return data || null;
  },
  async findTeacher(teacherId) {
    if (!supabase) return null;
    const { data } = await supabase.from('teachers').select('*').eq('teacher_id', teacherId).eq('is_approved', true).maybeSingle();
    return data || null;
  },

  /* 教師申請 */
  async getApplications() {
    if (!supabase) return [];
    const { data, error } = await supabase.from('teacher_applications').select('*').order('applied_at', { ascending: false });
    if (error) throw error;
    return data || [];
  },
  async createApplication(app) {
    if (!supabase) throw new Error('Supabase未設定');
    const { error } = await supabase.from('teacher_applications').insert([app]);
    if (error) throw error;
  },
  async getVotes(applicationId) {
    if (!supabase) return [];
    const { data } = await supabase.from('application_votes').select('*').eq('application_id', applicationId);
    return data || [];
  },
  async vote(applicationId, teacherId, approve) {
    if (!supabase) throw new Error('Supabase未設定');
    const { error } = await supabase.from('application_votes').upsert([{ application_id: applicationId, teacher_id: teacherId, approve, voted_at: new Date().toISOString() }], { onConflict: 'application_id,teacher_id' });
    if (error) throw error;
  },
  async approveApplication(applicationId, teacherIdToApprove, password) {
    if (!supabase) throw new Error('Supabase未設定');
    const { error: e1 } = await supabase.from('teachers').insert([{ teacher_id: teacherIdToApprove, password_hash: password, is_approved: true, approved_at: new Date().toISOString() }]);
    if (e1) throw e1;
    const { error: e2 } = await supabase.from('teacher_applications').update({ status: 'approved' }).eq('id', applicationId);
    if (e2) throw e2;
  },
  async rejectApplication(applicationId) {
    if (!supabase) throw new Error('Supabase未設定');
    const { error } = await supabase.from('teacher_applications').update({ status: 'rejected' }).eq('id', applicationId);
    if (error) throw error;
  },

  /* 課題 */
  async getTasks() {
    if (!supabase) return [];
    const { data, error } = await supabase.from('tasks').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    return (data || []).map(camelTask);
  },
  async createTask(task) {
    if (!supabase) throw new Error('Supabase未設定');
    const { data, error } = await supabase.from('tasks').insert([snakeTask(task)]).select().single();
    if (error) throw error;
    return camelTask(data);
  },
  async updateTask(id, patch) {
    if (!supabase) throw new Error('Supabase未設定');
    const { error } = await supabase.from('tasks').update(snakeTask(patch)).eq('id', id);
    if (error) throw error;
  },
  async deleteTask(id) {
    if (!supabase) throw new Error('Supabase未設定');
    const { error } = await supabase.from('tasks').delete().eq('id', id);
    if (error) throw error;
  },
  async findTaskByCode(code) {
    if (!supabase) throw new Error('Supabase未設定');
    const { data, error } = await supabase.from('tasks').select('*').eq('access_code', code).eq('is_published', true).maybeSingle();
    if (error) throw error;
    return data ? camelTask(data) : null;
  },

  /* 提出 */
  async getSubmissions(taskId) {
    if (!supabase) return [];
    const { data, error } = await supabase.from('submissions').select('*').eq('task_id', taskId).order('submitted_at', { ascending: false });
    if (error) throw error;
    return (data || []).map(camelSub);
  },
  async createSubmission(sub) {
    if (!supabase) throw new Error('Supabase未設定');
    const { error } = await supabase.from('submissions').insert([snakeSub(sub)]);
    if (error) throw error;
  },
  async countSubmissions(taskId) {
    if (!supabase) return 0;
    const { count, error } = await supabase.from('submissions').select('*', { count: 'exact', head: true }).eq('task_id', taskId);
    if (error) return 0;
    return count || 0;
  },

  /* 採点 */
  async getScoringConfig(taskId) {
    if (!supabase) return {};
    const { data } = await supabase.from('task_scoring_config').select('*').eq('task_id', taskId).maybeSingle();
    return data ? data.field_points : {};
  },
  async saveScoringConfig(taskId, fieldPoints) {
    if (!supabase) throw new Error('Supabase未設定');
    const { error } = await supabase.from('task_scoring_config').upsert([{ task_id: taskId, field_points: fieldPoints }], { onConflict: 'task_id' });
    if (error) throw error;
  },
  async getScorings(taskId) {
    if (!supabase) return [];
    const { data, error } = await supabase.from('scorings').select('*').eq('task_id', taskId);
    if (error) throw error;
    return data || [];
  },
  async saveScoring(taskId, submissionId, fieldId, mark) {
    if (!supabase) throw new Error('Supabase未設定');
    const { error } = await supabase.from('scorings').upsert([{ id: genId(), task_id: taskId, submission_id: submissionId, field_id: fieldId, mark, scored_at: new Date().toISOString() }], { onConflict: 'submission_id,field_id' });
    if (error) throw error;
  },

  /* ホワイトボード */
  async createWbSession(session) {
    if (!supabase) throw new Error('Supabase未設定');
    const { error } = await supabase.from('whiteboard_sessions').insert([session]);
    if (error) throw error;
  },
  async findWbSession(accessCode) {
    if (!supabase) return null;
    const { data } = await supabase.from('whiteboard_sessions').select('*').eq('access_code', accessCode).eq('is_live', true).maybeSingle();
    return data || null;
  },
  async endWbSession(id) {
    if (!supabase) return;
    await supabase.from('whiteboard_sessions').update({ is_live: false }).eq('id', id);
  },
  async clearWbStrokes(sessionId) {
    if (!supabase) return;
    await supabase.from('whiteboard_strokes').delete().eq('session_id', sessionId);
  },

  /* 生徒 */
  async getStudents() {
    if (!supabase) return [];
    const { data, error } = await supabase.from('students').select('*').order('created_at');
    if (error) throw error;
    return data || [];
  },
  async verifyStudent(studentId, password) {
    if (!supabase) return null;
    const { data } = await supabase.from('students').select('*').eq('student_id', studentId).eq('password_hash', password).eq('is_approved', true).maybeSingle();
    return data || null;
  },
  async findStudent(studentId) {
    if (!supabase) return null;
    const { data } = await supabase.from('students').select('*').eq('student_id', studentId).maybeSingle();
    return data || null;
  },
  async createStudentApplication(app) {
    if (!supabase) throw new Error('Supabase未設定');
    const { error } = await supabase.from('student_applications').insert([app]);
    if (error) throw error;
  },
  async getStudentApplications() {
    if (!supabase) return [];
    const { data, error } = await supabase.from('student_applications').select('*').order('applied_at', { ascending: false });
    if (error) throw error;
    return data || [];
  },
  async approveStudentApplication(applicationId, studentId, password) {
    if (!supabase) throw new Error('Supabase未設定');
    const { error: e1 } = await supabase.from('students').insert([{ student_id: studentId, password_hash: password, is_approved: true, approved_at: new Date().toISOString() }]);
    if (e1) throw e1;
    const { error: e2 } = await supabase.from('student_applications').update({ status: 'approved' }).eq('id', applicationId);
    if (e2) throw e2;
  },
  async rejectStudentApplication(applicationId) {
    if (!supabase) throw new Error('Supabase未設定');
    const { error } = await supabase.from('student_applications').update({ status: 'rejected' }).eq('id', applicationId);
    if (error) throw error;
  },
  async getStudentVotes(applicationId) {
    if (!supabase) return [];
    const { data } = await supabase.from('application_votes').select('*').eq('application_id', applicationId).eq('vote_type', 'student');
    return data || [];
  },
  async voteStudent(applicationId, teacherId, approve) {
    if (!supabase) throw new Error('Supabase未設定');
    const { error } = await supabase.from('application_votes').upsert([{ application_id: applicationId, teacher_id: teacherId, approve, vote_type: 'student', voted_at: new Date().toISOString() }], { onConflict: 'application_id,teacher_id' });
    if (error) throw error;
  },

  /* 生徒権限 */
  async getStudentPermissions(studentId) {
    if (!supabase) return null;
    const { data } = await supabase.from('student_permissions').select('*').eq('student_id', studentId).maybeSingle();
    if (!data) return { student_id: studentId, wb_write_enabled: false, vc_enabled: false };
    /* カラム名の揺れに対応：wb_enabled → wb_write_enabled */
    return {
      student_id:        data.student_id,
      wb_write_enabled:  data.wb_write_enabled ?? data.wb_enabled ?? false,
      vc_enabled:        data.vc_enabled ?? false,
    };
  },
  async setStudentPermissions(studentId, wbWriteEnabled, vcEnabled) {
    if (!supabase) throw new Error('Supabase未設定');
    /* 両カラム名で書き込み（DB側のカラム名に合わせて片方が無視されても動く） */
    const payload = {
      student_id:       studentId,
      vc_enabled:       vcEnabled,
      wb_write_enabled: wbWriteEnabled,
      updated_at:       new Date().toISOString()
    };
    const { error } = await supabase.from('student_permissions').upsert([payload], { onConflict: 'student_id' });
    if (error) throw error;
  },

  /* チャット */
  async getChatMessages(roomId='general', limit=80) {
    if (!supabase) return [];
    const { data, error } = await supabase.from('chat_messages').select('*')
      .eq('room_id', roomId)
      .order('created_at', { ascending: false }).limit(limit);
    if (error) throw error;
    return (data || []).reverse();
  },
  async sendChatMessage(msg) {
    if (!supabase) throw new Error('Supabase未設定');
    const displayName = msg.sender_label || msg.sender_id;
    const { error } = await supabase.from('chat_messages').insert([{
      id:          msg.id,
      room_id:     msg.room_id || 'general',
      sender_id:   msg.sender_id,
      sender_type: msg.sender_type || 'user',
      sender_name: displayName,
      sender_label: displayName,
      content:     msg.content || null,
      image_url:   msg.image_data || null,
      image_data:  msg.image_data || null,
      created_at:  msg.created_at,
    }]);
    if (error) throw error;
  },
};

/* 変換 */
function camelTask(r) {
  return {
    id:r.id, title:r.title, description:r.description,
    imageDataUrl:r.image_data_url, accessCode:r.access_code,
    createdBy:r.created_by, createdAt:r.created_at,
    isPublished:r.is_published, answerFields:r.answer_fields||[],
    explanationText:r.explanation_text||'',
    explanationImageUrl:r.explanation_image_url||null,
  };
}
function snakeTask(t) {
  const o = {};
  if (t.id!==undefined)                o.id=t.id;
  if (t.title!==undefined)             o.title=t.title;
  if (t.description!==undefined)       o.description=t.description;
  if (t.imageDataUrl!==undefined)      o.image_data_url=t.imageDataUrl;
  if (t.accessCode!==undefined)        o.access_code=t.accessCode;
  if (t.createdBy!==undefined)         o.created_by=t.createdBy;
  if (t.isPublished!==undefined)       o.is_published=t.isPublished;
  if (t.answerFields!==undefined)      o.answer_fields=t.answerFields;
  if (t.explanationText!==undefined)   o.explanation_text=t.explanationText;
  if (t.explanationImageUrl!==undefined) o.explanation_image_url=t.explanationImageUrl;
  return o;
}
function camelSub(r) { return { id:r.id, taskId:r.task_id, nickname:r.nickname, answers:r.answers||{}, submittedAt:r.submitted_at }; }
function snakeSub(s) { return { id:s.id, task_id:s.taskId, nickname:s.nickname, answers:s.answers, submitted_at:s.submittedAt }; }

/* Utils */
let _uid = 1;
function genId() { return 'id_'+(_uid++)+'_'+Date.now(); }
function genCode() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join('');
}
function useToast() {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((msg, type='default') => {
    const id = genId();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)), 2800);
  }, []);
  return { toasts, show };
}

/* ══════════════════════════════════
   共通コンポーネント
══════════════════════════════════ */
function Kamon({ size=80, color='#9B1B30' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="46" fill="none" stroke={color} strokeWidth="3"/>
      <circle cx="50" cy="50" r="32" fill={color}/>
      <circle cx="62" cy="42" r="26" fill="#F9F4ED"/>
      <circle cx="32" cy="58" r="5" fill="#C9972C"/>
    </svg>
  );
}
function Header({ role, onRoleChange, onHome }) {
  return (
    <header className="header">
      <div className="header-logo" onClick={onHome}><div className="moon"/><span>紅月計算塾</span></div>
      <nav className="header-nav">
        <button className={`nav-btn ${role==='teacher'?'active':''}`} onClick={()=>onRoleChange('teacher')}>教える側</button>
        <button className={`nav-btn ${role==='student'?'active':''}`} onClick={()=>onRoleChange('student')}>生徒</button>
      </nav>
    </header>

}
function Toasts({ toasts }) {
  if (!toasts.length) return null;
  return (
    <div className="toast-container">
      {toasts.map(t=>(
        <div key={t.id} className={`toast ${t.type}`}>
          {t.type==='success'?'✓':t.type==='error'?'✕':'ℹ'} {t.msg}
        </div>
      ))}
    </div>
  );
}
function ConfigBanner() {
  if (isConfigured) return null;
  return (
    <div className="config-banner">
      ⚠️ <strong>Supabase未設定：</strong> <code>SUPABASE_URL</code> と <code>SUPABASE_ANON</code> を書き換えてください。
    </div>
  );
}

/* ══════════════════════════════════
   教師認証
══════════════════════════════════ */
function TeacherAuth({ onLogin, toast }) {
  const [tab, setTab] = useState('login');
  return (
    <div className="main" style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'calc(100vh - 58px)'}}>
      <div className="form-box" style={{maxWidth:460}}>
        <div style={{textAlign:'center',marginBottom:20}}><Kamon size={52}/></div>
        <ConfigBanner/>
        <div className="tab-row">
          <button className={`tab-btn ${tab==='login'?'active':''}`} onClick={()=>setTab('login')}>ログイン</button>
          <button className={`tab-btn ${tab==='register'?'active':''}`} onClick={()=>setTab('register')}>新規登録申請</button>
        </div>
        {tab==='login' ? <TeacherLogin onLogin={onLogin} toast={toast}/> : <TeacherRegister onDone={()=>setTab('login')} toast={toast}/>}
      </div>
    </div>
  );
}
function TeacherLogin({ onLogin, toast }) {
  const [tid,setTid]=useState(''); const [pass,setPass]=useState(''); const [err,setErr]=useState(''); const [loading,setLoading]=useState(false);
  const handle = async () => {
    if (!tid.trim()||!pass){setErr('教師IDとパスワードを入力してください');return;}
    setLoading(true); setErr('');
    try {
      const teacher = await DB.verifyTeacher(tid.trim(), pass);
      if (!teacher){setErr('IDまたはパスワードが違います');return;}
      onLogin({ uid:teacher.id, teacherId:teacher.teacher_id, displayName:teacher.teacher_id });
    } catch(e){setErr('エラー: '+e.message);}
    finally{setLoading(false);}
  };
  return (
    <>
      <div className="form-group"><label className="form-label">教師ID</label><input className="form-input" placeholder="例: tanaka_sensei" value={tid} onChange={e=>{setTid(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&handle()}/></div>
      <div className="form-group"><label className="form-label">パスワード</label><input className="form-input" type="password" value={pass} onChange={e=>{setPass(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&handle()}/></div>
      {err&&<div style={{color:'var(--crimson)',fontSize:13,marginBottom:12}}>{err}</div>}
      <button className="btn btn-primary btn-full btn-lg" onClick={handle} disabled={loading}>{loading?<><span className="spinner"/> ログイン中…</>:'ログイン'}</button>
    </>
  );
}
function TeacherRegister({ onDone, toast }) {
  const [tid,setTid]=useState(''); const [pass,setPass]=useState(''); const [pass2,setPass2]=useState(''); const [err,setErr]=useState(''); const [loading,setLoading]=useState(false); const [done,setDone]=useState(false);
  const handle = async () => {
    if (!tid.trim()){setErr('教師IDを入力してください');return;}
    if (pass.length<6){setErr('パスワードは6文字以上');return;}
    if (pass!==pass2){setErr('パスワードが一致しません');return;}
    setLoading(true); setErr('');
    try {
      const existing = await DB.findTeacher(tid.trim());
      if (existing){setErr('このIDは既に登録されています');setLoading(false);return;}
      await DB.createApplication({ id:genId(), teacher_id:tid.trim(), password_hash:pass, status:'pending', applied_at:new Date().toISOString() });
      setDone(true); toast.show('申請を送信しました','success');
    } catch(e){setErr('エラー: '+e.message);}
    finally{setLoading(false);}
  };
  if (done) return (
    <div style={{textAlign:'center',padding:'20px 0'}}>
      <div style={{fontSize:48,marginBottom:12}}>📬</div>
      <div style={{fontFamily:'Noto Serif JP',fontSize:17,fontWeight:700,color:'var(--crimson-dk)',marginBottom:8}}>申請を送信しました</div>
      <div style={{fontSize:13,color:'var(--stone)',lineHeight:1.8,marginBottom:20}}>既存の教師全員の承認後にログインできます。<br/>（教師がいない場合は即時承認）</div>
      <button className="btn btn-ghost btn-full" onClick={onDone}>ログイン画面へ</button>
    </div>
  );
  return (
    <>
      <div className="form-group"><label className="form-label">教師ID <span style={{color:'var(--crimson)'}}>*</span></label><input className="form-input" placeholder="例: tanaka_sensei" value={tid} onChange={e=>{setTid(e.target.value);setErr('');}} maxLength={30}/><div className="form-hint">半角英数字・アンダースコア使用可</div></div>
      <div className="form-group"><label className="form-label">パスワード <span style={{color:'var(--crimson)'}}>*</span></label><input className="form-input" type="password" placeholder="6文字以上" value={pass} onChange={e=>{setPass(e.target.value);setErr('');}}/></div>
      <div className="form-group"><label className="form-label">パスワード（確認）</label><input className="form-input" type="password" value={pass2} onChange={e=>{setPass2(e.target.value);setErr('');}}/></div>
      {err&&<div style={{color:'var(--crimson)',fontSize:13,marginBottom:12}}>{err}</div>}
      <button className="btn btn-primary btn-full btn-lg" onClick={handle} disabled={loading}>{loading?<><span className="spinner"/> 申請中…</>:'登録申請する'}</button>
    </>
  );
}

/* ── 課題管理タブ ── */
function TasksTab({ teacher, onCreate, onEdit, onReview, toast }) {
  const [tasks,setTasks]=useState([]); const [loading,setLoading]=useState(true); const [subCounts,setSubCounts]=useState({}); const [filter,setFilter]=useState('all'); const [showApprovals,setShowApprovals]=useState(false); const [applications,setApplications]=useState([]); const [appVotes,setAppVotes]=useState({}); const [teachers,setTeachers]=useState([]); const [appLoading,setAppLoading]=useState(false);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const ts = await DB.getTasks(); setTasks(ts);
      const counts = {};
      await Promise.all(ts.map(async t=>{ counts[t.id]=await DB.countSubmissions(t.id); }));
      setSubCounts(counts);
    } catch(e){toast.show('データ取得エラー: '+e.message,'error');}
    finally{setLoading(false);}
  },[]);
  useEffect(()=>{load();},[load]);

  const loadApprovals = async () => {
    setAppLoading(true);
    try {
      const apps = await DB.getApplications();
      const pending = apps.filter(a=>a.status==='pending');
      setApplications(pending);
      const votes = {};
      await Promise.all(pending.map(async a=>{votes[a.id]=await DB.getVotes(a.id);}));
      setAppVotes(votes);
      setTeachers(await DB.getTeachers());
    } catch(e){toast.show('取得エラー: '+e.message,'error');}
    finally{setAppLoading(false);}
  };

  const handleVote = async (app, approve) => {
    try {
      await DB.vote(app.id, teacher.teacherId, approve);
      const updatedVotes = await DB.getVotes(app.id);
      const allTeachers  = await DB.getTeachers();
      if (updatedVotes.some(v=>!v.approve)) {
        await DB.rejectApplication(app.id);
        toast.show(`${app.teacher_id} の申請を却下しました`);
      } else if (updatedVotes.filter(v=>v.approve).length >= allTeachers.length && allTeachers.length>0) {
        await DB.approveApplication(app.id, app.teacher_id, app.password_hash);
        toast.show(`${app.teacher_id} を教師として承認しました！`,'success');
      } else {
        toast.show(approve?'承認票を入れました':'否決票を入れました', approve?'success':'default');
      }
      loadApprovals();
    } catch(e){toast.show('エラー: '+e.message,'error');}
  };

  const togglePublish = async (task) => {
    try {
      await DB.updateTask(task.id, {isPublished:!task.isPublished});
      toast.show(task.isPublished?'非公開にしました':'公開しました', task.isPublished?'default':'success');
      load();
    } catch(e){toast.show('更新エラー','error');}
  };
  const deleteTask = async (task) => {
    if (!window.confirm(`「${task.title}」を削除しますか？`)) return;
    try { await DB.deleteTask(task.id); toast.show('削除しました'); load(); } catch(e){toast.show('削除エラー','error');}
  };
  const copyCode = (code) => { navigator.clipboard?.writeText(code).catch(()=>{}); toast.show('コードをコピーしました','success'); };

  const totalSubs = Object.values(subCounts).reduce((a,b)=>a+b,0);
  const filtered = tasks.filter(t=>filter==='published'?t.isPublished:filter==='draft'?!t.isPublished:true);

  return (
    <>
      <div className="stat-row">
        <div className="stat-box"><div className="stat-num">{tasks.length}</div><div className="stat-label">課題数</div></div>
        <div className="stat-box"><div className="stat-num">{tasks.filter(t=>t.isPublished).length}</div><div className="stat-label">公開中</div></div>
        <div className="stat-box"><div className="stat-num">{tasks.filter(t=>!t.isPublished).length}</div><div className="stat-label">非公開</div></div>
        <div className="stat-box"><div className="stat-num">{totalSubs}</div><div className="stat-label">提出件数</div></div>
      </div>
      <div className="dashboard-header">
        <div className="dashboard-title">課題一覧</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>{setShowApprovals(true);loadApprovals();}}>👥 教師管理</button>
          <button className="btn btn-ghost btn-sm" onClick={load} disabled={loading}>{loading?<span className="spinner dark"/>:'↻'} 更新</button>
          <button className="btn btn-primary" onClick={onCreate}>＋ 新しい課題</button>
        </div>
      </div>
      <div className="filter-tabs">
        <button className={`filter-tab ${filter==='all'?'active':''}`} onClick={()=>setFilter('all')}>すべて ({tasks.length})</button>
        <button className={`filter-tab ${filter==='published'?'active':''}`} onClick={()=>setFilter('published')}>🟢 公開中 ({tasks.filter(t=>t.isPublished).length})</button>
        <button className={`filter-tab ${filter==='draft'?'active':''}`} onClick={()=>setFilter('draft')}>⬜ 非公開 ({tasks.filter(t=>!t.isPublished).length})</button>
      </div>
      {loading ? (
        <div style={{textAlign:'center',padding:'60px 0'}}><span className="spinner dark" style={{width:32,height:32,borderWidth:4}}/></div>
      ) : filtered.length===0 ? (
        <div style={{textAlign:'center',padding:'60px 0',color:'var(--stone)'}}>
          <div style={{fontSize:48,marginBottom:12}}>📋</div>
          <div>{filter==='all'?'まだ課題がありません':filter==='published'?'公開中の課題はありません':'非公開の課題はありません'}</div>
        </div>
      ) : (
        <div className="task-grid">
          {filtered.map(task=>(
            <div key={task.id} className="task-card">
              <div className="task-card-top">
                <div className="task-card-title">{task.title}</div>
                <span className={`badge ${task.isPublished?'badge-published':'badge-draft'}`}>{task.isPublished?'公開中':'非公開'}</span>
              </div>
              {task.description&&<div className="task-card-meta">{task.description}</div>}
              <div>
                <div className="text-muted" style={{fontSize:11,marginBottom:4}}>アクセスコード</div>
                <div className="task-card-code" style={{cursor:'pointer'}} onClick={()=>copyCode(task.accessCode)}>
                  {task.accessCode} <span style={{fontSize:11,marginLeft:8,opacity:.6}}>📋</span>
                </div>
              </div>
              {(task.explanationText||task.explanationImageUrl)&&<div style={{fontSize:11,color:'var(--gold)',fontWeight:700}}>💡 解説あり</div>}
              <div className="task-card-meta">回答欄 {(task.answerFields||[]).length} 個 ・ 提出 {subCounts[task.id]||0} 件</div>
              <div className="task-card-actions">
                <button className="btn btn-sm btn-secondary" onClick={()=>togglePublish(task)}>{task.isPublished?'非公開にする':'公開する'}</button>
                <button className="btn btn-sm btn-ghost" onClick={()=>onEdit(task)}>✏️ 編集</button>
                <button className="btn btn-sm btn-ghost" onClick={()=>onReview(task)}>回答確認</button>
                <button className="btn btn-sm btn-ghost" style={{color:'var(--crimson)'}} onClick={()=>deleteTask(task)}>削除</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* 教師管理モーダル */}
      {showApprovals&&(
        <div className="modal-overlay" onClick={()=>setShowApprovals(false)}>
          <div className="modal modal-wide" onClick={e=>e.stopPropagation()} style={{maxHeight:'85vh',overflowY:'auto'}}>
            <div className="modal-title">👥 教師管理</div>
            {appLoading?(<div style={{textAlign:'center',padding:'40px 0'}}><span className="spinner dark" style={{width:28,height:28,borderWidth:3}}/></div>):(
              <>
                <div style={{fontWeight:700,fontSize:14,color:'var(--crimson-dk)',marginBottom:10}}>承認待ちの申請 ({applications.length}件)</div>
                {applications.length===0?(
                  <div style={{fontSize:13,color:'var(--stone)',marginBottom:20,padding:'12px',background:'var(--paper)',borderRadius:8}}>承認待ちの申請はありません</div>
                ):(
                  <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:20}}>
                    {applications.map(app=>{
                      const votes=appVotes[app.id]||[];
                      const myVote=votes.find(v=>v.teacher_id===teacher.teacherId);
                      return (
                        <div key={app.id} className="approval-item">
                          <div className="approval-item-info">
                            <div className="approval-item-id">🆔 {app.teacher_id}</div>
                            <div className="approval-item-meta">申請日時: {app.applied_at?.slice(0,16).replace('T',' ')}</div>
                            <div className="approval-votes">承認票: <span className="vote-count">{votes.filter(v=>v.approve).length}</span>/{teachers.length}人{myVote&&<span style={{marginLeft:8,fontSize:11,color:myVote.approve?'#065F46':'#991B1B',fontWeight:700}}>{myVote.approve?'✓承認済み':'✕否決済み'}</span>}</div>
                          </div>
                          {!myVote&&<div style={{display:'flex',gap:6}}><button className="btn btn-sm btn-approve" onClick={()=>handleVote(app,true)}>✓ 承認</button><button className="btn btn-sm btn-reject" onClick={()=>handleVote(app,false)}>✕ 否決</button></div>}
                        </div>
                      );
                    })}
                  </div>
                )}
                <div className="divider"/>
                <div style={{fontWeight:700,fontSize:14,color:'var(--crimson-dk)',marginBottom:10}}>承認済み教師 ({teachers.filter(t=>t.is_approved).length}人)</div>
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {teachers.filter(t=>t.is_approved).map(t=>(
                    <div key={t.id} className="teacher-list-item">
                      <span style={{fontSize:18}}>👤</span>
                      <span className="teacher-list-item-id">{t.teacher_id}</span>
                      {t.teacher_id===teacher.teacherId&&<span style={{fontSize:11,color:'var(--stone)'}}>（あなた）</span>}
                    </div>
                  ))}
                </div>
              </>
            )}
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setShowApprovals(false)}>閉じる</button>
              <button className="btn btn-secondary btn-sm" onClick={loadApprovals}>↻ 更新</button>
            </div>
          </div>
        </div>
      )}
      {/* 生徒申請管理 */}
      <StudentApprovalSection teacher={teacher} toast={toast}/>
    </>
  );
}
function ScoringTab({ teacher, toast }) {
  const [tasks,setTasks]=useState([]); const [selTask,setSelTask]=useState(null); const [subs,setSubs]=useState([]); const [scorings,setScorings]=useState([]); const [config,setConfig]=useState({}); const [loading,setLoading]=useState(false); const [saving,setSaving]=useState(false);

  useEffect(()=>{
    DB.getTasks().then(setTasks).catch(e=>toast.show('取得エラー','error'));
  },[]);

  const selectTask = async (task) => {
    setSelTask(task); setLoading(true);
    try {
      const [s, sc, cfg] = await Promise.all([DB.getSubmissions(task.id), DB.getScorings(task.id), DB.getScoringConfig(task.id)]);
      setSubs(s); setScorings(sc); setConfig(cfg);
    } catch(e){toast.show('取得エラー: '+e.message,'error');}
    finally{setLoading(false);}
  };

  const getMark = (submissionId, fieldId) => {
    const s = scorings.find(s=>s.submission_id===submissionId&&s.field_id===fieldId);
    return s ? s.mark : null;
  };

  const setMark = async (submissionId, fieldId, mark) => {
    try {
      await DB.saveScoring(selTask.id, submissionId, fieldId, mark);
      setScorings(prev=>{
        const filtered = prev.filter(s=>!(s.submission_id===submissionId&&s.field_id===fieldId));
        return [...filtered, {submission_id:submissionId, field_id:fieldId, mark, task_id:selTask.id}];
      });
    } catch(e){toast.show('保存エラー: '+e.message,'error');}
  };

  const saveConfig = async () => {
    if (!selTask) return;
    setSaving(true);
    try { await DB.saveScoringConfig(selTask.id, config); toast.show('配点を保存しました','success'); }
    catch(e){toast.show('保存エラー: '+e.message,'error');}
    finally{setSaving(false);}
  };

  const calcScore = (sub) => {
    const fields = selTask.answerFields||[];
    let total=0, earned=0;
    fields.forEach(f=>{
      const pts = Number(config[f.id]||0);
      total += pts;
      const mark = getMark(sub.id, f.id);
      if (mark==='correct') earned+=pts;
      else if (mark==='partial') earned+=Math.floor(pts/2);
    });
    return {earned, total};
  };

  const markLabels = {correct:'○', partial:'△', wrong:'✕'};
  const markColors = {correct:'#065F46', partial:'#D97706', wrong:'#DC2626'};

  if (!selTask) return (
    <div>
      <div className="dashboard-title" style={{marginBottom:20}}>採点する課題を選択</div>
      {tasks.length===0?(
        <div style={{textAlign:'center',padding:'40px',color:'var(--stone)'}}>課題がありません</div>
      ):(
        <div className="task-grid">
          {tasks.map(task=>(
            <div key={task.id} className="task-card" style={{cursor:'pointer'}} onClick={()=>selectTask(task)}>
              <div className="task-card-title">{task.title}</div>
              <div className="task-card-meta">{task.description}</div>
              <div style={{marginTop:4}}><span className={`badge ${task.isPublished?'badge-published':'badge-draft'}`}>{task.isPublished?'公開中':'非公開'}</span></div>
              <div className="task-card-meta">回答欄 {(task.answerFields||[]).length} 個</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );

  const fields = selTask.answerFields||[];

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20,flexWrap:'wrap'}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setSelTask(null)}>← 課題一覧</button>
        <div className="dashboard-title">{selTask.title} — 採点</div>
      </div>

      {/* 配点設定 */}
      <div className="side-panel" style={{marginBottom:24}}>
        <div className="side-panel-title">⚖️ 配点設定（問題ごとの点数）</div>
        <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'flex-end'}}>
          {fields.map(f=>(
            <div key={f.id} style={{display:'flex',flexDirection:'column',gap:4,minWidth:80}}>
              <label style={{fontSize:12,fontWeight:700,color:'var(--stone)'}}>{f.label}</label>
              <input className="form-input" type="number" min="0" max="100" style={{width:80,textAlign:'center',padding:'8px'}}
                value={config[f.id]||''} placeholder="0"
                onChange={e=>setConfig(c=>({...c,[f.id]:e.target.value}))}/>
            </div>
          ))}
          <button className="btn btn-gold btn-sm" onClick={saveConfig} disabled={saving}>
            {saving?<><span className="spinner dark"/> 保存中…</>:'💾 配点を保存'}
          </button>
        </div>
        <div style={{fontSize:12,color:'var(--stone)'}}>
          合計配点: {fields.reduce((s,f)=>s+Number(config[f.id]||0),0)} 点　
          △は配点の半分として計算されます
        </div>
      </div>

      {/* 採点テーブル */}
      {loading?(
        <div style={{textAlign:'center',padding:'40px'}}><span className="spinner dark" style={{width:28,height:28,borderWidth:3}}/></div>
      ):subs.length===0?(
        <div style={{textAlign:'center',padding:'60px',color:'var(--stone)'}}>
          <div style={{fontSize:40,marginBottom:10}}>📭</div>まだ提出がありません
        </div>
      ):(
        <div style={{overflowX:'auto'}}>
          <table className="sub-table">
            <thead>
              <tr>
                <th>生徒</th>
                <th>提出日時</th>
                {fields.map(f=>(
                  <th key={f.id}>
                    {f.label}<br/>
                    <span style={{fontWeight:400,color:'var(--stone)'}}>{config[f.id]||0}点</span>
                  </th>
                ))}
                <th>得点</th>
              </tr>
            </thead>
            <tbody>
              {subs.map(sub=>{
                const {earned,total}=calcScore(sub);
                return (
                  <tr key={sub.id}>
                    <td><strong>{sub.nickname}</strong></td>
                    <td className="mono" style={{fontSize:11}}>{sub.submittedAt?.slice(0,16).replace('T',' ')}</td>
                    {fields.map(f=>{
                      const mark=getMark(sub.id,f.id);
                      return (
                        <td key={f.id}>
                          <div style={{fontSize:11,color:'var(--stone)',marginBottom:4}}>
                            <span className="answer-chip">{sub.answers[f.id]||'—'}</span>
                          </div>
                          <div style={{display:'flex',gap:4}}>
                            {['correct','partial','wrong'].map(m=>(
                              <button key={m} className={`mark-btn ${m} ${mark===m?'active':''}`}
                                title={m==='correct'?'正解':m==='partial'?'部分点':'不正解'}
                                onClick={()=>setMark(sub.id,f.id,m)}>
                                {markLabels[m]}
                              </button>
                            ))}
                          </div>
                        </td>
                      );
                    })}
                    <td>
                      <span className="score-total">{earned}</span>
                      <span style={{fontSize:12,color:'var(--stone)'}}> / {total}</span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════
