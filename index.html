function WhiteboardTab({ teacher, toast }) {
  const [tasks,setTasks]             = useState([]);
  const [isLive,setIsLive]           = useState(false);
  const [sessionCode,setSessionCode] = useState('');
  const [selTaskId,setSelTaskId]     = useState('');
  const [selTask,setSelTask]         = useState(null);
  const [showStart,setShowStart]     = useState(false);
  const [tool,setTool]               = useState('pen');
  const [color,setColor]             = useState('#1A1410');
  const [lineWidth,setLineWidth]     = useState(3);
  const [undoStack,setUndoStack]     = useState([]);
  const [students,setStudents]       = useState([]);
  const [perms,setPerms]             = useState({});
  const [permTab,setPermTab]         = useState('wb');

  /* refs – event handlers always read latest values */
  const canvasRef    = useRef(null);
  const bgCanvasRef  = useRef(null);
  const channelRef   = useRef(null);
  const sessionIdRef = useRef(null);
  const isLiveRef    = useRef(false);
  const toolRef      = useRef('pen');
  const colorRef     = useRef('#1A1410');
  const lwRef        = useRef(3);
  const drawing      = useRef(false);
  const startPos     = useRef({x:0,y:0});
  const strokeSnap   = useRef(null);

  useEffect(()=>{ DB.getTasks().then(setTasks).catch(()=>{}); },[]);
  useEffect(()=>{ loadStudentsAndPerms(); },[]);

  const loadStudentsAndPerms = async () => {
    try {
      const studs = await DB.getStudents();
      setStudents(studs);
      const permMap = {};
      await Promise.all(studs.map(async s => {
        permMap[s.student_id] = await DB.getStudentPermissions(s.student_id);
      }));
      setPerms(permMap);
    } catch(e) {}
  };

  const togglePerm = async (studentId, type) => {
    const current = perms[studentId] || { wb_write_enabled: false, vc_enabled: false };
    const newWb = type === 'wb' ? !current.wb_write_enabled : current.wb_write_enabled;
    const newVc = type === 'vc' ? !current.vc_enabled       : current.vc_enabled;
    try {
      await DB.setStudentPermissions(studentId, newWb, newVc);
      setPerms(p => ({ ...p, [studentId]: { ...current, wb_write_enabled: newWb, vc_enabled: newVc } }));
      toast.show(`${studentId} の権限を更新しました`, 'success');
    } catch(e) { toast.show('権限更新エラー: '+e.message, 'error'); }
  };

  /* sync refs */
  useEffect(()=>{ isLiveRef.current = isLive; },  [isLive]);
  useEffect(()=>{ toolRef.current   = tool; },    [tool]);
  useEffect(()=>{ colorRef.current  = color; },   [color]);
  useEffect(()=>{ lwRef.current     = lineWidth; },[lineWidth]);

  /* canvas size */
  useEffect(()=>{
    const c=canvasRef.current; if(!c)return;
    c.width=900; c.height=600;
  },[]);

  /* 課題選択 → selTask */
  useEffect(()=>{
    if(!selTaskId){ setSelTask(null); return; }
    setSelTask(tasks.find(t=>t.id===selTaskId)||null);
  },[selTaskId,tasks]);

  /* 背景画像描画（薄く）– 背景専用キャンバスへ */
  useEffect(()=>{
    const c=canvasRef.current; if(!c)return;
    const ctx=c.getContext('2d');
    ctx.clearRect(0,0,c.width,c.height);
    if(selTask?.imageDataUrl){
      const img=new Image();
      img.onload=()=>{
        ctx.globalAlpha=0.25;
        ctx.drawImage(img,0,0,c.width,c.height);
        ctx.globalAlpha=1.0;
      };
      img.src=selTask.imageDataUrl;
    }
  },[selTask]);

  /* broadcast helper */
  const broadcast=(event,payload)=>{
    const ch=channelRef.current;
    if(!ch)return;
    ch.send({type:'broadcast',event,payload});
  };

  /* 配信開始 */
  const startLive=async()=>{
    if(!supabase){ toast.show('Supabase未設定','error'); return; }
    const code=genCode();
    const id=genId();
    try{
      await DB.createWbSession({id,access_code:code,task_id:selTaskId||null,is_live:true,created_by:teacher.teacherId,created_at:new Date().toISOString()});
    }catch(e){ toast.show('配信開始エラー: '+e.message,'error'); return; }

    sessionIdRef.current=id;

    const ch=supabase.channel('wb:'+code,{config:{broadcast:{self:false}}});
    ch.subscribe(status=>{
      if(status==='SUBSCRIBED'){
        channelRef.current=ch;
        setSessionCode(code);
        setIsLive(true);
        setShowStart(false);
        setUndoStack([]);
        toast.show('配信開始！コード: '+code,'success');
      }
    });
  };

  /* 配信終了 */
  const stopLive=async()=>{
    broadcast('end',{});
    const ch=channelRef.current;
    if(ch){ supabase.removeChannel(ch); channelRef.current=null; }
    const sid=sessionIdRef.current;
    if(sid){
      try{ await DB.clearWbStrokes(sid); await DB.endWbSession(sid); }catch(e){}
    }
    sessionIdRef.current=null;
    setIsLive(false); setSessionCode(''); setUndoStack([]);
    const c=canvasRef.current;
    if(c){ const ctx=c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height); }
    toast.show('配信を終了しました');
  };

  /* クリア（描画レイヤーのみ） */
  const clearCanvas=()=>{
    const c=canvasRef.current; if(!c)return;
    setUndoStack(s=>[...s,c.toDataURL('image/png')]);
    const ctx=c.getContext('2d');
    ctx.clearRect(0,0,c.width,c.height);
    /* 背景を再描画 */
    if(selTask?.imageDataUrl){
      const img=new Image();
      img.onload=()=>{ ctx.globalAlpha=0.25; ctx.drawImage(img,0,0,c.width,c.height); ctx.globalAlpha=1.0; broadcast('snapshot',{data:c.toDataURL('image/png')}); };
      img.src=selTask.imageDataUrl;
    } else {
      broadcast('clear',{});
    }
  };

  /* やり直し */
  const undo=()=>{
    if(!undoStack.length)return;
    const prev=undoStack[undoStack.length-1];
    setUndoStack(s=>s.slice(0,-1));
    const c=canvasRef.current; if(!c)return;
    const ctx=c.getContext('2d');
    ctx.clearRect(0,0,c.width,c.height);
    if(prev){
      const img=new Image();
      img.onload=()=>{ ctx.drawImage(img,0,0); broadcast('snapshot',{data:c.toDataURL('image/png')}); };
      img.src=prev;
    } else {
      broadcast('clear',{});
    }
  };

  /* pointer helpers */
  const getPos=(e,c)=>{
    const r=c.getBoundingClientRect();
    const sx=c.width/r.width, sy=c.height/r.height;
    const src=e.touches?e.touches[0]:e;
    return {x:(src.clientX-r.left)*sx, y:(src.clientY-r.top)*sy};
  };

  const onDown=(e)=>{
    if(!isLiveRef.current)return;
    e.preventDefault();
    const c=canvasRef.current; const ctx=c.getContext('2d');
    const pos=getPos(e,c);
    setUndoStack(s=>[...s,c.toDataURL('image/png')]);
    drawing.current=true; startPos.current=pos;
    strokeSnap.current=ctx.getImageData(0,0,c.width,c.height);
    if(toolRef.current==='pen'||toolRef.current==='eraser'){ ctx.beginPath(); ctx.moveTo(pos.x,pos.y); }
  };

  const onMove=(e)=>{
    if(!drawing.current||!isLiveRef.current)return;
    e.preventDefault();
    const c=canvasRef.current; const ctx=c.getContext('2d');
    const pos=getPos(e,c);
    ctx.lineCap='round'; ctx.lineJoin='round';

    if(toolRef.current==='eraser'){
      /* 消しゴム：destination-out で描画ピクセルのみ消す */
      ctx.globalCompositeOperation='destination-out';
      ctx.strokeStyle='rgba(0,0,0,1)';
      ctx.lineWidth=lwRef.current*4;
      ctx.lineTo(pos.x,pos.y); ctx.stroke();
      ctx.globalCompositeOperation='source-over';
    } else {
      ctx.strokeStyle=colorRef.current; ctx.lineWidth=lwRef.current;
      if(toolRef.current==='pen'){
        ctx.lineTo(pos.x,pos.y); ctx.stroke();
      } else {
        ctx.putImageData(strokeSnap.current,0,0);
        ctx.beginPath();
        if(toolRef.current==='line'){
          ctx.moveTo(startPos.current.x,startPos.current.y);
          ctx.lineTo(pos.x,pos.y); ctx.stroke();
        } else {
          const rx=Math.abs(pos.x-startPos.current.x)/2;
          const ry=Math.abs(pos.y-startPos.current.y)/2;
          const cx=startPos.current.x+(pos.x-startPos.current.x)/2;
          const cy=startPos.current.y+(pos.y-startPos.current.y)/2;
          ctx.ellipse(cx,cy,Math.max(1,rx),Math.max(1,ry),0,0,2*Math.PI); ctx.stroke();
        }
      }
    }
  };

  const onUp=(e)=>{
    if(!drawing.current||!isLiveRef.current)return;
    if(e.type!=='touchend') e.preventDefault();
    drawing.current=false;
    /* 消しゴム使用時はcompositeOperation戻す */
    const c=canvasRef.current;
    const ctx=c.getContext('2d');
    ctx.globalCompositeOperation='source-over';
    broadcast('snapshot',{data:c.toDataURL('image/png')});
  };

  const colors=['#1A1410','#9B1B30','#C9972C','#1E40AF','#065F46','#7C3AED','#FFFFFF'];

  return (
    <div className="wb-wrap">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10,marginBottom:8}}>
        <div className="dashboard-title">🖊 ホワイトボード</div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          {isLive&&(<>
            <div className="live-badge"><span className="live-dot"/>LIVE</div>
            <div style={{fontFamily:'DM Mono',fontSize:18,fontWeight:700,color:'var(--crimson)',letterSpacing:'.1em',background:'rgba(155,27,48,.07)',padding:'4px 12px',borderRadius:8}}>{sessionCode}</div>
            <button className="btn btn-ghost btn-sm" onClick={undo} disabled={!undoStack.length}>↩ やり直し</button>
            <button className="btn btn-ghost btn-sm" onClick={clearCanvas}>🗑 クリア</button>
            <button className="btn btn-reject btn-sm" onClick={stopLive}>⏹ 配信終了</button>
          </>)}
          {!isLive&&<button className="btn btn-live" onClick={()=>setShowStart(true)}>▶ 配信開始</button>}
        </div>
      </div>

      <div className="wb-toolbar">
        <span style={{fontSize:12,fontWeight:700,color:'var(--stone)'}}>ツール：</span>
        {[['pen','✏️','フリー'],['line','📏','直線'],['circle','⭕','楕円'],['eraser','🧹','消しゴム']].map(([t,icon,label])=>(
          <button key={t} className={`wb-tool-btn ${tool===t?'active':''}`} title={label} onClick={()=>setTool(t)}>{icon}</button>
        ))}
        <div style={{width:1,height:24,background:'var(--stone-lt)',margin:'0 4px'}}/>
        <span style={{fontSize:12,fontWeight:700,color:'var(--stone)'}}>色：</span>
        {colors.map(c=>(
          <div key={c} className={`wb-color-btn ${color===c?'active':''}`}
            style={{background:c,boxShadow:c==='#FFFFFF'?'inset 0 0 0 1px #ccc':undefined}}
            onClick={()=>setColor(c)}/>
        ))}
        <div style={{width:1,height:24,background:'var(--stone-lt)',margin:'0 4px'}}/>
        <span style={{fontSize:12,fontWeight:700,color:'var(--stone)'}}>太さ：</span>
        {[2,4,8,14].map(w=>(
          <button key={w} className={`wb-tool-btn ${lineWidth===w?'active':''}`}
            style={{fontSize:10,fontWeight:700}} onClick={()=>setLineWidth(w)}>{w}</button>
        ))}
      </div>

      <div style={{position:'relative',borderRadius:14,overflow:'hidden',boxShadow:'0 2px 12px var(--shadow)'}}>
        {/* 背景レイヤー（プリント薄表示）— アスペクト比を保持 */}
        {selTask?.imageDataUrl&&(
          <img src={selTask.imageDataUrl} alt="bg" style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'contain',opacity:0.25,pointerEvents:'none',background:'white'}}/>
        )}
        <canvas ref={canvasRef} className="wb-canvas"
          style={{width:'100%',cursor:isLive?(tool==='eraser'?'cell':'crosshair'):'not-allowed',opacity:isLive?1:.6,position:'relative',zIndex:1,background:'transparent'}}
          onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
          onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}/>
        {!isLive&&(
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(249,244,237,.75)',zIndex:2}}>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:48,marginBottom:12}}>🖊</div>
              <div style={{fontFamily:'Noto Serif JP',fontSize:16,fontWeight:700,color:'var(--stone)'}}>「配信開始」を押すと描けるようになります</div>
            </div>
          </div>
        )}
      </div>
      <div style={{fontSize:12,color:'var(--stone)'}}>配信中、生徒がLIVEコードを入力するとリアルタイムで板書が見られます</div>

      {/* 生徒権限管理 */}
      <div style={{background:'var(--white)',border:'2px solid var(--paper-dk)',borderRadius:14,padding:20,marginTop:8}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:8}}>
          <div style={{fontFamily:'Noto Serif JP',fontSize:15,fontWeight:700,color:'var(--crimson-dk)'}}>👥 生徒の権限管理</div>
          <div style={{display:'flex',gap:6}}>
            <button className={`btn btn-sm ${permTab==='wb'?'btn-primary':'btn-ghost'}`} onClick={()=>setPermTab('wb')}>🖊 板書許可</button>
            <button className={`btn btn-sm ${permTab==='vc'?'btn-primary':'btn-ghost'}`} onClick={()=>setPermTab('vc')}>🎤 VC</button>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={loadStudentsAndPerms}>↻ 更新</button>
        </div>
        {students.length===0?(
          <div style={{textAlign:'center',padding:'20px 0',color:'var(--stone)',fontSize:13}}>登録済みの生徒がいません</div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {students.map(s=>{
              const p = perms[s.student_id]||{wb_write_enabled:false,vc_enabled:false};
              const isOn = permTab==='vc' ? p.vc_enabled : p.wb_write_enabled;
              return (
                <div key={s.student_id} className="perm-toggle">
                  <div style={{flex:1}}>
                    <div className="perm-toggle-label">{s.student_id}</div>
                    <div className="perm-toggle-desc">{permTab==='vc'?'音声通話':'ホワイトボードへの書き込み'}</div>
                  </div>
                  <button className={`toggle-btn ${isOn?'on':'off'}`} onClick={()=>togglePerm(s.student_id, permTab)}>
                    <div className="toggle-knob"/>
                  </button>
                  <span style={{fontSize:12,fontWeight:700,color:isOn?'var(--crimson)':'var(--stone)',minWidth:24}}>{isOn?'ON':'OFF'}</span>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {showStart&&(
        <div className="modal-overlay" onClick={()=>setShowStart(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">▶ 配信を開始する</div>
            <div className="form-group">
              <label className="form-label">関連課題（任意）</label>
              <select className="form-select" value={selTaskId} onChange={e=>setSelTaskId(e.target.value)}>
                <option value="">── 白紙ボード ──</option>
                {tasks.map(t=><option key={t.id} value={t.id}>{t.title}</option>)}
              </select>
              <div className="form-hint">選択した課題のプリントが薄く背景に表示されます</div>
            </div>
            {selTask?.imageDataUrl&&(
              <img src={selTask.imageDataUrl} alt="プレビュー"
                style={{width:'100%',borderRadius:8,border:'2px solid var(--paper-dk)',marginBottom:12,maxHeight:140,objectFit:'contain',background:'#f5f5f5'}}/>
            )}
            <div style={{background:'var(--paper)',borderRadius:10,padding:14,fontSize:13,color:'var(--stone)',lineHeight:1.8}}>
              配信するとLIVEコードが発行されます。生徒はそのコードを入力すると板書をリアルタイムで視聴できます。
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setShowStart(false)}>キャンセル</button>
              <button className="btn btn-live" onClick={startLive}>▶ 今すぐ配信開始</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── 生徒：ホワイトボード視聴（Broadcast版） ── */
function WhiteboardViewer({ session, nickname, onBack }) {
  const canvasRef=useRef(null);
  const [ended,setEnded]=useState(false);

  useEffect(()=>{
    if(!supabase||!session)return;
    const c=canvasRef.current; if(!c)return;
    c.width=900; c.height=600;

    /* Broadcastチャンネルを購読 – DBのReplication設定不要 */
    const ch=supabase.channel('wb:'+session.access_code,{
      config:{broadcast:{self:false}}
    })
    .on('broadcast',{event:'snapshot'},msg=>{
      const data=msg.payload?.data; if(!data)return;
      const img=new Image();
      img.onload=()=>{
        const ctx=c.getContext('2d');
        ctx.clearRect(0,0,c.width,c.height);
        ctx.drawImage(img,0,0,c.width,c.height);
      };
      img.src=data;
    })
    .on('broadcast',{event:'clear'},()=>{
      const ctx=c.getContext('2d');
      ctx.clearRect(0,0,c.width,c.height);
    })
    .on('broadcast',{event:'end'},()=>{
      setEnded(true);
    })
    .subscribe();

    return()=>{ supabase.removeChannel(ch); };
  },[session]);

  if(ended)return(
    <div className="done-page">
      <div className="done-icon">📺</div>
      <div className="done-title">配信終了</div>
      <div className="done-sub">先生が配信を終了しました。<br/>お疲れ様でした！</div>
      <button className="btn btn-ghost mt-16" onClick={onBack||(() =>window.location.reload())}>戻る</button>
    </div>
  );

  return(
    <div style={{maxWidth:960,margin:'0 auto',padding:'20px 16px',display:'flex',flexDirection:'column',gap:16}}>
      <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
        {onBack&&<button className="btn btn-ghost btn-sm" onClick={onBack}>← 戻る</button>}
        <div className="live-badge"><span className="live-dot"/>LIVE 視聴中</div>
        <div style={{fontFamily:'Noto Serif JP',fontSize:16,fontWeight:700,color:'var(--crimson-dk)'}}>先生のホワイトボード</div>
        <div style={{marginLeft:'auto',fontSize:13,color:'var(--stone)'}}>👤 {nickname}</div>
      </div>
      <div style={{borderRadius:14,overflow:'hidden',boxShadow:'0 2px 12px var(--shadow)'}}>
        <canvas ref={canvasRef} style={{width:'100%',display:'block',background:'white'}}/>
      </div>
      <div style={{fontSize:12,color:'var(--stone)',textAlign:'center'}}>先生が書いた内容がリアルタイムで表示されます</div>
    </div>
  );
}

/* ══════════════════════════════════
   課題作成
══════════════════════════════════ */
function TaskCreator({ teacher, onDone, toast }) {
  const [title,setTitle]=useState(''); const [desc,setDesc]=useState('');
  const [imgUrl,setImgUrl]=useState(null); const [fields,setFields]=useState([]);
  const [selField,setSelField]=useState(null); const [drawing,setDrawing]=useState(null);
  const [mode,setMode]=useState('text'); const [step,setStep]=useState(1);
  const [saving,setSaving]=useState(false);
  const [showLabelModal,setShowLabelModal]=useState(false); const [pendingField,setPendingField]=useState(null); const [labelInput,setLabelInput]=useState('');
  /* 解説 */
  const [expText,setExpText]=useState(''); const [expImg,setExpImg]=useState(null);

  const canvasRef=useRef(null); const fileRef=useRef(null); const expImgRef=useRef(null);

  const getPct=(clientX,clientY)=>{const rect=canvasRef.current.getBoundingClientRect();return{x:Math.max(0,Math.min(100,((clientX-rect.left)/rect.width)*100)),y:Math.max(0,Math.min(100,((clientY-rect.top)/rect.height)*100))};};
  const getClient=(e)=>e.touches?.length?{clientX:e.touches[0].clientX,clientY:e.touches[0].clientY}:{clientX:e.clientX,clientY:e.clientY};
  const onPointerDown=(e)=>{if(!imgUrl)return;e.preventDefault();const{clientX,clientY}=getClient(e);const p=getPct(clientX,clientY);setDrawing({x0:p.x,y0:p.y,x1:p.x,y1:p.y});setSelField(null);};
  const onPointerMove=(e)=>{if(!drawing)return;e.preventDefault();const{clientX,clientY}=getClient(e);const p=getPct(clientX,clientY);setDrawing(d=>({...d,x1:p.x,y1:p.y}));};
  const onPointerUp=(e)=>{if(!drawing)return;e.preventDefault();const x=Math.min(drawing.x0,drawing.x1),y=Math.min(drawing.y0,drawing.y1),w=Math.abs(drawing.x1-drawing.x0),h=Math.abs(drawing.y1-drawing.y0);setDrawing(null);if(w<1||h<1)return;const nf={id:genId(),type:mode,x,y,width:w,height:h,label:`問${fields.length+1}`};setPendingField(nf);setLabelInput(nf.label);setShowLabelModal(true);};
  const confirmLabel=()=>{const f={...pendingField,label:labelInput||pendingField.label};setFields(fs=>[...fs,f]);setSelField(f.id);setShowLabelModal(false);setPendingField(null);};
  const deleteField=(id)=>{setFields(fs=>fs.filter(f=>f.id!==id));if(selField===id)setSelField(null);};
  const handleFile=(file)=>{if(!file)return;if(!file.type.startsWith('image/')&&file.type!=='application/pdf'){toast.show('画像またはPDFを選択してください','error');return;}const reader=new FileReader();reader.onload=(ev)=>{setImgUrl(ev.target.result);setStep(3);};reader.readAsDataURL(file);};
  const handleExpImg=(file)=>{if(!file)return;const reader=new FileReader();reader.onload=(ev)=>setExpImg(ev.target.result);reader.readAsDataURL(file);};

  const save=async()=>{
    if(!title.trim()){toast.show('課題タイトルを入力してください','error');return;}
    setSaving(true);
    try {
      await DB.createTask({id:genId(),title:title.trim(),description:desc.trim(),imageDataUrl:imgUrl,accessCode:genCode(),createdBy:teacher.teacherId,isPublished:false,answerFields:fields,explanationText:expText.trim(),explanationImageUrl:expImg});
      toast.show('課題を保存しました','success');
      onDone();
    } catch(e){toast.show('保存エラー: '+e.message,'error');}
    finally{setSaving(false);}
  };

  const drawRect=drawing?{left:Math.min(drawing.x0,drawing.x1)+'%',top:Math.min(drawing.y0,drawing.y1)+'%',width:Math.abs(drawing.x1-drawing.x0)+'%',height:Math.abs(drawing.y1-drawing.y0)+'%'}:null;

  const stepLabels=['課題情報','プリントアップロード','回答欄の配置','解説を設定'];

  return (
    <div className="main">
      <div className="flex-row" style={{marginBottom:20,gap:6,flexWrap:'wrap'}}>
        <button className="btn btn-ghost btn-sm" onClick={onDone}>← 戻る</button>
        <div style={{flex:1}}/>
        {stepLabels.map((s,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:4,opacity:step===i+1?1:.45,fontSize:12,fontWeight:step===i+1?700:400,color:step===i+1?'var(--crimson)':'var(--stone)'}}>
            <div style={{width:20,height:20,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,background:step>i?'var(--crimson)':step===i+1?'var(--crimson)':'var(--paper-dk)',color:step>=i+1?'white':'var(--stone)',fontWeight:700}}>{i+1}</div>
            <span style={{display:window.innerWidth<600?'none':'inline'}}>{s}</span>
          </div>
        ))}
      </div>

      {/* Step1: 課題情報 */}
      {step===1&&(
        <div className="form-box" style={{maxWidth:560}}>
          <div className="form-title">① 課題情報を入力</div>
          <div className="form-group"><label className="form-label">課題タイトル <span style={{color:'var(--crimson)'}}>*</span></label><input className="form-input" placeholder="例: 一次方程式 練習プリント①" value={title} onChange={e=>setTitle(e.target.value)}/></div>
          <div className="form-group"><label className="form-label">説明（任意）</label><textarea className="form-textarea" placeholder="例: 教科書 p.42〜43 の問題です" value={desc} onChange={e=>setDesc(e.target.value)}/></div>
          <button className="btn btn-primary btn-full mt-8" disabled={!title.trim()} onClick={()=>setStep(2)}>次へ →</button>
        </div>
      )}

      {/* Step2: Upload */}
      {step===2&&(
        <div className="form-box" style={{maxWidth:560}}>
          <div className="form-title">② プリントをアップロード</div>
          <div className="upload-zone" onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();handleFile(e.dataTransfer.files?.[0]);}} onClick={()=>fileRef.current.click()}>
            <div className="big">📄</div>
            <p>クリックまたはドラッグ＆ドロップで<br/>画像（PNG/JPG）またはPDFをアップロード</p>
            <input ref={fileRef} type="file" accept="image/*,application/pdf" style={{display:'none'}} onChange={e=>handleFile(e.target.files?.[0])}/>
          </div>
          <div className="divider"/>
          <div style={{textAlign:'center'}}><div className="text-muted" style={{marginBottom:12}}>または</div><button className="btn btn-ghost btn-full" onClick={()=>{setImgUrl(null);setStep(3);}}>画像なしで進む</button></div>
          <button className="btn btn-ghost btn-sm mt-16" onClick={()=>setStep(1)}>← 戻る</button>
        </div>
      )}

      {/* Step3: Fields */}
      {step===3&&(
        <>
          <div className="creator-layout">
            <div className="canvas-wrapper">
              <div className="canvas-toolbar">
                <span style={{fontSize:12,fontWeight:700,color:'var(--stone)'}}>回答欄の種類：</span>
                <button className={`btn btn-sm ${mode==='text'?'btn-primary':'btn-ghost'}`} onClick={()=>setMode('text')}>📝 テキスト</button>
                <button className={`btn btn-sm ${mode==='number'?'btn-primary':'btn-ghost'}`} onClick={()=>setMode('number')}>🔢 数値</button>
                <div style={{flex:1}}/><span style={{fontSize:11,color:'var(--stone)'}}>{imgUrl?'ドラッグして配置':'プリントなし'}</span>
              </div>
              <div className="canvas-area" ref={canvasRef} onMouseDown={onPointerDown} onMouseMove={onPointerMove} onMouseUp={onPointerUp} onTouchStart={onPointerDown} onTouchMove={onPointerMove} onTouchEnd={onPointerUp}>
                {imgUrl?(<>
                  <img src={imgUrl} alt="プリント" draggable={false}/>
                  {fields.map(f=>(<div key={f.id} className={`field-overlay ${selField===f.id?'selected':''}`} style={{left:f.x+'%',top:f.y+'%',width:f.width+'%',height:f.height+'%'}} onClick={e=>{e.stopPropagation();setSelField(f.id);}}><div className="field-label-chip">{f.label}</div><span style={{fontSize:10,opacity:.6,pointerEvents:'none'}}>{f.type==='number'?'🔢':'📝'}</span></div>))}
                  {drawRect&&<div className="draw-rect" style={drawRect}/>}
                </>):(
                  <div className="canvas-placeholder"><div className="big-icon">📋</div><p>プリット画像なしモード<br/>右パネルで回答欄を手動追加できます</p></div>
                )}
              </div>
            </div>
            <div className="side-panel">
              <div className="side-panel-title">回答欄リスト</div>
              {fields.length===0?(<div className="empty-hint">{imgUrl?'プリント上をドラッグして配置':'下のボタンで追加'}</div>):(
                <div className="field-list">
                  {fields.map((f,i)=>(<div key={f.id} className={`field-item ${selField===f.id?'selected':''}`} onClick={()=>setSelField(f.id)}><div className="field-item-num">{i+1}</div><div className="field-item-info"><div className="field-item-name">{f.label}</div><div className="field-item-type"><span className={`type-pill ${f.type==='number'?'type-number':'type-text'}`}>{f.type==='number'?'数値':'テキスト'}</span></div></div><button className="btn btn-sm btn-ghost" style={{padding:'4px 8px',color:'var(--crimson)'}} onClick={e=>{e.stopPropagation();deleteField(f.id);}}>✕</button></div>))}
                </div>
              )}
              {!imgUrl&&(<><div className="divider"/><div className="form-group" style={{gap:4}}><label className="form-label">手動で追加</label><select className="form-select" value={mode} onChange={e=>setMode(e.target.value)}><option value="text">テキスト</option><option value="number">数値</option></select></div><button className="btn btn-secondary btn-full" onClick={()=>{const f={id:genId(),type:mode,x:5,y:5+fields.length*8,width:40,height:6,label:`問${fields.length+1}`};setFields(fs=>[...fs,f]);setSelField(f.id);}}>＋ 回答欄を追加</button></>)}
              <div className="divider"/>
              <button className="btn btn-primary btn-full" onClick={()=>setStep(4)}>次へ：解説を設定 →</button>
              <button className="btn btn-ghost btn-full btn-sm" onClick={()=>setStep(2)}>← 戻る</button>
            </div>
          </div>
        </>
      )}

      {/* Step4: 解説 */}
      {step===4&&(
        <div className="form-box" style={{maxWidth:640}}>
          <div className="form-title">④ 解説を設定（任意）</div>
          <div style={{fontSize:13,color:'var(--stone)',marginBottom:20,lineHeight:1.8}}>
            生徒が回答を提出した後に表示される解説です。設定しない場合は提出完了画面のみ表示されます。
          </div>
          <div className="form-group">
            <label className="form-label">解説テキスト</label>
            <textarea className="form-textarea" style={{minHeight:140}} placeholder="例：この問題は両辺に3をかけて…" value={expText} onChange={e=>setExpText(e.target.value)}/>
          </div>
          <div className="form-group">
            <label className="form-label">解説画像（任意）</label>
            {expImg?(
              <div style={{position:'relative',display:'inline-block'}}>
                <img src={expImg} alt="解説画像" style={{width:'100%',borderRadius:8,border:'2px solid var(--paper-dk)'}}/>
                <button className="btn btn-ghost btn-sm" style={{position:'absolute',top:8,right:8,color:'var(--crimson)'}} onClick={()=>setExpImg(null)}>✕ 削除</button>
              </div>
            ):(
              <div className="upload-zone" onClick={()=>expImgRef.current.click()} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();handleExpImg(e.dataTransfer.files?.[0]);}}>
                <div className="big">🖼</div>
                <p>解説画像をアップロード（PNG/JPG）</p>
                <input ref={expImgRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>handleExpImg(e.target.files?.[0])}/>
              </div>
            )}
          </div>
          <div className="divider"/>
          <button className="btn btn-primary btn-full btn-lg" disabled={saving} onClick={save}>
            {saving?<><span className="spinner"/> 保存中…</>:'💾 課題を保存する'}
          </button>
          <button className="btn btn-ghost btn-full btn-sm mt-8" onClick={()=>setStep(3)}>← 回答欄の設定に戻る</button>
        </div>
      )}

      {showLabelModal&&(
        <div className="modal-overlay" onClick={()=>setShowLabelModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">回答欄のラベルを設定</div>
            <div className="form-group"><label className="form-label">ラベル（例: 問1、(ア)など）</label><input className="form-input" value={labelInput} onChange={e=>setLabelInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&confirmLabel()} autoFocus/></div>
            <div className="form-group"><label className="form-label">種類</label><select className="form-select" value={pendingField?.type||mode} onChange={e=>setPendingField(f=>({...f,type:e.target.value}))}><option value="text">テキスト（文字・式）</option><option value="number">数値</option></select></div>
            <div className="modal-actions"><button className="btn btn-ghost" onClick={()=>setShowLabelModal(false)}>キャンセル</button><button className="btn btn-primary" onClick={confirmLabel}>決定</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

function StudentAuth({ onLogin, toast }) {

  return (

      <div className="form-box" style={{maxWidth:460}}>

        <ConfigBanner/>
        <div className="tab-row">
          <button className={`tab-btn ${tab==='login'?'active':''}`} onClick={()=>setTab('login')}>ログイン</button>
          <button className={`tab-btn ${tab==='register'?'active':''}`} onClick={()=>setTab('register')}>新規登録申請</button>
        </div>

function StudentLogin({ onLogin, toast }) {
  const [sid,setSid]=useState(''); const [pass,setPass]=useState(''); const [err,setErr]=useState(''); const [loading,setLoading]=useState(false);
  const handle = async () => {
    if (!sid.trim()||!pass){setErr('生徒IDとパスワードを入力してください');return;}
    setLoading(true); setErr('');
    try {
      const student = await DB.verifyStudent(sid.trim(), pass);
      if (!student){setErr('IDまたはパスワードが違います');return;}
      onLogin({ uid:student.id, studentId:student.student_id });
    } catch(e){setErr('エラー: '+e.message);}
    finally{setLoading(false);}
  };
  return (
    <>
      <div className="form-group"><label className="form-label">生徒ID</label><input className="form-input" placeholder="例: taro123" value={sid} onChange={e=>{setSid(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&handle()}/></div>
      <div className="form-group"><label className="form-label">パスワード</label><input className="form-input" type="password" value={pass} onChange={e=>{setPass(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&handle()}/></div>
      {err&&<div style={{color:'var(--crimson)',fontSize:13,marginBottom:12}}>{err}</div>}
      <button className="btn btn-primary btn-full btn-lg" onClick={handle} disabled={loading}>{loading?<><span className="spinner"/> ログイン中…</>:'ログイン'}</button>
    </>
  );
}
function StudentRegister({ onDone, toast }) {
  const [sid,setSid]=useState(''); const [pass,setPass]=useState(''); const [pass2,setPass2]=useState(''); const [err,setErr]=useState(''); const [loading,setLoading]=useState(false); const [done,setDone]=useState(false);
  const handle = async () => {
    if (!sid.trim()){setErr('生徒IDを入力してください');return;}
    if (pass.length<6){setErr('パスワードは6文字以上');return;}
    if (pass!==pass2){setErr('パスワードが一致しません');return;}
    setLoading(true); setErr('');
    try {
      const existing = await DB.findStudent(sid.trim());
      if (existing){setErr('このIDは既に登録されています');setLoading(false);return;}
      await DB.createStudentApplication({ id:genId(), student_id:sid.trim(), password_hash:pass, status:'pending', applied_at:new Date().toISOString() });
      setDone(true); toast.show('申請を送信しました','success');
    } catch(e){setErr('エラー: '+e.message);}
    finally{setLoading(false);}
  };
  if (done) return (
    <div style={{textAlign:'center',padding:'20px 0'}}>
      <div style={{fontSize:48,marginBottom:12}}>📬</div>
      <div style={{fontFamily:'Noto Serif JP',fontSize:17,fontWeight:700,color:'var(--crimson-dk)',marginBottom:8}}>申請を送信しました</div>
      <div style={{fontSize:13,color:'var(--stone)',lineHeight:1.8,marginBottom:20}}>全ての教師の承認後にログインできます。</div>
      <button className="btn btn-ghost btn-full" onClick={onDone}>ログイン画面へ</button>
    </div>
  );
  return (
    <>
      <div className="form-group"><label className="form-label">生徒ID <span style={{color:'var(--crimson)'}}>*</span></label><input className="form-input" placeholder="例: taro123" value={sid} onChange={e=>{setSid(e.target.value);setErr('');}} maxLength={30}/><div className="form-hint">半角英数字・アンダースコア使用可</div></div>
      <div className="form-group"><label className="form-label">パスワード <span style={{color:'var(--crimson)'}}>*</span></label><input className="form-input" type="password" placeholder="6文字以上" value={pass} onChange={e=>{setPass(e.target.value);setErr('');}}/></div>
      <div className="form-group"><label className="form-label">パスワード（確認）</label><input className="form-input" type="password" value={pass2} onChange={e=>{setPass2(e.target.value);setErr('');}}/></div>
      {err&&<div style={{color:'var(--crimson)',fontSize:13,marginBottom:12}}>{err}</div>}
      <button className="btn btn-primary btn-full btn-lg" onClick={handle} disabled={loading}>{loading?<><span className="spinner"/> 申請中…</>:'登録申請する'}</button>
    </>
  );
}

/* ── チャットコンポーネント（共用・ルーム切替対応） ── */
function ChatPanel({ myId, myLabel, senderType, teachers, toast }) {
  const rooms = [
    { id: 'general', label: '🌐 全体チャット' },
    ...(teachers||[]).map(t=>({ id:'teacher_'+t.teacher_id, label:'👩‍🏫 '+t.teacher_id }))
  ];

  const [roomId, setRoomId]         = useState('general');
  const [messages, setMessages]     = useState([]);
  const [input, setInput]           = useState('');
  const [loading, setLoading]       = useState(false);
  const [imgPreview, setImgPreview] = useState(null);
  const [zoomImg, setZoomImg]       = useState(null);
  const bottomRef  = useRef(null);
  const fileRef    = useRef(null);
  const channelRef = useRef(null);

  useEffect(()=>{
    setMessages([]);
    let cancelled = false;
    DB.getChatMessages(roomId).then(msgs=>{ if(!cancelled) setMessages(msgs); }).catch(()=>{});
    return ()=>{ cancelled=true; };
  },[roomId]);

  useEffect(()=>{
    if(!supabase)return;
    if(channelRef.current){ supabase.removeChannel(channelRef.current); }
    const ch = supabase.channel('chat:'+roomId)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'chat_messages',filter:`room_id=eq.${roomId}`},
        payload=>{ setMessages(prev=>[...prev, payload.new]); }
      ).subscribe();
    channelRef.current = ch;
    return ()=>{ supabase.removeChannel(ch); };
  },[roomId]);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:'smooth'}); },[messages]);

  const handleImg = (file) => {
    if(!file)return;
    if(!file.type.startsWith('image/')){toast.show('画像ファイルを選択してください','error');return;}
    const reader=new FileReader();
    reader.onload=ev=>setImgPreview(ev.target.result);
    reader.readAsDataURL(file);
  };

  const send = async () => {
    if(!input.trim()&&!imgPreview)return;
    setLoading(true);
    try {
      await DB.sendChatMessage({
        id:           genId(),
        room_id:      roomId,
        sender_id:    myId,
        sender_type:  senderType||'user',
        sender_label: myLabel,
        content:      input.trim()||null,
        image_data:   imgPreview||null,
        created_at:   new Date().toISOString()
      });
      setInput(''); setImgPreview(null);
    } catch(e){toast.show('送信エラー: '+e.message,'error');}
    finally{setLoading(false);}
  };

  const fmt = (ts) => ts ? ts.slice(11,16) : '';

  return (
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      {zoomImg&&(
        <div className="img-modal-overlay" onClick={()=>setZoomImg(null)}>
          <img src={zoomImg} alt="拡大"/>
        </div>
      )}

      {/* ルーム選択タブ */}
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        {rooms.map(r=>(
          <button key={r.id}
            className={`filter-tab ${roomId===r.id?'active':''}`}
            onClick={()=>setRoomId(r.id)}>
            {r.label}
          </button>
        ))}
      </div>

      {/* チャット本体 */}
      <div className="chat-wrap">
        <div style={{padding:'8px 14px',background:'var(--paper-dk)',borderBottom:'2px solid var(--stone-lt)',fontSize:12,fontWeight:700,color:'var(--stone)'}}>
          {rooms.find(r=>r.id===roomId)?.label||roomId}
        </div>
        <div className="chat-messages">
          {messages.length===0?(
            <div className="chat-empty"><div style={{fontSize:32}}>💬</div><div style={{fontSize:13}}>まだメッセージがありません</div></div>
          ):messages.map(m=>{
            const mine = m.sender_id === myId;
            const img  = m.image_data || m.image_url;
            const displayName = m.sender_label || m.sender_name || m.sender_id;
            return (
              <div key={m.id} className={`chat-msg ${mine?'mine':'theirs'}`}>
                {!mine&&<div className="chat-meta">{displayName}</div>}
                <div className="chat-bubble">
                  {m.content&&<div>{m.content}</div>}
                  {img&&<img src={img} alt="画像" onClick={()=>setZoomImg(img)}/>}
                </div>
                <div className="chat-meta">{fmt(m.created_at)}</div>
              </div>
            );
          })}
          <div ref={bottomRef}/>
        </div>
        {imgPreview&&(
          <div style={{padding:'8px 12px',background:'var(--paper)',borderTop:'1px solid var(--paper-dk)',display:'flex',alignItems:'center',gap:8}}>
            <img src={imgPreview} alt="preview" className="chat-img-preview"/>
            <button className="btn btn-ghost btn-sm" style={{color:'var(--crimson)'}} onClick={()=>setImgPreview(null)}>✕</button>
          </div>
        )}
        <div className="chat-input-row">
          <button className="btn btn-ghost btn-sm" title="画像を送る" onClick={()=>fileRef.current.click()}>🖼</button>
          <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>handleImg(e.target.files?.[0])}/>
          <input className="chat-input" placeholder="メッセージを入力…" value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send()}/>
          <button className="btn btn-primary btn-sm" onClick={send} disabled={loading||(!input.trim()&&!imgPreview)}>送信</button>
        </div>
      </div>
    </div>
  );
}

    const iv = setInterval(loadPerms, 15000);
    return ()=>clearInterval(iv);
  },[]);

  const loadPerms = async () => {
    try {
      const p = await DB.getStudentPermissions(student.studentId);
      setPerms(p || { wb_write_enabled: false, vc_enabled: false });
    } catch(e){}
  };

  const handleCode = async () => {
    const trimmed=code.trim().toUpperCase();
    if(trimmed.length<4){setErr('コードを入力してください');return;}
    setLoading(true); setErr('');
    try {
      const session = await DB.findWbSession(trimmed);
      if(session){
        setLiveSession(session);
        setShowViewer(true);
        setActiveTab('live');
        setLoading(false); return;
      }
      const task = await DB.findTaskByCode(trimmed);
      if(!task){setErr('課題が見つかりません');setLoading(false);return;}
      setCurrentTask(task);
    } catch(e){setErr('エラー: '+e.message);}
    finally{setLoading(false);}
  };

  return (
    <div className="main">

          <div style={{fontSize:12,opacity:.8,marginTop:4}}>紅月計算塾へようこそ</div>
        </div>
        <button className="btn btn-ghost btn-sm" style={{color:'white',borderColor:'rgba(255,255,255,.4)'}} onClick={onLogout}>ログアウト</button>
      </div>

      <div className="dash-tabs" style={{marginTop:20}}>
        <button className={`dash-tab ${activeTab==='tasks'?'active':''}`} onClick={()=>setActiveTab('tasks')}>📋 課題・ライブ</button>
        {showViewer&&<button className={`dash-tab ${activeTab==='live'?'active':''}`} onClick={()=>setActiveTab('live')}><span className="live-dot" style={{display:'inline-block',marginRight:4}}/>LIVE視聴中</button>}
        <button className={`dash-tab ${activeTab==='chat'?'active':''}`} onClick={()=>setActiveTab('chat')}>💬 チャット</button>
        <button className={`dash-tab ${activeTab==='vc'?'active':''}`} onClick={()=>setActiveTab('vc')}>🎤 VC</button>
      </div>

      {/* LIVEビューアは常にマウントしてdisplay切替で維持 */}
      {liveSession&&(
        <div style={{display: activeTab==='live' ? 'block' : 'none'}}>
          <WhiteboardViewer
            session={liveSession}
            nickname={student.studentId}
            onBack={()=>{ setLiveSession(null); setShowViewer(false); setActiveTab('tasks'); }}
          />
        </div>
      )}

      {activeTab==='tasks'&&(
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div style={{background:'var(--white)',border:'2px solid var(--paper-dk)',borderRadius:14,padding:20}}>
            <div style={{fontFamily:'Noto Serif JP',fontSize:15,fontWeight:700,color:'var(--crimson-dk)',marginBottom:12}}>📋 課題コード / LIVEコード入力</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              <input className="form-input" style={{flex:1,maxWidth:220,fontFamily:'DM Mono',fontSize:18,letterSpacing:'.15em',textAlign:'center'}}
                placeholder="例: AB1234" value={code} maxLength={8}
                onChange={e=>{setCode(e.target.value.toUpperCase());setErr('');}}
                onKeyDown={e=>e.key==='Enter'&&handleCode()}/>
              <button className="btn btn-primary" onClick={handleCode} disabled={loading}>
                {loading?<><span className="spinner"/> 検索中…</>:'開く →'}
              </button>
            </div>
            {err&&<div style={{color:'var(--crimson)',fontSize:13,marginTop:8}}>{err}</div>}
            <div style={{fontSize:12,color:'var(--stone)',marginTop:8}}>課題コードまたはホワイトボードのLIVEコードを入力してください</div>
          </div>
          <div style={{background:'var(--white)',border:'2px solid var(--paper-dk)',borderRadius:14,padding:20}}>
            <div style={{fontFamily:'Noto Serif JP',fontSize:15,fontWeight:700,color:'var(--crimson-dk)',marginBottom:10}}>🔓 あなたの権限</div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              <div style={{padding:'8px 14px',borderRadius:20,background:perms.wb_write_enabled?'#D1FAE5':'var(--paper-dk)',color:perms.wb_write_enabled?'#065F46':'var(--stone)',fontSize:13,fontWeight:700}}>
                🖊 板書参加: {perms.wb_write_enabled?'許可':'待機中'}
              </div>
              <div style={{padding:'8px 14px',borderRadius:20,background:perms.vc_enabled?'#D1FAE5':'var(--paper-dk)',color:perms.vc_enabled?'#065F46':'var(--stone)',fontSize:13,fontWeight:700}}>
                🎤 VC: {perms.vc_enabled?'利用可':'待機中'}

            </div>

        </div>
      )}

      {activeTab==='chat'&&(
        <div style={{marginTop:4}}>
          <ChatPanel myId={student.studentId} myLabel={student.studentId} senderType="student" teachers={teachers} toast={toast}/>

              <div style={{fontFamily:'Noto Serif JP',fontSize:17,fontWeight:700,color:'var(--stone)'}}>VC は現在利用できません</div>
              <div style={{fontSize:13,color:'var(--stone-lt)'}}>先生がVCを許可するまでお待ちください</div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ── VC パネル（WebRTC / Supabase Broadcast シグナリング） ── */
function VCPanel({ studentId, toast }) {
  const [status,setStatus]   = useState('idle'); /* idle | joining | connected */
  const [peers,setPeers]     = useState([]);
  const localStream  = useRef(null);
  const pcsRef       = useRef({});
  const channelRef   = useRef(null);
  const myId         = useRef(studentId+'_'+genId());

  const startVC = async () => {
    setStatus('joining');
    try {
      localStream.current = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    } catch(e){ toast.show('マイクへのアクセスが拒否されました','error'); setStatus('idle'); return; }

    const ch = supabase.channel('vc-room', { config:{ broadcast:{ self:false } } });
    ch.on('broadcast',{event:'offer'},async ({payload})=>{
      if(payload.to!==myId.current)return;
      const pc = createPC(payload.from, ch);
      await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      ch.send({type:'broadcast',event:'answer',payload:{from:myId.current,to:payload.from,sdp:answer}});
    })
    .on('broadcast',{event:'answer'},async ({payload})=>{
      if(payload.to!==myId.current)return;
      const pc = pcsRef.current[payload.from];
      if(pc) await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
    })
    .on('broadcast',{event:'ice'},async ({payload})=>{
      if(payload.to!==myId.current)return;
      const pc = pcsRef.current[payload.from];
      if(pc) await pc.addIceCandidate(new RTCIceCandidate(payload.candidate));
    })
    .on('broadcast',{event:'join'},async ({payload})=>{
      if(payload.id===myId.current)return;
      const pc = createPC(payload.id, ch);
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      ch.send({type:'broadcast',event:'offer',payload:{from:myId.current,to:payload.id,sdp:offer}});
    })
    .on('broadcast',{event:'leave'},({payload})=>{
      if(pcsRef.current[payload.id]){ pcsRef.current[payload.id].close(); delete pcsRef.current[payload.id]; }
      setPeers(p=>p.filter(x=>x!==payload.id));
    })
    .subscribe(()=>{
      ch.send({type:'broadcast',event:'join',payload:{id:myId.current,label:studentId}});
      setStatus('connected');
    });
    channelRef.current=ch;
  };

  const createPC = (peerId, ch) => {
    const pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
    pcsRef.current[peerId]=pc;
    localStream.current.getTracks().forEach(t=>pc.addTrack(t,localStream.current));
    pc.onicecandidate = e=>{ if(e.candidate) ch.send({type:'broadcast',event:'ice',payload:{from:myId.current,to:peerId,candidate:e.candidate}}); };
    pc.ontrack = e=>{ setPeers(p=>p.includes(peerId)?p:[...p,peerId]); const audio=document.createElement('audio'); audio.srcObject=e.streams[0]; audio.autoplay=true; document.body.appendChild(audio); };
    return pc;
  };

  const leaveVC = () => {
    const ch=channelRef.current;
    if(ch){ ch.send({type:'broadcast',event:'leave',payload:{id:myId.current}}); supabase.removeChannel(ch); }
    Object.values(pcsRef.current).forEach(pc=>pc.close());
    pcsRef.current={};
    if(localStream.current){ localStream.current.getTracks().forEach(t=>t.stop()); localStream.current=null; }
    setStatus('idle'); setPeers([]);
  };

  useEffect(()=>()=>{ if(status==='connected')leaveVC(); },[]);

  return (
    <div style={{padding:'20px 0'}}>
      <div style={{fontSize:32,marginBottom:12}}>🎤</div>
      <div style={{fontFamily:'Noto Serif JP',fontSize:17,fontWeight:700,color:'var(--crimson-dk)',marginBottom:8}}>音声通話（VC）</div>
      {status==='idle'&&(
        <>
          <div style={{fontSize:13,color:'var(--stone)',marginBottom:16}}>ボタンを押すとルームに入室します。他の参加者と自動接続されます。</div>
          <button className="btn btn-primary btn-lg" onClick={startVC}>🎤 入室する</button>
        </>
      )}
      {status==='joining'&&<div style={{color:'var(--stone)'}}><span className="spinner dark"/> 接続中…</div>}
      {status==='connected'&&(
        <>
          <div style={{marginBottom:12}}>
            <div className="live-badge" style={{marginBottom:12}}><span className="live-dot"/>通話中</div>
            <div style={{fontSize:13,color:'var(--stone)',marginTop:8}}>参加中: {peers.length+1} 人 (自分含む)</div>
          </div>
          <button className="btn btn-reject" onClick={leaveVC}>📵 退室する</button>
        </>
      )}
    </div>
  );
}

/* ── 教師側：生徒申請の承認 ── */
function StudentApprovalSection({ teacher, toast }) {
  const [apps,setApps]       = useState([]);
  const [appVotes,setAppVotes] = useState({});
  const [teachers,setTeachers] = useState([]);
  const [loading,setLoading]   = useState(false);

  const load = async () => {
    setLoading(true);
    try {
      const all = await DB.getStudentApplications();
      const pending = all.filter(a=>a.status==='pending');
      setApps(pending);
      const votes = {};
      await Promise.all(pending.map(async a=>{ votes[a.id]=await DB.getStudentVotes(a.id); }));
      setAppVotes(votes);
      setTeachers(await DB.getTeachers());
    } catch(e){toast.show('取得エラー: '+e.message,'error');}
    finally{setLoading(false);}
  };
  useEffect(()=>{ load(); },[]);

  const handleVote = async (app, approve) => {
    try {
      await DB.voteStudent(app.id, teacher.teacherId, approve);
      const updatedVotes = await DB.getStudentVotes(app.id);
      const allTeachers  = await DB.getTeachers();
      if (updatedVotes.some(v=>!v.approve)) {
        await DB.rejectStudentApplication(app.id);
        toast.show(`${app.student_id} の申請を却下しました`);
      } else if (updatedVotes.filter(v=>v.approve).length >= allTeachers.length && allTeachers.length>0) {
        await DB.approveStudentApplication(app.id, app.student_id, app.password_hash);
        toast.show(`${app.student_id} を生徒として承認しました！`,'success');
      } else {
        toast.show(approve?'承認票を入れました':'否決票を入れました', approve?'success':'default');
      }
      load();
    } catch(e){toast.show('エラー: '+e.message,'error');}
  };

  return (
    <div style={{marginTop:20}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <div style={{fontFamily:'Noto Serif JP',fontSize:15,fontWeight:700,color:'var(--crimson-dk)'}}>🎓 生徒の登録申請</div>
        <button className="btn btn-ghost btn-sm" onClick={load} disabled={loading}>{loading?<span className="spinner dark"/>:'↻'} 更新</button>
      </div>
      {apps.length===0?(
        <div style={{fontSize:13,color:'var(--stone)',textAlign:'center',padding:'16px 0'}}>承認待ちの申請がありません</div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {apps.map(app=>{
            const votes = appVotes[app.id]||[];
            const myVote = votes.find(v=>v.teacher_id===teacher.teacherId);
            return (
              <div key={app.id} className="approval-item">
                <div className="approval-item-info">
                  <div className="approval-item-id">{app.student_id}</div>
                  <div className="approval-item-meta">{app.applied_at?.slice(0,10)} 申請</div>
                  <div className="approval-votes">承認: <span className="vote-count">{votes.filter(v=>v.approve).length}</span> / {teachers.length}</div>
                </div>
                {myVote?(
                  <span className={`badge ${myVote.approve?'badge-approved':'badge-rejected'}`}>{myVote.approve?'承認済':'否決済'}</span>
                ):(
                  <div style={{display:'flex',gap:8}}>
                    <button className="btn btn-sm btn-approve" onClick={()=>handleVote(app,true)}>✓ 承認</button>
                    <button className="btn btn-sm btn-reject" onClick={()=>handleVote(app,false)}>✕ 却下</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ── 生徒：回答シート ── */
function AnswerSheet({ task, nickname, onSubmit }) {
  const [answers,setAnswers]=useState({}); const [submitted,setSubmitted]=useState(false); const [loading,setLoading]=useState(false);
  const fields=task.answerFields||[];
  const filled=fields.filter(f=>(answers[f.id]||'').trim()!=='').length;
  const total=fields.length; const pct=total===0?0:Math.round((filled/total)*100);

  const handleSubmit=async()=>{
    if(filled<total){if(!window.confirm(`まだ ${total-filled} 問が未入力です。このまま提出しますか？`))return;}
    setLoading(true);
    try{await DB.createSubmission({id:genId(),taskId:task.id,nickname,answers:{...answers},submittedAt:new Date().toISOString()});setSubmitted(true);onSubmit();}
    catch(e){alert('提出に失敗しました: '+e.message);}
    finally{setLoading(false);}
  };

  if(submitted) return (
    <div className="answer-sheet-wrap">
      <div className="done-page" style={{padding:'40px 24px'}}>
        <div className="done-icon">🎉</div>
        <div className="done-title">提出完了！</div>
        <div className="done-sub">{nickname} さんの回答を受け付けました。<br/>お疲れ様でした！</div>
      </div>
      {/* 解説表示 */}
      {(task.explanationText||task.explanationImageUrl)&&(
        <div className="explanation-box">
          <div className="explanation-title">💡 解説</div>
          {task.explanationText&&<div className="explanation-text">{task.explanationText}</div>}
          {task.explanationImageUrl&&<img src={task.explanationImageUrl} alt="解説画像" className="explanation-img"/>}
        </div>
      )}
      <button className="btn btn-ghost btn-full" onClick={()=>window.location.reload()}>トップに戻る</button>
    </div>
  );

  return (
    <div className="answer-sheet-wrap">
      <div className="sheet-header">
        <div className="sheet-title">{task.title}</div>
        {task.description&&<div className="sheet-desc">{task.description}</div>}
        <div style={{marginTop:6,fontSize:13,opacity:.7}}>生徒：{nickname}</div>
      </div>
      <div className="sheet-canvas-wrapper">
        {task.imageDataUrl?(
          <div className="sheet-canvas">
            <img src={task.imageDataUrl} alt="問題プリント" draggable={false}/>
            {fields.map(f=>(<div key={f.id} style={{position:'absolute',left:f.x+'%',top:f.y+'%',width:f.width+'%',height:f.height+'%'}}><input className="answer-input" type={f.type==='number'?'number':'text'} placeholder={f.label} value={answers[f.id]||''} onChange={e=>setAnswers(a=>({...a,[f.id]:e.target.value}))} disabled={submitted}/></div>))}
          </div>
        ):(<div className="canvas-placeholder"><div className="big-icon">📄</div><p>プリント画像が添付されていません</p></div>)}
      </div>
      {fields.length>0&&(
        <div className="side-panel">
          <div className="side-panel-title">回答一覧（入力補助）</div>
          {fields.map((f,i)=>(
            <div key={f.id} className="form-group" style={{marginBottom:10}}>
              <label className="form-label">{i+1}. {f.label}<span className={`type-pill ${f.type==='number'?'type-number':'type-text'}`} style={{marginLeft:6}}>{f.type==='number'?'数値':'テキスト'}</span></label>
              <input className="form-input" type={f.type==='number'?'number':'text'} placeholder="回答を入力…" value={answers[f.id]||''} onChange={e=>setAnswers(a=>({...a,[f.id]:e.target.value}))} disabled={submitted}/>
            </div>
          ))}
        </div>
      )}
      <div className="sheet-submit-bar">
        <div className="sheet-progress">
          <div className="progress-text">{filled} / {total} 問 入力済み</div>
          <div className="progress-bar-bg"><div className="progress-bar-fill" style={{width:pct+'%'}}/></div>
        </div>
        <button className="btn btn-primary btn-lg" onClick={handleSubmit} disabled={loading}>
          {loading?<><span className="spinner"/> 提出中…</>:'提出する 📩'}
        </button>
      </div>
    </div>
  );
}

function TaskEditor({ task, onDone, toast }) {
  const [title,setTitle]     = useState(task.title||'');
  const [desc,setDesc]       = useState(task.description||'');
  const [expText,setExpText] = useState(task.explanationText||'');
  const [expImg,setExpImg]   = useState(task.explanationImageUrl||null);
  const [saving,setSaving]   = useState(false);
  const expImgRef=useRef(null);

  const handleExpImg=(file)=>{
    if(!file)return;
    const r=new FileReader();
    r.onload=ev=>setExpImg(ev.target.result);
    r.readAsDataURL(file);
  };

  const save=async()=>{
    if(!title.trim()){toast.show('タイトルを入力してください','error');return;}
    setSaving(true);
    try{
      await DB.updateTask(task.id,{title:title.trim(),description:desc.trim(),explanationText:expText.trim(),explanationImageUrl:expImg});
      toast.show('課題を更新しました','success');
      onDone();
    }catch(e){toast.show('更新エラー: '+e.message,'error');}
    finally{setSaving(false);}
  };

  return(
    <div className="main">
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
        <button className="btn btn-ghost btn-sm" onClick={onDone}>← 戻る</button>
        <div style={{fontFamily:'Noto Serif JP',fontSize:22,fontWeight:700,color:'var(--crimson-dk)'}}>✏️ 課題を編集</div>
      </div>
      <div className="form-box" style={{maxWidth:640}}>
        <div className="form-group">
          <label className="form-label">課題タイトル <span style={{color:'var(--crimson)'}}>*</span></label>
          <input className="form-input" value={title} onChange={e=>setTitle(e.target.value)}/>
        </div>
        <div className="form-group">
          <label className="form-label">説明（任意）</label>
          <textarea className="form-textarea" value={desc} onChange={e=>setDesc(e.target.value)}/>
        </div>
        <div className="divider"/>
        <div style={{fontFamily:'Noto Serif JP',fontSize:15,fontWeight:700,color:'var(--gold)',marginBottom:14}}>💡 解説の編集</div>
        <div className="form-group">
          <label className="form-label">解説テキスト</label>
          <textarea className="form-textarea" style={{minHeight:120}} placeholder="例：両辺に3をかけて…" value={expText} onChange={e=>setExpText(e.target.value)}/>
        </div>
        <div className="form-group">
          <label className="form-label">解説画像</label>
          {expImg?(
            <div style={{position:'relative'}}>
              <img src={expImg} alt="解説" style={{width:'100%',borderRadius:8,border:'2px solid var(--paper-dk)'}}/>
              <button className="btn btn-ghost btn-sm" style={{position:'absolute',top:8,right:8,color:'var(--crimson)'}} onClick={()=>setExpImg(null)}>✕ 削除</button>
            </div>
          ):(
            <div className="upload-zone" onClick={()=>expImgRef.current.click()} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();handleExpImg(e.dataTransfer.files?.[0]);}}>
              <div className="big">🖼</div><p>解説画像をアップロード（PNG/JPG）</p>
              <input ref={expImgRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>handleExpImg(e.target.files?.[0])}/>
            </div>
          )}
        </div>
        <div style={{background:'#FEF3C7',border:'1.5px solid #F59E0B',borderRadius:10,padding:12,fontSize:12,color:'#92400E',marginBottom:18}}>
          ⚠️ 回答欄の配置・プリスト画像は変更できません。再作成が必要な場合は削除してください。
        </div>
        <button className="btn btn-primary btn-full btn-lg" disabled={saving} onClick={save}>
          {saving?<><span className="spinner"/> 保存中…</>:'💾 変更を保存'}
        </button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════
   ROOT APP
══════════════════════════════════ */
function App() {
  const toast=useToast();
  const savedSession=(()=>{try{return JSON.parse(localStorage.getItem('kogetsu_session')||'null');}catch{return null;}})();
  const [role,setRole]             = useState(savedSession?.role||null);
  const [teacher,setTeacher]       = useState(savedSession?.teacher||null);
  const [student,setStudent]       = useState(savedSession?.student||null);
  const [view,setView]             = useState('dashboard');
  const [reviewTask,setReviewTask] = useState(null);
  const [editTask,setEditTask]     = useState(null);

  useEffect(()=>{
    if(role==='teacher'&&teacher){ localStorage.setItem('kogetsu_session',JSON.stringify({role,teacher})); }
    else if(role==='student'&&student){ localStorage.setItem('kogetsu_session',JSON.stringify({role,student})); }
    else{ localStorage.removeItem('kogetsu_session'); }
  },[role,teacher,student]);

  const goHome=()=>{ setRole(null); setStudent(null); setTeacher(null); };
  const handleTeacherLogout=()=>{ localStorage.removeItem('kogetsu_session'); setTeacher(null); setRole(null); setView('dashboard'); };
  const handleStudentLogout=()=>{ localStorage.removeItem('kogetsu_session'); setStudent(null); setRole(null); };

  const renderTeacher=()=>{
    if(!teacher) return <TeacherAuth onLogin={u=>{setTeacher(u);setView('dashboard');}} toast={toast}/>;
    if(view==='create') return <TaskCreator teacher={teacher} toast={toast} onDone={()=>setView('dashboard')}/>;
    if(view==='edit'&&editTask) return <TaskEditor task={editTask} toast={toast} onDone={()=>setView('dashboard')}/>;
    if(view==='review'&&reviewTask) return <SubmissionReviewer task={reviewTask} onBack={()=>setView('dashboard')}/>;
    return <TeacherDashboard teacher={teacher} toast={toast}
      onCreate={()=>setView('create')}
      onEdit={t=>{setEditTask(t);setView('edit');}}
      onReview={t=>{setReviewTask(t);setView('review');}}
      onLogout={handleTeacherLogout}/>;
  };

  const renderStudent=()=>{
    if(!student) return <StudentAuth onLogin={s=>{setStudent(s);}} toast={toast}/>;
    return <StudentDashboard student={student} toast={toast} onLogout={handleStudentLogout}/>;
  };

  if(!role)return(
    <div className="app">
      <Header role={null} onRoleChange={setRole} onHome={goHome}/>
      <div className="landing">
        <Kamon size={88}/>
        <div className="landing-title">紅月計算塾</div>
        <div className="landing-subtitle">学習支援ボランティアのための<br/>デジタル課題プラットフォーム</div>
        <div className="landing-cards">
          <div className="landing-card" onClick={()=>setRole('teacher')}><div className="card-icon teacher">📚</div><div className="card-label">教える側</div><div className="card-desc">問題プリントをアップロードし、課題の作成・採点・板書配信ができます。</div><div className="card-cta">ログインして始める →</div></div>
          <div className="landing-card" onClick={()=>setRole('student')}><div className="card-icon student">✏️</div><div className="card-label">生徒</div><div className="card-desc">ログインして課題提出・ホワイトボード視聴・チャット・音声通話ができます。</div><div className="card-cta">ログインして始める →</div></div>
        </div>
      </div>
      <Toasts toasts={toast.toasts}/>
    </div>
  );

  return(
    <div className="app">
      <Header role={role} onRoleChange={r=>{setRole(r);setStudent(null);setTeacher(null);setView('dashboard');}} onHome={goHome}/>
      {role==='teacher'?renderTeacher():renderStudent()}
      <Toasts toasts={toast.toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
