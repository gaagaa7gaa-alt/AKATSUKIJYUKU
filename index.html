            <div className="form-group"><label className="form-label">зЁ®йЎһ</label><select className="form-select" value={pendingField?.type||mode} onChange={e=>setPendingField(f=>({...f,type:e.target.value}))}><option value="text">гғҶгӮӯгӮ№гғҲпјҲж–Үеӯ—гғ»ејҸпјү</option><option value="number">ж•°еҖӨ</option></select></div>
            <div className="modal-actions"><button className="btn btn-ghost" onClick={()=>setShowLabelModal(false)}>гӮӯгғЈгғігӮ»гғ«</button><button className="btn btn-primary" onClick={confirmLabel}>жұәе®ҡ</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   еӣһзӯ”зўәиӘҚпјҲж•ҷеё«пјү
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function SubmissionReviewer({ task, onBack }) {
  const [subs,setSubs]=useState([]); const [loading,setLoading]=useState(true);
  useEffect(()=>{DB.getSubmissions(task.id).then(setSubs).catch(e=>console.error(e)).finally(()=>setLoading(false));},[task.id]);
  const fields=task.answerFields||[];
  return (
    <div className="main">
      <div className="review-header">
        <button className="btn btn-ghost btn-sm" onClick={onBack}>вҶҗ жҲ»гӮӢ</button>
        <div className="review-title">{task.title} вҖ” еӣһзӯ”дёҖиҰ§</div>
        <span className={`badge ${task.isPublished?'badge-published':'badge-draft'}`}>{task.isPublished?'е…¬й–Ӣдёӯ':'йқһе…¬й–Ӣ'}</span>
      </div>
      {loading?(<div style={{textAlign:'center',padding:'60px 0'}}><span className="spinner dark" style={{width:32,height:32,borderWidth:4}}/></div>):subs.length===0?(<div style={{textAlign:'center',padding:'60px 0',color:'var(--stone)'}}><div style={{fontSize:40,marginBottom:10}}>рҹ“ӯ</div>гҒҫгҒ жҸҗеҮәгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“</div>):(
        <div style={{overflowX:'auto'}}>
          <table className="sub-table">
            <thead><tr><th>гғӢгғғгӮҜгғҚгғјгғ </th><th>жҸҗеҮәж—ҘжҷӮ</th>{fields.map(f=><th key={f.id}>{f.label}</th>)}</tr></thead>
            <tbody>
              {subs.map(sub=>(
                <tr key={sub.id}>
                  <td><strong>{sub.nickname}</strong></td>
                  <td className="mono" style={{fontSize:11}}>{sub.submittedAt?.slice(0,19).replace('T',' ')}</td>
                  {fields.map(f=>(<td key={f.id}>{sub.answers[f.id]?<span className="answer-chip">{sub.answers[f.id]}</span>:<span style={{color:'var(--stone-lt)',fontSize:12}}>жңӘеӣһзӯ”</span>}</td>))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   з”ҹеҫ’иӘҚиЁјгғ»гғҖгғғгӮ·гғҘгғңгғјгғү
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function StudentAuth({ onLogin, toast }) {
  const [tab, setTab] = useState('login');
  return (
    <div className="main" style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'calc(100vh - 58px)'}}>
      <div className="form-box" style={{maxWidth:460}}>
        <div style={{textAlign:'center',marginBottom:20}}><Kamon size={52}/></div>
        <ConfigBanner/>
        <div className="tab-row">
          <button className={`tab-btn ${tab==='login'?'active':''}`} onClick={()=>setTab('login')}>гғӯгӮ°гӮӨгғі</button>
          <button className={`tab-btn ${tab==='register'?'active':''}`} onClick={()=>setTab('register')}>ж–°иҰҸзҷ»йҢІз”іи«Ӣ</button>
        </div>
        {tab==='login' ? <StudentLogin onLogin={onLogin} toast={toast}/> : <StudentRegister onDone={()=>setTab('login')} toast={toast}/>}
      </div>
    </div>
  );
}
function StudentLogin({ onLogin, toast }) {
  const [sid,setSid]=useState(''); const [pass,setPass]=useState(''); const [err,setErr]=useState(''); const [loading,setLoading]=useState(false);
  const handle = async () => {
    if (!sid.trim()||!pass){setErr('з”ҹеҫ’IDгҒЁгғ‘гӮ№гғҜгғјгғүгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„');return;}
    setLoading(true); setErr('');
    try {
      const student = await DB.verifyStudent(sid.trim(), pass);
      if (!student){setErr('IDгҒҫгҒҹгҒҜгғ‘гӮ№гғҜгғјгғүгҒҢйҒ•гҒ„гҒҫгҒҷ');return;}
      onLogin({ uid:student.id, studentId:student.student_id });
    } catch(e){setErr('гӮЁгғ©гғј: '+e.message);}
    finally{setLoading(false);}
  };
  return (
    <>
      <div className="form-group"><label className="form-label">з”ҹеҫ’ID</label><input className="form-input" placeholder="дҫӢ: taro123" value={sid} onChange={e=>{setSid(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&handle()}/></div>
      <div className="form-group"><label className="form-label">гғ‘гӮ№гғҜгғјгғү</label><input className="form-input" type="password" value={pass} onChange={e=>{setPass(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&handle()}/></div>
      {err&&<div style={{color:'var(--crimson)',fontSize:13,marginBottom:12}}>{err}</div>}
      <button className="btn btn-primary btn-full btn-lg" onClick={handle} disabled={loading}>{loading?<><span className="spinner"/> гғӯгӮ°гӮӨгғідёӯвҖҰ</>:'гғӯгӮ°гӮӨгғі'}</button>
    </>
  );
}
function StudentRegister({ onDone, toast }) {
  const [sid,setSid]=useState(''); const [pass,setPass]=useState(''); const [pass2,setPass2]=useState(''); const [err,setErr]=useState(''); const [loading,setLoading]=useState(false); const [done,setDone]=useState(false);
  const handle = async () => {
    if (!sid.trim()){setErr('з”ҹеҫ’IDгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„');return;}
    if (pass.length<6){setErr('гғ‘гӮ№гғҜгғјгғүгҒҜ6ж–Үеӯ—д»ҘдёҠ');return;}
    if (pass!==pass2){setErr('гғ‘гӮ№гғҜгғјгғүгҒҢдёҖиҮҙгҒ—гҒҫгҒӣгӮ“');return;}
    setLoading(true); setErr('');
    try {
      const existing = await DB.findStudent(sid.trim());
      if (existing){setErr('гҒ“гҒ®IDгҒҜж—ўгҒ«зҷ»йҢІгҒ•гӮҢгҒҰгҒ„гҒҫгҒҷ');setLoading(false);return;}
      await DB.createStudentApplication({ id:genId(), student_id:sid.trim(), password_hash:pass, status:'pending', applied_at:new Date().toISOString() });
      setDone(true); toast.show('з”іи«ӢгӮ’йҖҒдҝЎгҒ—гҒҫгҒ—гҒҹ','success');
    } catch(e){setErr('гӮЁгғ©гғј: '+e.message);}
    finally{setLoading(false);}
  };
  if (done) return (
    <div style={{textAlign:'center',padding:'20px 0'}}>
      <div style={{fontSize:48,marginBottom:12}}>рҹ“¬</div>
      <div style={{fontFamily:'Noto Serif JP',fontSize:17,fontWeight:700,color:'var(--crimson-dk)',marginBottom:8}}>з”іи«ӢгӮ’йҖҒдҝЎгҒ—гҒҫгҒ—гҒҹ</div>
      <div style={{fontSize:13,color:'var(--stone)',lineHeight:1.8,marginBottom:20}}>е…ЁгҒҰгҒ®ж•ҷеё«гҒ®жүҝиӘҚеҫҢгҒ«гғӯгӮ°гӮӨгғігҒ§гҒҚгҒҫгҒҷгҖӮ</div>
      <button className="btn btn-ghost btn-full" onClick={onDone}>гғӯгӮ°гӮӨгғіз”»йқўгҒё</button>
    </div>
  );
  return (
    <>
      <div className="form-group"><label className="form-label">з”ҹеҫ’ID <span style={{color:'var(--crimson)'}}>*</span></label><input className="form-input" placeholder="дҫӢ: taro123" value={sid} onChange={e=>{setSid(e.target.value);setErr('');}} maxLength={30}/><div className="form-hint">еҚҠи§’иӢұж•°еӯ—гғ»гӮўгғігғҖгғјгӮ№гӮігӮўдҪҝз”ЁеҸҜ</div></div>
      <div className="form-group"><label className="form-label">гғ‘гӮ№гғҜгғјгғү <span style={{color:'var(--crimson)'}}>*</span></label><input className="form-input" type="password" placeholder="6ж–Үеӯ—д»ҘдёҠ" value={pass} onChange={e=>{setPass(e.target.value);setErr('');}}/></div>
      <div className="form-group"><label className="form-label">гғ‘гӮ№гғҜгғјгғүпјҲзўәиӘҚпјү</label><input className="form-input" type="password" value={pass2} onChange={e=>{setPass2(e.target.value);setErr('');}}/></div>
      {err&&<div style={{color:'var(--crimson)',fontSize:13,marginBottom:12}}>{err}</div>}
      <button className="btn btn-primary btn-full btn-lg" onClick={handle} disabled={loading}>{loading?<><span className="spinner"/> з”іи«ӢдёӯвҖҰ</>:'зҷ»йҢІз”іи«ӢгҒҷгӮӢ'}</button>
    </>
  );
}

/* в”Җв”Җ гғҒгғЈгғғгғҲгӮігғігғқгғјгғҚгғігғҲпјҲе…ұз”Ёпјү в”Җв”Җ */
function ChatPanel({ myId, myLabel, toast }) {
  const [messages,setMessages] = useState([]);
  const [input,setInput]       = useState('');
  const [loading,setLoading]   = useState(false);
  const [imgPreview,setImgPreview] = useState(null);
  const [zoomImg,setZoomImg]   = useState(null);
  const bottomRef = useRef(null);
  const fileRef   = useRef(null);
  const channelRef = useRef(null);

  const loadMessages = useCallback(async () => {
    try { const msgs = await DB.getChatMessages(); setMessages(msgs); } catch(e){}
  }, []);

  useEffect(()=>{ loadMessages(); },[loadMessages]);

  /* Realtime subscribe */
  useEffect(()=>{
    if(!supabase)return;
    const ch = supabase.channel('chat-global')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'chat_messages'},payload=>{
        setMessages(prev=>[...prev, payload.new]);
      }).subscribe();
    channelRef.current = ch;
    return ()=>{ supabase.removeChannel(ch); };
  },[]);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:'smooth'}); },[messages]);

  const handleImg = (file) => {
    if(!file)return;
    if(!file.type.startsWith('image/')){toast.show('з”»еғҸгғ•гӮЎгӮӨгғ«гӮ’йҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„','error');return;}
    const reader=new FileReader();
    reader.onload=ev=>setImgPreview(ev.target.result);
    reader.readAsDataURL(file);
  };

  const send = async () => {
    if(!input.trim()&&!imgPreview)return;
    setLoading(true);
    try {
      await DB.sendChatMessage({
        id: genId(),
        sender_id: myId,
        sender_label: myLabel,
        content: input.trim()||null,
        image_data: imgPreview||null,
        created_at: new Date().toISOString()
      });
      setInput(''); setImgPreview(null);
    } catch(e){toast.show('йҖҒдҝЎгӮЁгғ©гғј: '+e.message,'error');}
    finally{setLoading(false);}
  };

  const fmt = (ts) => {
    if(!ts)return'';
    return ts.slice(11,16);
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:0}}>
      {zoomImg&&(
        <div className="img-modal-overlay" onClick={()=>setZoomImg(null)}>
          <img src={zoomImg} alt="жӢЎеӨ§"/>
        </div>
      )}
      <div className="chat-wrap">
        <div className="chat-messages">
          {messages.length===0?(
            <div className="chat-empty"><div style={{fontSize:32}}>рҹ’¬</div><div style={{fontSize:13}}>гҒҫгҒ гғЎгғғгӮ»гғјгӮёгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“</div></div>
          ):messages.map(m=>{
            const mine = m.sender_id === myId;
            return (
              <div key={m.id} className={`chat-msg ${mine?'mine':'theirs'}`}>
                {!mine&&<div className="chat-meta">{m.sender_label}</div>}
                <div className="chat-bubble">
                  {m.content&&<div>{m.content}</div>}
                  {m.image_data&&<img src={m.image_data} alt="з”»еғҸ" onClick={()=>setZoomImg(m.image_data)}/>}
                </div>
                <div className="chat-meta">{fmt(m.created_at)}</div>
              </div>
            );
          })}
          <div ref={bottomRef}/>
        </div>
        {imgPreview&&(
          <div style={{padding:'8px 12px',background:'var(--paper)',borderTop:'1px solid var(--paper-dk)',display:'flex',alignItems:'center',gap:8}}>
            <img src={imgPreview} alt="preview" className="chat-img-preview"/>

        </div>
      </div>
    </div>
  );
}

/* в”Җв”Җ VC гғ‘гғҚгғ«пјҲWebRTC / Supabase Broadcast гӮ·гӮ°гғҠгғӘгғігӮ°пјү в”Җв”Җ */
function VCPanel({ studentId, toast }) {
  const [status,setStatus]   = useState('idle'); /* idle | joining | connected */
  const [peers,setPeers]     = useState([]);
  const localStream  = useRef(null);
  const pcsRef       = useRef({});
  const channelRef   = useRef(null);
  const myId         = useRef(studentId+'_'+genId());

  const startVC = async () => {
    setStatus('joining');
    try {
      localStream.current = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    } catch(e){ toast.show('гғһгӮӨгӮҜгҒёгҒ®гӮўгӮҜгӮ»гӮ№гҒҢжӢ’еҗҰгҒ•гӮҢгҒҫгҒ—гҒҹ','error'); setStatus('idle'); return; }

    const ch = supabase.channel('vc-room', { config:{ broadcast:{ self:false } } });
    ch.on('broadcast',{event:'offer'},async ({payload})=>{
      if(payload.to!==myId.current)return;
      const pc = createPC(payload.from, ch);
      await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      ch.send({type:'broadcast',event:'answer',payload:{from:myId.current,to:payload.from,sdp:answer}});
    })
    .on('broadcast',{event:'answer'},async ({payload})=>{
      if(payload.to!==myId.current)return;
      const pc = pcsRef.current[payload.from];
      if(pc) await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
    })
    .on('broadcast',{event:'ice'},async ({payload})=>{
      if(payload.to!==myId.current)return;
      const pc = pcsRef.current[payload.from];
      if(pc) await pc.addIceCandidate(new RTCIceCandidate(payload.candidate));
    })
    .on('broadcast',{event:'join'},async ({payload})=>{
      if(payload.id===myId.current)return;
      const pc = createPC(payload.id, ch);
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      ch.send({type:'broadcast',event:'offer',payload:{from:myId.current,to:payload.id,sdp:offer}});
    })
    .on('broadcast',{event:'leave'},({payload})=>{
      if(pcsRef.current[payload.id]){ pcsRef.current[payload.id].close(); delete pcsRef.current[payload.id]; }
      setPeers(p=>p.filter(x=>x!==payload.id));
    })
    .subscribe(()=>{
      ch.send({type:'broadcast',event:'join',payload:{id:myId.current,label:studentId}});
      setStatus('connected');
    });
    channelRef.current=ch;
  };

  const createPC = (peerId, ch) => {
    const pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
    pcsRef.current[peerId]=pc;
    localStream.current.getTracks().forEach(t=>pc.addTrack(t,localStream.current));
    pc.onicecandidate = e=>{ if(e.candidate) ch.send({type:'broadcast',event:'ice',payload:{from:myId.current,to:peerId,candidate:e.candidate}}); };
    pc.ontrack = e=>{ setPeers(p=>p.includes(peerId)?p:[...p,peerId]); const audio=document.createElement('audio'); audio.srcObject=e.streams[0]; audio.autoplay=true; document.body.appendChild(audio); };
    return pc;
  };

  const leaveVC = () => {
    const ch=channelRef.current;
    if(ch){ ch.send({type:'broadcast',event:'leave',payload:{id:myId.current}}); supabase.removeChannel(ch); }
    Object.values(pcsRef.current).forEach(pc=>pc.close());
    pcsRef.current={};
    if(localStream.current){ localStream.current.getTracks().forEach(t=>t.stop()); localStream.current=null; }
    setStatus('idle'); setPeers([]);
  };

  useEffect(()=>()=>{ if(status==='connected')leaveVC(); },[]);

  return (
    <div style={{padding:'20px 0'}}>
      <div style={{fontSize:32,marginBottom:12}}>рҹҺӨ</div>
      <div style={{fontFamily:'Noto Serif JP',fontSize:17,fontWeight:700,color:'var(--crimson-dk)',marginBottom:8}}>йҹіеЈ°йҖҡи©ұпјҲVCпјү</div>
      {status==='idle'&&(
        <>
          <div style={{fontSize:13,color:'var(--stone)',marginBottom:16}}>гғңгӮҝгғігӮ’жҠјгҒҷгҒЁгғ«гғјгғ гҒ«е…Ҙе®ӨгҒ—гҒҫгҒҷгҖӮд»–гҒ®еҸӮеҠ иҖ…гҒЁиҮӘеӢ•жҺҘз¶ҡгҒ•гӮҢгҒҫгҒҷгҖӮ</div>
          <button className="btn btn-primary btn-lg" onClick={startVC}>рҹҺӨ е…Ҙе®ӨгҒҷгӮӢ</button>
        </>
      )}
      {status==='joining'&&<div style={{color:'var(--stone)'}}><span className="spinner dark"/> жҺҘз¶ҡдёӯвҖҰ</div>}
      {status==='connected'&&(
        <>
          <div style={{marginBottom:12}}>
            <div className="live-badge" style={{marginBottom:12}}><span className="live-dot"/>йҖҡи©ұдёӯ</div>
            <div style={{fontSize:13,color:'var(--stone)',marginTop:8}}>еҸӮеҠ дёӯ: {peers.length+1} дәә (иҮӘеҲҶеҗ«гӮҖ)</div>
          </div>
          <button className="btn btn-reject" onClick={leaveVC}>рҹ“ө йҖҖе®ӨгҒҷгӮӢ</button>
        </>
      )}
    </div>
  );
}

/* в”Җв”Җ ж•ҷеё«еҒҙпјҡз”ҹеҫ’з”іи«ӢгҒ®жүҝиӘҚ в”Җв”Җ */
function StudentApprovalSection({ teacher, toast }) {
  const [apps,setApps]       = useState([]);
  const [appVotes,setAppVotes] = useState({});
  const [teachers,setTeachers] = useState([]);
  const [loading,setLoading]   = useState(false);

  const load = async () => {
    setLoading(true);
    try {
      const all = await DB.getStudentApplications();
      const pending = all.filter(a=>a.status==='pending');
      setApps(pending);
      const votes = {};
      await Promise.all(pending.map(async a=>{ votes[a.id]=await DB.getStudentVotes(a.id); }));
      setAppVotes(votes);
      setTeachers(await DB.getTeachers());
    } catch(e){toast.show('еҸ–еҫ—гӮЁгғ©гғј: '+e.message,'error');}
    finally{setLoading(false);}
  };
  useEffect(()=>{ load(); },[]);

  const handleVote = async (app, approve) => {
    try {
      await DB.voteStudent(app.id, teacher.teacherId, approve);
      const updatedVotes = await DB.getStudentVotes(app.id);
      const allTeachers  = await DB.getTeachers();
      if (updatedVotes.some(v=>!v.approve)) {
        await DB.rejectStudentApplication(app.id);
        toast.show(`${app.student_id} гҒ®з”іи«ӢгӮ’еҚҙдёӢгҒ—гҒҫгҒ—гҒҹ`);
      } else if (updatedVotes.filter(v=>v.approve).length >= allTeachers.length && allTeachers.length>0) {
        await DB.approveStudentApplication(app.id, app.student_id, app.password_hash);
        toast.show(`${app.student_id} гӮ’з”ҹеҫ’гҒЁгҒ—гҒҰжүҝиӘҚгҒ—гҒҫгҒ—гҒҹпјҒ`,'success');
      } else {
        toast.show(approve?'жүҝиӘҚзҘЁгӮ’е…ҘгӮҢгҒҫгҒ—гҒҹ':'еҗҰжұәзҘЁгӮ’е…ҘгӮҢгҒҫгҒ—гҒҹ', approve?'success':'default');
      }
      load();
    } catch(e){toast.show('гӮЁгғ©гғј: '+e.message,'error');}
  };

  return (
    <div style={{marginTop:20}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <div style={{fontFamily:'Noto Serif JP',fontSize:15,fontWeight:700,color:'var(--crimson-dk)'}}>рҹҺ“ з”ҹеҫ’гҒ®зҷ»йҢІз”іи«Ӣ</div>
        <button className="btn btn-ghost btn-sm" onClick={load} disabled={loading}>{loading?<span className="spinner dark"/>:'вҶ»'} жӣҙж–°</button>
      </div>
      {apps.length===0?(
        <div style={{fontSize:13,color:'var(--stone)',textAlign:'center',padding:'16px 0'}}>жүҝиӘҚеҫ…гҒЎгҒ®з”іи«ӢгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“</div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {apps.map(app=>{
            const votes = appVotes[app.id]||[];
            const myVote = votes.find(v=>v.teacher_id===teacher.teacherId);
            return (
              <div key={app.id} className="approval-item">
                <div className="approval-item-info">
                  <div className="approval-item-id">{app.student_id}</div>
                  <div className="approval-item-meta">{app.applied_at?.slice(0,10)} з”іи«Ӣ</div>
                  <div className="approval-votes">жүҝиӘҚ: <span className="vote-count">{votes.filter(v=>v.approve).length}</span> / {teachers.length}</div>
                </div>
                {myVote?(
                  <span className={`badge ${myVote.approve?'badge-approved':'badge-rejected'}`}>{myVote.approve?'жүҝиӘҚжёҲ':'еҗҰжұәжёҲ'}</span>
                ):(
                  <div style={{display:'flex',gap:8}}>
                    <button className="btn btn-sm btn-approve" onClick={()=>handleVote(app,true)}>вң“ жүҝиӘҚ</button>
                    <button className="btn btn-sm btn-reject" onClick={()=>handleVote(app,false)}>вң• еҚҙдёӢ</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* в”Җв”Җ з”ҹеҫ’пјҡеӣһзӯ”гӮ·гғјгғҲ в”Җв”Җ */
function AnswerSheet({ task, nickname, onSubmit }) {
  const [answers,setAnswers]=useState({}); const [submitted,setSubmitted]=useState(false); const [loading,setLoading]=useState(false);
  const fields=task.answerFields||[];
  const filled=fields.filter(f=>(answers[f.id]||'').trim()!=='').length;
  const total=fields.length; const pct=total===0?0:Math.round((filled/total)*100);

  const handleSubmit=async()=>{
    if(filled<total){if(!window.confirm(`гҒҫгҒ  ${total-filled} е•ҸгҒҢжңӘе…ҘеҠӣгҒ§гҒҷгҖӮгҒ“гҒ®гҒҫгҒҫжҸҗеҮәгҒ—гҒҫгҒҷгҒӢпјҹ`))return;}
    setLoading(true);
    try{await DB.createSubmission({id:genId(),taskId:task.id,nickname,answers:{...answers},submittedAt:new Date().toISOString()});setSubmitted(true);onSubmit();}
    catch(e){alert('жҸҗеҮәгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ: '+e.message);}
    finally{setLoading(false);}
  };

  if(submitted) return (
    <div className="answer-sheet-wrap">
      <div className="done-page" style={{padding:'40px 24px'}}>
        <div className="done-icon">рҹҺү</div>
        <div className="done-title">жҸҗеҮәе®ҢдәҶпјҒ</div>
        <div className="done-sub">{nickname} гҒ•гӮ“гҒ®еӣһзӯ”гӮ’еҸ—гҒ‘д»ҳгҒ‘гҒҫгҒ—гҒҹгҖӮ<br/>гҒҠз–ІгӮҢж§ҳгҒ§гҒ—гҒҹпјҒ</div>
      </div>
      {/* и§ЈиӘ¬иЎЁзӨә */}
      {(task.explanationText||task.explanationImageUrl)&&(
        <div className="explanation-box">
          <div className="explanation-title">рҹ’Ў и§ЈиӘ¬</div>
          {task.explanationText&&<div className="explanation-text">{task.explanationText}</div>}
          {task.explanationImageUrl&&<img src={task.explanationImageUrl} alt="и§ЈиӘ¬з”»еғҸ" className="explanation-img"/>}
        </div>
      )}
      <button className="btn btn-ghost btn-full" onClick={()=>window.location.reload()}>гғҲгғғгғ—гҒ«жҲ»гӮӢ</button>
    </div>
  );

  return (
    <div className="answer-sheet-wrap">
      <div className="sheet-header">
        <div className="sheet-title">{task.title}</div>
        {task.description&&<div className="sheet-desc">{task.description}</div>}
        <div style={{marginTop:6,fontSize:13,opacity:.7}}>з”ҹеҫ’пјҡ{nickname}</div>
      </div>
      <div className="sheet-canvas-wrapper">
        {task.imageDataUrl?(
          <div className="sheet-canvas">
            <img src={task.imageDataUrl} alt="е•ҸйЎҢгғ—гғӘгғігғҲ" draggable={false}/>
            {fields.map(f=>(<div key={f.id} style={{position:'absolute',left:f.x+'%',top:f.y+'%',width:f.width+'%',height:f.height+'%'}}><input className="answer-input" type={f.type==='number'?'number':'text'} placeholder={f.label} value={answers[f.id]||''} onChange={e=>setAnswers(a=>({...a,[f.id]:e.target.value}))} disabled={submitted}/></div>))}
          </div>
        ):(<div className="canvas-placeholder"><div className="big-icon">рҹ“„</div><p>гғ—гғӘгғігғҲз”»еғҸгҒҢж·»д»ҳгҒ•гӮҢгҒҰгҒ„гҒҫгҒӣгӮ“</p></div>)}
      </div>
      {fields.length>0&&(
        <div className="side-panel">
          <div className="side-panel-title">еӣһзӯ”дёҖиҰ§пјҲе…ҘеҠӣиЈңеҠ©пјү</div>
          {fields.map((f,i)=>(
            <div key={f.id} className="form-group" style={{marginBottom:10}}>
              <label className="form-label">{i+1}. {f.label}<span className={`type-pill ${f.type==='number'?'type-number':'type-text'}`} style={{marginLeft:6}}>{f.type==='number'?'ж•°еҖӨ':'гғҶгӮӯгӮ№гғҲ'}</span></label>
              <input className="form-input" type={f.type==='number'?'number':'text'} placeholder="еӣһзӯ”гӮ’е…ҘеҠӣвҖҰ" value={answers[f.id]||''} onChange={e=>setAnswers(a=>({...a,[f.id]:e.target.value}))} disabled={submitted}/>
            </div>
          ))}
        </div>
      )}
      <div className="sheet-submit-bar">
        <div className="sheet-progress">
          <div className="progress-text">{filled} / {total} е•Ҹ е…ҘеҠӣжёҲгҒҝ</div>
          <div className="progress-bar-bg"><div className="progress-bar-fill" style={{width:pct+'%'}}/></div>
        </div>
        <button className="btn btn-primary btn-lg" onClick={handleSubmit} disabled={loading}>
          {loading?<><span className="spinner"/> жҸҗеҮәдёӯвҖҰ</>:'жҸҗеҮәгҒҷгӮӢ рҹ“©'}
        </button>
      </div>
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   иӘІйЎҢз·ЁйӣҶ
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function TaskEditor({ task, onDone, toast }) {
  const [title,setTitle]     = useState(task.title||'');
  const [desc,setDesc]       = useState(task.description||'');
  const [expText,setExpText] = useState(task.explanationText||'');
  const [expImg,setExpImg]   = useState(task.explanationImageUrl||null);
  const [saving,setSaving]   = useState(false);
  const expImgRef=useRef(null);

  const handleExpImg=(file)=>{
    if(!file)return;
    const r=new FileReader();
    r.onload=ev=>setExpImg(ev.target.result);
    r.readAsDataURL(file);
  };

  const save=async()=>{
    if(!title.trim()){toast.show('гӮҝгӮӨгғҲгғ«гӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„','error');return;}
    setSaving(true);
    try{
      await DB.updateTask(task.id,{title:title.trim(),description:desc.trim(),explanationText:expText.trim(),explanationImageUrl:expImg});
      toast.show('иӘІйЎҢгӮ’жӣҙж–°гҒ—гҒҫгҒ—гҒҹ','success');
      onDone();
    }catch(e){toast.show('жӣҙж–°гӮЁгғ©гғј: '+e.message,'error');}
    finally{setSaving(false);}
  };

  return(
    <div className="main">
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
        <button className="btn btn-ghost btn-sm" onClick={onDone}>вҶҗ жҲ»гӮӢ</button>
        <div style={{fontFamily:'Noto Serif JP',fontSize:22,fontWeight:700,color:'var(--crimson-dk)'}}>вңҸпёҸ иӘІйЎҢгӮ’з·ЁйӣҶ</div>
      </div>
      <div className="form-box" style={{maxWidth:640}}>
        <div className="form-group">
          <label className="form-label">иӘІйЎҢгӮҝгӮӨгғҲгғ« <span style={{color:'var(--crimson)'}}>*</span></label>
          <input className="form-input" value={title} onChange={e=>setTitle(e.target.value)}/>
        </div>
        <div className="form-group">
          <label className="form-label">иӘ¬жҳҺпјҲд»»ж„Ҹпјү</label>
          <textarea className="form-textarea" value={desc} onChange={e=>setDesc(e.target.value)}/>
        </div>
        <div className="divider"/>
        <div style={{fontFamily:'Noto Serif JP',fontSize:15,fontWeight:700,color:'var(--gold)',marginBottom:14}}>рҹ’Ў и§ЈиӘ¬гҒ®з·ЁйӣҶ</div>
        <div className="form-group">
          <label className="form-label">и§ЈиӘ¬гғҶгӮӯгӮ№гғҲ</label>
          <textarea className="form-textarea" style={{minHeight:120}} placeholder="дҫӢпјҡдёЎиҫәгҒ«3гӮ’гҒӢгҒ‘гҒҰвҖҰ" value={expText} onChange={e=>setExpText(e.target.value)}/>
        </div>
        <div className="form-group">
          <label className="form-label">и§ЈиӘ¬з”»еғҸ</label>
          {expImg?(
            <div style={{position:'relative'}}>
              <img src={expImg} alt="и§ЈиӘ¬" style={{width:'100%',borderRadius:8,border:'2px solid var(--paper-dk)'}}/>
              <button className="btn btn-ghost btn-sm" style={{position:'absolute',top:8,right:8,color:'var(--crimson)'}} onClick={()=>setExpImg(null)}>вң• еүҠйҷӨ</button>
            </div>
          ):(
            <div className="upload-zone" onClick={()=>expImgRef.current.click()} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();handleExpImg(e.dataTransfer.files?.[0]);}}>
              <div className="big">рҹ–ј</div><p>и§ЈиӘ¬з”»еғҸгӮ’гӮўгғғгғ—гғӯгғјгғүпјҲPNG/JPGпјү</p>
              <input ref={expImgRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>handleExpImg(e.target.files?.[0])}/>
            </div>
          )}
        </div>
        <div style={{background:'#FEF3C7',border:'1.5px solid #F59E0B',borderRadius:10,padding:12,fontSize:12,color:'#92400E',marginBottom:18}}>
          вҡ пёҸ еӣһзӯ”ж¬„гҒ®й…ҚзҪ®гғ»гғ—гғӘгӮ№гғҲз”»еғҸгҒҜеӨүжӣҙгҒ§гҒҚгҒҫгҒӣгӮ“гҖӮеҶҚдҪңжҲҗгҒҢеҝ…иҰҒгҒӘе ҙеҗҲгҒҜеүҠйҷӨгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ
        </div>
        <button className="btn btn-primary btn-full btn-lg" disabled={saving} onClick={save}>
          {saving?<><span className="spinner"/> дҝқеӯҳдёӯвҖҰ</>:'рҹ’ҫ еӨүжӣҙгӮ’дҝқеӯҳ'}
        </button>
      </div>
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   ROOT APP
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function App() {
  const toast=useToast();
  const savedSession=(()=>{try{return JSON.parse(localStorage.getItem('kogetsu_session')||'null');}catch{return null;}})();
  const [role,setRole]             = useState(savedSession?.role||null);
  const [teacher,setTeacher]       = useState(savedSession?.teacher||null);
  const [student,setStudent]       = useState(savedSession?.student||null);
  const [view,setView]             = useState('dashboard');
  const [reviewTask,setReviewTask] = useState(null);
  const [editTask,setEditTask]     = useState(null);

  useEffect(()=>{
    if(role==='teacher'&&teacher){ localStorage.setItem('kogetsu_session',JSON.stringify({role,teacher})); }
    else if(role==='student'&&student){ localStorage.setItem('kogetsu_session',JSON.stringify({role,student})); }
    else{ localStorage.removeItem('kogetsu_session'); }
  },[role,teacher,student]);

  const goHome=()=>{ setRole(null); setStudent(null); setTeacher(null); };
  const handleTeacherLogout=()=>{ localStorage.removeItem('kogetsu_session'); setTeacher(null); setRole(null); setView('dashboard'); };
  const handleStudentLogout=()=>{ localStorage.removeItem('kogetsu_session'); setStudent(null); setRole(null); };

  const renderTeacher=()=>{
    if(!teacher) return <TeacherAuth onLogin={u=>{setTeacher(u);setView('dashboard');}} toast={toast}/>;
    if(view==='create') return <TaskCreator teacher={teacher} toast={toast} onDone={()=>setView('dashboard')}/>;
    if(view==='edit'&&editTask) return <TaskEditor task={editTask} toast={toast} onDone={()=>setView('dashboard')}/>;
    if(view==='review'&&reviewTask) return <SubmissionReviewer task={reviewTask} onBack={()=>setView('dashboard')}/>;
    return <TeacherDashboard teacher={teacher} toast={toast}
      onCreate={()=>setView('create')}
      onEdit={t=>{setEditTask(t);setView('edit');}}
      onReview={t=>{setReviewTask(t);setView('review');}}
      onLogout={handleTeacherLogout}/>;
  };

  const renderStudent=()=>{
    if(!student) return <StudentAuth onLogin={s=>{setStudent(s);}} toast={toast}/>;
    return <StudentDashboard student={student} toast={toast} onLogout={handleStudentLogout}/>;
  };

  if(!role)return(
    <div className="app">
      <Header role={null} onRoleChange={setRole} onHome={goHome}/>
      <div className="landing">
        <Kamon size={88}/>
        <div className="landing-title">зҙ…жңҲиЁҲз®—еЎҫ</div>
        <div className="landing-subtitle">еӯҰзҝ’ж”ҜжҸҙгғңгғ©гғігғҶгӮЈгӮўгҒ®гҒҹгӮҒгҒ®<br/>гғҮгӮёгӮҝгғ«иӘІйЎҢгғ—гғ©гғғгғҲгғ•гӮ©гғјгғ </div>
        <div className="landing-cards">
          <div className="landing-card" onClick={()=>setRole('teacher')}><div className="card-icon teacher">рҹ“ҡ</div><div className="card-label">ж•ҷгҒҲгӮӢеҒҙ</div><div className="card-desc">е•ҸйЎҢгғ—гғӘгғігғҲгӮ’гӮўгғғгғ—гғӯгғјгғүгҒ—гҖҒиӘІйЎҢгҒ®дҪңжҲҗгғ»жҺЎзӮ№гғ»жқҝжӣёй…ҚдҝЎгҒҢгҒ§гҒҚгҒҫгҒҷгҖӮ</div><div className="card-cta">гғӯгӮ°гӮӨгғігҒ—гҒҰе§ӢгӮҒгӮӢ вҶ’</div></div>
          <div className="landing-card" onClick={()=>setRole('student')}><div className="card-icon student">вңҸпёҸ</div><div className="card-label">з”ҹеҫ’</div><div className="card-desc">гғӯгӮ°гӮӨгғігҒ—гҒҰиӘІйЎҢжҸҗеҮәгғ»гғӣгғҜгӮӨгғҲгғңгғјгғүиҰ–иҒҙгғ»гғҒгғЈгғғгғҲгғ»йҹіеЈ°йҖҡи©ұгҒҢгҒ§гҒҚгҒҫгҒҷгҖӮ</div><div className="card-cta">гғӯгӮ°гӮӨгғігҒ—гҒҰе§ӢгӮҒгӮӢ вҶ’</div></div>
        </div>
      </div>
      <Toasts toasts={toast.toasts}/>
    </div>
  );

  return(
    <div className="app">
      <Header role={role} onRoleChange={r=>{setRole(r);setStudent(null);setTeacher(null);setView('dashboard');}} onHome={goHome}/>
      {role==='teacher'?renderTeacher():renderStudent()}
      <Toasts toasts={toast.toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
