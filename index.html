<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>紅月計算塾</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;900&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --crimson:    #9B1B30;
    --crimson-dk: #6D0F20;
    --crimson-lt: #C84054;
    --gold:       #C9972C;
    --gold-lt:    #F0C060;
    --ink:        #1A1410;
    --paper:      #F9F4ED;
    --paper-dk:   #EDE5D8;
    --stone:      #8A7F74;
    --stone-lt:   #C4BAB0;
    --white:      #FFFFFF;
    --shadow:     rgba(26,20,16,.18);
    --r:          8px;
  }

  html, body, #root {
    height: 100%; width: 100%;
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--paper);
    color: var(--ink);
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--paper-dk); }
  ::-webkit-scrollbar-thumb { background: var(--stone-lt); border-radius: 3px; }

  /* ── Utility ── */
  .mono { font-family: 'DM Mono', monospace; }
  .serif { font-family: 'Noto Serif JP', serif; }

  /* ── Page wrapper ── */
  .app { min-height: 100vh; display: flex; flex-direction: column; }

  /* ══════════════════════════════════════════
     HEADER
  ══════════════════════════════════════════ */
  .header {
    background: var(--crimson-dk);
    color: var(--paper);
    padding: 0 24px;
    height: 58px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px var(--shadow);
  }
  .header-logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Noto Serif JP', serif;
    font-size: 18px; font-weight: 900;
    letter-spacing: .05em;
    cursor: pointer; user-select: none;
  }
  .header-logo .moon {
    width: 28px; height: 28px;
    background: var(--gold);
    border-radius: 50%;
    position: relative; overflow: hidden;
    flex-shrink: 0;
  }
  .header-logo .moon::after {
    content: '';
    position: absolute;
    top: 3px; left: 8px;
    width: 22px; height: 22px;
    background: var(--crimson-dk);
    border-radius: 50%;
  }
  .header-nav { display: flex; gap: 8px; align-items: center; }
  .nav-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid rgba(255,255,255,.35);
    background: transparent;
    color: var(--paper);
    font-size: 13px; font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer; transition: all .18s;
  }
  .nav-btn:hover { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.6); }
  .nav-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--ink);
    font-weight: 700;
  }

  /* ══════════════════════════════════════════
     MAIN LAYOUT
  ══════════════════════════════════════════ */
  .main { flex: 1; padding: 32px 24px; max-width: 1100px; margin: 0 auto; width: 100%; }

  /* ══════════════════════════════════════════
     LANDING / TOP
  ══════════════════════════════════════════ */
  .landing {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: calc(100vh - 58px);
    text-align: center; gap: 32px;
    padding: 40px 24px;
  }
  .landing-kamon {
    width: 90px; height: 90px;
    position: relative;
  }
  .landing-kamon svg { width: 100%; height: 100%; }
  .landing-title {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 900;
    color: var(--crimson-dk);
    letter-spacing: .08em;
    line-height: 1.2;
  }
  .landing-subtitle {
    font-size: 15px; color: var(--stone);
    line-height: 1.8; max-width: 460px;
  }
  .landing-cards {
    display: flex; gap: 20px; flex-wrap: wrap;
    justify-content: center; max-width: 700px;
  }
  .landing-card {
    flex: 1; min-width: 240px; max-width: 300px;
    background: var(--white);
    border: 2px solid var(--paper-dk);
    border-radius: 16px;
    padding: 28px 24px;
    display: flex; flex-direction: column; gap: 12px;
    cursor: pointer;
    transition: all .22s cubic-bezier(.25,.8,.25,1);
    box-shadow: 0 2px 8px var(--shadow);
    text-align: left;
  }
  .landing-card:hover {
    border-color: var(--crimson);
    box-shadow: 0 8px 28px rgba(155,27,48,.15);
    transform: translateY(-4px);
  }
  .card-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .card-icon.teacher { background: rgba(155,27,48,.1); }
  .card-icon.student { background: rgba(201,151,44,.1); }
  .card-label {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px; font-weight: 700;
    color: var(--crimson-dk);
  }
  .card-desc { font-size: 13px; color: var(--stone); line-height: 1.7; }
  .card-cta {
    margin-top: 8px;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 700;
    color: var(--crimson);
  }

  /* ══════════════════════════════════════════
     FORMS & INPUTS
  ══════════════════════════════════════════ */
  .form-box {
    background: var(--white);
    border: 2px solid var(--paper-dk);
    border-radius: 16px;
    padding: 36px;
    max-width: 480px; margin: 0 auto;
    box-shadow: 0 4px 20px var(--shadow);
  }
  .form-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 22px; font-weight: 700;
    color: var(--crimson-dk);
    margin-bottom: 24px;
  }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
  .form-label { font-size: 13px; font-weight: 700; color: var(--ink); }
  .form-hint { font-size: 12px; color: var(--stone); margin-top: 2px; }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid var(--paper-dk);
    border-radius: var(--r);
    background: var(--paper);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px; color: var(--ink);
    transition: border-color .15s;
    outline: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--crimson);
    background: var(--white);
  }
  .form-textarea { resize: vertical; min-height: 80px; }

  /* ══════════════════════════════════════════
     BUTTONS
  ══════════════════════════════════════════ */
  .btn {
    padding: 11px 24px;
    border-radius: 8px; border: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all .18s;
    display: inline-flex; align-items: center; gap: 8px;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--crimson);
    color: var(--white);
  }
  .btn-primary:hover { background: var(--crimson-dk); box-shadow: 0 4px 14px rgba(155,27,48,.3); }
  .btn-secondary {
    background: transparent;
    border: 2px solid var(--crimson);
    color: var(--crimson);
  }
  .btn-secondary:hover { background: rgba(155,27,48,.06); }
  .btn-gold {
    background: var(--gold);
    color: var(--ink);
  }
  .btn-gold:hover { background: var(--gold-lt); }
  .btn-ghost {
    background: var(--paper-dk);
    color: var(--stone);
  }
  .btn-ghost:hover { background: var(--stone-lt); color: var(--ink); }
  .btn-sm { padding: 7px 14px; font-size: 12px; border-radius: 6px; }
  .btn-lg { padding: 14px 32px; font-size: 16px; border-radius: 10px; }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn-full { width: 100%; justify-content: center; }

  /* ══════════════════════════════════════════
     BADGE / TAG
  ══════════════════════════════════════════ */
  .badge {
    display: inline-flex; align-items: center;
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700; letter-spacing: .03em;
  }
  .badge-published { background: #D1FAE5; color: #065F46; }
  .badge-draft    { background: var(--paper-dk); color: var(--stone); }
  .badge-new      { background: rgba(155,27,48,.12); color: var(--crimson); }

  /* ══════════════════════════════════════════
     TEACHER DASHBOARD
  ══════════════════════════════════════════ */
  .dashboard-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
  }
  .dashboard-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 26px; font-weight: 700; color: var(--crimson-dk);
  }
  .task-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }
  .task-card {
    background: var(--white);
    border: 2px solid var(--paper-dk);
    border-radius: 14px;
    padding: 20px;
    display: flex; flex-direction: column; gap: 10px;
    transition: all .2s;
    box-shadow: 0 1px 6px var(--shadow);
  }
  .task-card:hover { border-color: var(--crimson-lt); box-shadow: 0 4px 16px rgba(155,27,48,.12); }
  .task-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .task-card-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 16px; font-weight: 700; color: var(--ink);
    line-height: 1.4;
  }
  .task-card-meta { font-size: 12px; color: var(--stone); }
  .task-card-code {
    font-family: 'DM Mono', monospace;
    font-size: 20px; font-weight: 500;
    color: var(--crimson);
    letter-spacing: .12em;
    background: rgba(155,27,48,.06);
    padding: 6px 12px; border-radius: 6px;
    display: inline-block;
  }
  .task-card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .stat-row { display: flex; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }
  .stat-box {
    flex: 1; min-width: 120px;
    background: var(--white);
    border: 2px solid var(--paper-dk);
    border-radius: 12px;
    padding: 18px 20px;
    text-align: center;
  }
  .stat-num {
    font-family: 'DM Mono', monospace;
    font-size: 32px; font-weight: 500; color: var(--crimson);
  }
  .stat-label { font-size: 12px; color: var(--stone); margin-top: 4px; }

  /* ══════════════════════════════════════════
     TASK CREATOR
  ══════════════════════════════════════════ */
  .creator-layout {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 800px) {
    .creator-layout { grid-template-columns: 1fr; }
  }
  .canvas-wrapper {
    background: var(--white);
    border: 2px solid var(--paper-dk);
    border-radius: 14px;
    overflow: hidden;
    min-height: 420px;
    position: relative;
  }
  .canvas-toolbar {
    background: var(--paper-dk);
    padding: 10px 16px;
    display: flex; gap: 10px; align-items: center;
    flex-wrap: wrap;
    border-bottom: 2px solid var(--stone-lt);
  }
  .canvas-area {
    position: relative;
    width: 100%;
    user-select: none;
    cursor: crosshair;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 27px,
      rgba(155,27,48,.04) 27px, rgba(155,27,48,.04) 28px
    ),
    repeating-linear-gradient(
      90deg, transparent, transparent 27px,
      rgba(155,27,48,.04) 27px, rgba(155,27,48,.04) 28px
    );
  }
  .canvas-area img {
    width: 100%;
    height: auto;
    display: block;
    pointer-events: none;
  }
  .canvas-placeholder {
    min-height: 400px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; color: var(--stone-lt);
    padding: 40px;
  }
  .canvas-placeholder .big-icon { font-size: 52px; }
  .canvas-placeholder p { font-size: 14px; text-align: center; line-height: 1.7; }

  /* Answer field overlays on canvas */
  .field-overlay {
    position: absolute;
    border: 2.5px solid var(--crimson);
    background: rgba(155,27,48,.08);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background .12s;
  }
  .field-overlay:hover { background: rgba(155,27,48,.18); }
  .field-overlay.selected {
    border-color: var(--gold);
    background: rgba(201,151,44,.15);
    box-shadow: 0 0 0 3px rgba(201,151,44,.25);
  }
  .field-label-chip {
    position: absolute;
    top: -12px; left: 0;
    background: var(--crimson);
    color: var(--white);
    font-size: 9px; font-weight: 700;
    padding: 1px 6px; border-radius: 3px;
    white-space: nowrap;
    pointer-events: none;
  }
  /* Drawing rectangle while dragging */
  .draw-rect {
    position: absolute;
    border: 2px dashed var(--crimson);
    background: rgba(155,27,48,.07);
    pointer-events: none;
    border-radius: 4px;
  }

  /* Side panel */
  .side-panel {
    background: var(--white);
    border: 2px solid var(--paper-dk);
    border-radius: 14px;
    padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .side-panel-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 15px; font-weight: 700; color: var(--crimson-dk);
    border-bottom: 2px solid var(--paper-dk); padding-bottom: 10px;
  }
  .field-list { display: flex; flex-direction: column; gap: 8px; }
  .field-item {
    background: var(--paper);
    border: 1.5px solid var(--paper-dk);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; transition: all .15s;
  }
  .field-item:hover { border-color: var(--crimson-lt); }
  .field-item.selected { border-color: var(--gold); background: rgba(201,151,44,.07); }
  .field-item-num {
    width: 22px; height: 22px;
    background: var(--crimson); color: var(--white);
    border-radius: 50%; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .field-item-info { flex: 1; min-width: 0; }
  .field-item-name { font-size: 13px; font-weight: 700; color: var(--ink); }
  .field-item-type { font-size: 11px; color: var(--stone); }
  .type-pill {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700;
  }
  .type-text   { background: #DBEAFE; color: #1E40AF; }
  .type-number { background: #F3E8FF; color: #6B21A8; }
  .empty-hint {
    font-size: 12px; color: var(--stone-lt);
    text-align: center; line-height: 1.8;
    padding: 8px 0;
  }

  /* ══════════════════════════════════════════
     STUDENT ANSWER SHEET
  ══════════════════════════════════════════ */
  .answer-sheet-wrap {
    max-width: 780px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 20px;
  }
  .sheet-header {
    background: var(--crimson-dk);
    color: var(--white); border-radius: 14px;
    padding: 20px 24px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .sheet-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px; font-weight: 700;
  }
  .sheet-desc { font-size: 13px; opacity: .8; }
  .sheet-canvas-wrapper {
    background: var(--white);
    border: 2px solid var(--paper-dk);
    border-radius: 14px;
    overflow: hidden;
    position: relative;
  }
  .sheet-canvas { position: relative; width: 100%; }
  .sheet-canvas img { width: 100%; height: auto; display: block; }

  /* Input fields rendered on sheet */
  .answer-input {
    position: absolute;
    background: rgba(255,255,255,.92);
    border: 2.5px solid var(--gold);
    border-radius: 5px;
    padding: 4px 8px;
    font-family: 'DM Mono', monospace;
    font-size: 15px; color: var(--ink);
    outline: none; transition: border-color .15s, box-shadow .15s;
    width: 100%; height: 100%;
  }
  .answer-input:focus {
    border-color: var(--crimson);
    box-shadow: 0 0 0 3px rgba(155,27,48,.15);
  }
  .answer-input:disabled {
    background: rgba(235,235,235,.8);
    border-color: var(--stone-lt);
    color: var(--stone);
    cursor: not-allowed;
  }
  .sheet-submit-bar {
    background: var(--white);
    border: 2px solid var(--paper-dk);
    border-radius: 14px;
    padding: 20px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
  }
  .sheet-progress { display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .progress-bar-bg {
    height: 6px; border-radius: 3px;
    background: var(--paper-dk); overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: var(--gold);
    border-radius: 3px;
    transition: width .4s ease;
  }
  .progress-text { font-size: 12px; color: var(--stone); }

  /* ══════════════════════════════════════════
     SUBMISSION VIEWER (teacher)
  ══════════════════════════════════════════ */
  .review-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 24px; flex-wrap: wrap;
  }
  .review-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 22px; font-weight: 700; color: var(--crimson-dk);
  }
  .sub-table {
    width: 100%; border-collapse: collapse;
    background: var(--white);
    border: 2px solid var(--paper-dk);
    border-radius: 12px; overflow: hidden;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .sub-table th, .sub-table td {
    padding: 12px 16px; text-align: left;
    border-bottom: 1px solid var(--paper-dk);
    font-size: 13px;
  }
  .sub-table th {
    background: var(--paper-dk);
    font-weight: 700; color: var(--stone);
    font-size: 12px; text-transform: uppercase; letter-spacing: .05em;
  }
  .sub-table tr:last-child td { border-bottom: none; }
  .sub-table tr:hover td { background: rgba(155,27,48,.03); }
  .answer-chip {
    font-family: 'DM Mono', monospace;
    background: var(--paper-dk);
    padding: 2px 8px; border-radius: 4px;
    font-size: 13px; color: var(--ink);
    margin-right: 4px; display: inline-block; margin-bottom: 2px;
  }

  /* ══════════════════════════════════════════
     STUDENT CODE ENTRY
  ══════════════════════════════════════════ */
  .code-entry {
    max-width: 380px; margin: 60px auto;
    text-align: center; display: flex; flex-direction: column; gap: 20px;
  }
  .code-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 24px; font-weight: 700; color: var(--crimson-dk);
  }
  .code-input {
    width: 100%;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 28px; font-weight: 500;
    letter-spacing: .25em;
    padding: 16px;
    border: 3px solid var(--paper-dk);
    border-radius: 12px;
    background: var(--white); color: var(--crimson);
    outline: none; transition: border-color .15s;
  }
  .code-input:focus { border-color: var(--crimson); }
  .code-or {
    color: var(--stone-lt); font-size: 13px;
    display: flex; align-items: center; gap: 10px;
  }
  .code-or::before, .code-or::after {
    content: ''; flex: 1; height: 1px; background: var(--paper-dk);
  }

  /* ══════════════════════════════════════════
     MODAL
  ══════════════════════════════════════════ */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,20,16,.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 20px;
  }
  .modal {
    background: var(--white);
    border-radius: 16px;
    padding: 28px; width: 100%; max-width: 440px;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
  }
  .modal-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px; font-weight: 700; color: var(--crimson-dk);
    margin-bottom: 16px;
  }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* ══════════════════════════════════════════
     TOAST
  ══════════════════════════════════════════ */
  .toast-container {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    z-index: 300;
    display: flex; flex-direction: column; gap: 8px; align-items: center;
  }
  .toast {
    background: var(--ink);
    color: var(--white);
    padding: 11px 20px; border-radius: 30px;
    font-size: 13px; font-weight: 500;
    box-shadow: 0 4px 20px rgba(0,0,0,.25);
    animation: toastIn .25s ease;
    display: flex; align-items: center; gap: 8px;
    white-space: nowrap;
  }
  .toast.success { background: #065F46; }
  .toast.error   { background: var(--crimson-dk); }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ══════════════════════════════════════════
     DONE PAGE
  ══════════════════════════════════════════ */
  .done-page {
    text-align: center; padding: 80px 24px;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  .done-icon { font-size: 64px; }
  .done-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 28px; font-weight: 700; color: var(--crimson-dk);
  }
  .done-sub { font-size: 15px; color: var(--stone); line-height: 1.8; max-width: 360px; }

  /* ══════════════════════════════════════════
     UPLOAD ZONE
  ══════════════════════════════════════════ */
  .upload-zone {
    border: 3px dashed var(--stone-lt);
    border-radius: 12px;
    padding: 36px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    background: var(--paper);
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--crimson);
    background: rgba(155,27,48,.03);
  }
  .upload-zone p { font-size: 13px; color: var(--stone); margin-top: 10px; line-height: 1.7; }
  .upload-zone .big { font-size: 36px; }

  /* ══════════════════════════════════════════
     RESPONSIVE
  ══════════════════════════════════════════ */
  @media (max-width: 600px) {
    .main { padding: 20px 14px; }
    .form-box { padding: 22px 18px; }
    .side-panel { padding: 14px; }
    .sheet-submit-bar { flex-direction: column; align-items: stretch; }
  }

  /* ── Misc ── */
  .divider { height: 1px; background: var(--paper-dk); margin: 16px 0; }
  .text-muted { color: var(--stone); font-size: 13px; }
  .text-center { text-align: center; }
  .flex-row { display: flex; align-items: center; gap: 8px; }
  .flex-between { display: flex; align-items: center; justify-content: space-between; }
  .mt-8  { margin-top: 8px; }
  .mt-16 { margin-top: 16px; }
  .mt-24 { margin-top: 24px; }
  .gap-8 { gap: 8px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ══════════════════════════════════════════
   IN-MEMORY STORAGE  (Firebase の代わり)
   実際の運用では Firebase SDK に差し替える
══════════════════════════════════════════ */
const DB = {
  tasks: [],
  submissions: [],
  nextId: 1,
};

function genId() { return 'id_' + (DB.nextId++); }
function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length: 6}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}

/* ══════════════════════════════════════════
   TOAST HOOK
══════════════════════════════════════════ */
function useToast() {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((msg, type = 'default') => {
    const id = genId();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2800);
  }, []);
  return { toasts, show };
}

/* ══════════════════════════════════════════
   COMPONENTS
══════════════════════════════════════════ */

/* ── Kamon SVG ── */
function Kamon({ size = 80, color = '#9B1B30' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 100 100">
      {/* outer ring */}
      <circle cx="50" cy="50" r="46" fill="none" stroke={color} strokeWidth="3" />
      {/* crescent */}
      <circle cx="50" cy="50" r="32" fill={color} />
      <circle cx="62" cy="42" r="26" fill="#F9F4ED" />
      {/* star dot */}
      <circle cx="32" cy="58" r="5" fill="#C9972C" />
    </svg>
  );
}

/* ── Header ── */
function Header({ role, onRoleChange, onHome }) {
  return (
    <header className="header">
      <div className="header-logo" onClick={onHome}>
        <div className="moon" />
        <span>紅月計算塾</span>
      </div>
      <nav className="header-nav">
        <button className={`nav-btn ${role === 'teacher' ? 'active' : ''}`}
          onClick={() => onRoleChange('teacher')}>教える側</button>
        <button className={`nav-btn ${role === 'student' ? 'active' : ''}`}
          onClick={() => onRoleChange('student')}>生徒</button>
      </nav>
    </header>
  );
}

/* ── Toast ── */
function Toasts({ toasts }) {
  if (!toasts.length) return null;
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>
          {t.type === 'success' ? '✓' : t.type === 'error' ? '✕' : 'ℹ'} {t.msg}
        </div>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════
   STUDENT FLOW
══════════════════════════════════════════ */

/* Code Entry */
function StudentCodeEntry({ onEnter, toast }) {
  const [code, setCode] = useState('');
  const [nick, setNick] = useState('');
  const [err, setErr] = useState('');

  const handle = () => {
    const trimmed = code.trim().toUpperCase();
    if (trimmed.length < 4) { setErr('課題コードを入力してください'); return; }
    if (!nick.trim()) { setErr('ニックネームを入力してください'); return; }
    const task = DB.tasks.find(t => t.accessCode === trimmed && t.isPublished);
    if (!task) { setErr('課題が見つかりません。コードを確認してください。'); return; }
    setErr('');
    onEnter(task, nick.trim());
  };

  return (
    <div className="code-entry">
      <Kamon size={72} />
      <div className="code-title">課題コードを入力</div>
      <input
        className="code-input"
        placeholder="例: AB1234"
        value={code}
        maxLength={8}
        onChange={e => { setCode(e.target.value.toUpperCase()); setErr(''); }}
        onKeyDown={e => e.key === 'Enter' && handle()}
      />
      <div className="form-group" style={{textAlign:'left'}}>
        <label className="form-label">ニックネーム</label>
        <input className="form-input" placeholder="例: たろう" value={nick}
          onChange={e => { setNick(e.target.value); setErr(''); }}
          onKeyDown={e => e.key === 'Enter' && handle()}
          maxLength={20} />
        <div className="form-hint">本名は不要です（最大20文字）</div>
      </div>
      {err && <div style={{color: 'var(--crimson)', fontSize: 13}}>{err}</div>}
      <button className="btn btn-primary btn-lg btn-full" onClick={handle}>
        課題を開く →
      </button>
    </div>
  );
}

/* Answer Sheet */
function AnswerSheet({ task, nickname, onSubmit }) {
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);

  const fields = task.answerFields || [];
  const filled  = fields.filter(f => (answers[f.id] || '').trim() !== '').length;
  const total   = fields.length;
  const pct     = total === 0 ? 0 : Math.round((filled / total) * 100);

  const handleSubmit = () => {
    if (filled < total) {
      if (!window.confirm(`まだ ${total - filled} 問が未入力です。このまま提出しますか？`)) return;
    }
    const sub = {
      id: genId(),
      taskId: task.id,
      nickname,
      answers: { ...answers },
      submittedAt: new Date().toISOString(),
      isLocked: true,
    };
    DB.submissions.push(sub);
    setSubmitted(true);
    onSubmit();
  };

  if (submitted) {
    return (
      <div className="done-page">
        <div className="done-icon">🎉</div>
        <div className="done-title">提出完了！</div>
        <div className="done-sub">
          {nickname} さんの回答を受け付けました。<br />
          お疲れ様でした！
        </div>
        <button className="btn btn-ghost mt-16" onClick={() => window.location.reload()}>
          トップに戻る
        </button>
      </div>
    );
  }

  return (
    <div className="answer-sheet-wrap">
      <div className="sheet-header">
        <div className="sheet-title">{task.title}</div>
        {task.description && <div className="sheet-desc">{task.description}</div>}
        <div style={{marginTop:6, fontSize:13, opacity:.7}}>
          生徒：{nickname}
        </div>
      </div>

      <div className="sheet-canvas-wrapper">
        {task.imageDataUrl ? (
          <div className="sheet-canvas">
            <img src={task.imageDataUrl} alt="問題プリント" draggable={false} />
            {fields.map(f => (
              <div key={f.id} style={{
                position: 'absolute',
                left:   f.x + '%',
                top:    f.y + '%',
                width:  f.width + '%',
                height: f.height + '%',
              }}>
                <input
                  className="answer-input"
                  type={f.type === 'number' ? 'number' : 'text'}
                  placeholder={f.label}
                  value={answers[f.id] || ''}
                  onChange={e => setAnswers(a => ({ ...a, [f.id]: e.target.value }))}
                  disabled={submitted}
                />
              </div>
            ))}
          </div>
        ) : (
          <div className="canvas-placeholder">
            <div className="big-icon">📄</div>
            <p>プリント画像が添付されていません</p>
          </div>
        )}
      </div>

      {/* Text-only fallback list */}
      {fields.length > 0 && (
        <div className="side-panel">
          <div className="side-panel-title">回答一覧（入力補助）</div>
          {fields.map((f, i) => (
            <div key={f.id} className="form-group" style={{marginBottom:10}}>
              <label className="form-label">{i+1}. {f.label}
                <span className={`type-pill ${f.type === 'number' ? 'type-number' : 'type-text'}`}
                  style={{marginLeft:6}}>
                  {f.type === 'number' ? '数値' : 'テキスト'}
                </span>
              </label>
              <input
                className="form-input"
                type={f.type === 'number' ? 'number' : 'text'}
                placeholder="回答を入力…"
                value={answers[f.id] || ''}
                onChange={e => setAnswers(a => ({ ...a, [f.id]: e.target.value }))}
                disabled={submitted}
              />
            </div>
          ))}
        </div>
      )}

      <div className="sheet-submit-bar">
        <div className="sheet-progress">
          <div className="progress-text">{filled} / {total} 問 入力済み</div>
          <div className="progress-bar-bg">
            <div className="progress-bar-fill" style={{width: pct + '%'}} />
          </div>
        </div>
        <button className="btn btn-primary btn-lg" onClick={handleSubmit}>
          提出する 📩
        </button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   TEACHER FLOW
══════════════════════════════════════════ */

/* Login */
function TeacherLogin({ onLogin }) {
  const [email, setEmail]   = useState('');
  const [pass,  setPass]    = useState('');
  const [err,   setErr]     = useState('');

  // Demo: any email/pass works
  const handle = () => {
    if (!email || !pass) { setErr('メールアドレスとパスワードを入力してください'); return; }
    onLogin({ email, uid: genId(), displayName: email.split('@')[0] });
  };

  return (
    <div className="main" style={{display:'flex', alignItems:'center', justifyContent:'center', minHeight:'calc(100vh - 58px)'}}>
      <div className="form-box">
        <div className="form-title">教師ログイン</div>
        <div className="form-group">
          <label className="form-label">メールアドレス</label>
          <input className="form-input" type="email" placeholder="teacher@example.com"
            value={email} onChange={e => setEmail(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handle()} />
        </div>
        <div className="form-group">
          <label className="form-label">パスワード</label>
          <input className="form-input" type="password" placeholder="••••••••"
            value={pass} onChange={e => setPass(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handle()} />
        </div>
        {err && <div style={{color:'var(--crimson)', fontSize:13, marginBottom:12}}>{err}</div>}
        <button className="btn btn-primary btn-full btn-lg" onClick={handle}>
          ログイン
        </button>
        <div className="text-muted text-center mt-16" style={{fontSize:12}}>
          ※ デモ版：任意のメールアドレス/パスワードでログインできます
        </div>
      </div>
    </div>
  );
}

/* Dashboard */
function TeacherDashboard({ teacher, onCreate, onReview, toast }) {
  const [tasks, setTasks] = useState([...DB.tasks]);

  const refresh = () => setTasks([...DB.tasks]);

  const togglePublish = (task) => {
    task.isPublished = !task.isPublished;
    refresh();
    toast.show(task.isPublished ? '課題を公開しました' : '課題を非公開にしました',
               task.isPublished ? 'success' : 'default');
  };

  const deleteTask = (task) => {
    if (!window.confirm(`「${task.title}」を削除しますか？`)) return;
    const idx = DB.tasks.indexOf(task);
    if (idx > -1) DB.tasks.splice(idx, 1);
    refresh();
    toast.show('課題を削除しました');
  };

  const copyCode = (code) => {
    navigator.clipboard?.writeText(code).catch(() => {});
    toast.show('コードをコピーしました ✓', 'success');
  };

  const subCount = (taskId) => DB.submissions.filter(s => s.taskId === taskId).length;

  return (
    <div className="main">
      <div className="stat-row">
        <div className="stat-box">
          <div className="stat-num">{DB.tasks.length}</div>
          <div className="stat-label">作成済み課題</div>
        </div>
        <div className="stat-box">
          <div className="stat-num">{DB.tasks.filter(t => t.isPublished).length}</div>
          <div className="stat-label">公開中</div>
        </div>
        <div className="stat-box">
          <div className="stat-num">{DB.submissions.length}</div>
          <div className="stat-label">提出件数</div>
        </div>
      </div>

      <div className="dashboard-header">
        <div className="dashboard-title">課題一覧</div>
        <button className="btn btn-primary" onClick={onCreate}>
          ＋ 新しい課題を作成
        </button>
      </div>

      {tasks.length === 0 ? (
        <div style={{textAlign:'center', padding:'60px 0', color:'var(--stone)'}}>
          <div style={{fontSize:48, marginBottom:12}}>📋</div>
          <div style={{fontSize:15}}>まだ課題がありません</div>
          <div style={{fontSize:13, marginTop:6}}>「新しい課題を作成」から始めましょう</div>
        </div>
      ) : (
        <div className="task-grid">
          {tasks.map(task => (
            <div key={task.id} className="task-card">
              <div className="task-card-top">
                <div className="task-card-title">{task.title}</div>
                <span className={`badge ${task.isPublished ? 'badge-published' : 'badge-draft'}`}>
                  {task.isPublished ? '公開中' : '非公開'}
                </span>
              </div>
              {task.description && (
                <div className="task-card-meta">{task.description}</div>
              )}
              <div>
                <div className="text-muted" style={{fontSize:11, marginBottom:4}}>アクセスコード</div>
                <div className="task-card-code" style={{cursor:'pointer'}} onClick={() => copyCode(task.accessCode)}>
                  {task.accessCode}
                  <span style={{fontSize:11, marginLeft:8, opacity:.6}}>📋</span>
                </div>
              </div>
              <div className="task-card-meta">
                回答欄 {(task.answerFields || []).length} 個　・　提出 {subCount(task.id)} 件
              </div>
              <div className="task-card-actions">
                <button className="btn btn-sm btn-secondary" onClick={() => togglePublish(task)}>
                  {task.isPublished ? '非公開にする' : '公開する'}
                </button>
                <button className="btn btn-sm btn-ghost" onClick={() => onReview(task)}>
                  回答確認
                </button>
                <button className="btn btn-sm btn-ghost" style={{color:'var(--crimson)'}} onClick={() => deleteTask(task)}>
                  削除
                </button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* Task Creator */
function TaskCreator({ teacher, onDone, toast }) {
  const [title, setTitle]   = useState('');
  const [desc,  setDesc]    = useState('');
  const [imgUrl, setImgUrl] = useState(null);
  const [fields, setFields] = useState([]);
  const [selField, setSelField] = useState(null);
  const [drawing, setDrawing]   = useState(null); // {x0,y0,x1,y1}
  const [mode, setMode]     = useState('text'); // default type for new fields
  const [step, setStep]     = useState(1); // 1=info, 2=upload, 3=place
  const [saving, setSaving] = useState(false);
  const [showLabelModal, setShowLabelModal] = useState(false);
  const [pendingField, setPendingField] = useState(null);
  const [labelInput, setLabelInput] = useState('');

  const canvasRef  = useRef(null);
  const fileRef    = useRef(null);
  const imgRef     = useRef(null);

  /* helpers */
  const getPct = (clientX, clientY) => {
    const rect = canvasRef.current.getBoundingClientRect();
    return {
      x: Math.max(0, Math.min(100, ((clientX - rect.left) / rect.width) * 100)),
      y: Math.max(0, Math.min(100, ((clientY - rect.top)  / rect.height) * 100)),
    };
  };

  /* Mouse / Touch events on canvas */
  const getClient = (e) => {
    if (e.touches && e.touches.length > 0) return { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY };
    return { clientX: e.clientX, clientY: e.clientY };
  };

  const onPointerDown = (e) => {
    if (!imgUrl) return;
    e.preventDefault();
    const { clientX, clientY } = getClient(e);
    const p = getPct(clientX, clientY);
    setDrawing({ x0: p.x, y0: p.y, x1: p.x, y1: p.y });
    setSelField(null);
  };

  const onPointerMove = (e) => {
    if (!drawing) return;
    e.preventDefault();
    const { clientX, clientY } = getClient(e);
    const p = getPct(clientX, clientY);
    setDrawing(d => ({ ...d, x1: p.x, y1: p.y }));
  };

  const onPointerUp = (e) => {
    if (!drawing) return;
    e.preventDefault();
    const x = Math.min(drawing.x0, drawing.x1);
    const y = Math.min(drawing.y0, drawing.y1);
    const w = Math.abs(drawing.x1 - drawing.x0);
    const h = Math.abs(drawing.y1 - drawing.y0);
    setDrawing(null);
    if (w < 1 || h < 1) return; // too small
    const newField = {
      id: genId(), type: mode,
      x, y, width: w, height: h,
      label: `問${fields.length + 1}`,
    };
    setPendingField(newField);
    setLabelInput(newField.label);
    setShowLabelModal(true);
  };

  const confirmLabel = () => {
    const f = { ...pendingField, label: labelInput || pendingField.label };
    setFields(fs => [...fs, f]);
    setSelField(f.id);
    setShowLabelModal(false);
    setPendingField(null);
  };

  const deleteField = (id) => {
    setFields(fs => fs.filter(f => f.id !== id));
    if (selField === id) setSelField(null);
  };

  /* File upload */
  const handleFile = (file) => {
    if (!file) return;
    if (!file.type.startsWith('image/') && file.type !== 'application/pdf') {
      toast.show('画像（PNG/JPG）またはPDFを選択してください', 'error'); return;
    }
    const reader = new FileReader();
    reader.onload = (ev) => {
      setImgUrl(ev.target.result);
      setStep(3);
    };
    reader.readAsDataURL(file);
  };

  const save = () => {
    if (!title.trim()) { toast.show('課題タイトルを入力してください', 'error'); return; }
    setSaving(true);
    setTimeout(() => {
      const task = {
        id: genId(),
        title: title.trim(),
        description: desc.trim(),
        imageDataUrl: imgUrl,
        accessCode: genCode(),
        createdBy: teacher.uid,
        createdAt: new Date().toISOString(),
        isPublished: false,
        answerFields: fields,
      };
      DB.tasks.push(task);
      setSaving(false);
      toast.show('課題を保存しました', 'success');
      onDone(task);
    }, 600);
  };

  /* drag-over */
  const onDragOver = (e) => { e.preventDefault(); };
  const onDrop = (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files?.[0];
    if (file) handleFile(file);
  };

  /* rect for drawing feedback */
  const drawRect = drawing ? {
    left:   Math.min(drawing.x0, drawing.x1) + '%',
    top:    Math.min(drawing.y0, drawing.y1) + '%',
    width:  Math.abs(drawing.x1 - drawing.x0) + '%',
    height: Math.abs(drawing.y1 - drawing.y0) + '%',
  } : null;

  return (
    <div className="main">
      {/* Step header */}
      <div className="flex-row" style={{marginBottom:20, gap:6, flexWrap:'wrap'}}>
        <button className="btn btn-ghost btn-sm" onClick={onDone}>← 戻る</button>
        <div style={{flex:1}} />
        {['課題情報','プリントアップロード','回答欄の配置'].map((s,i) => (
          <div key={i} style={{
            display:'flex', alignItems:'center', gap:4,
            opacity: step === i+1 ? 1 : .45,
            fontSize: 12, fontWeight: step === i+1 ? 700 : 400,
            color: step === i+1 ? 'var(--crimson)' : 'var(--stone)',
          }}>
            <div style={{
              width:20, height:20, borderRadius:'50%', display:'flex',
              alignItems:'center', justifyContent:'center', fontSize:11,
              background: step > i ? 'var(--crimson)' : step === i+1 ? 'var(--crimson)' : 'var(--paper-dk)',
              color: step >= i+1 ? 'white' : 'var(--stone)',
              fontWeight: 700,
            }}>{i+1}</div>
            <span className="hide-sm">{s}</span>
          </div>
        ))}
      </div>

      {/* Step 1: 課題情報 */}
      {step === 1 && (
        <div className="form-box" style={{maxWidth:560}}>
          <div className="form-title">① 課題情報を入力</div>
          <div className="form-group">
            <label className="form-label">課題タイトル <span style={{color:'var(--crimson)'}}>*</span></label>
            <input className="form-input" placeholder="例: 一次方程式 練習プリント①"
              value={title} onChange={e => setTitle(e.target.value)} />
          </div>
          <div className="form-group">
            <label className="form-label">説明（任意）</label>
            <textarea className="form-textarea" placeholder="例: 教科書 p.42〜43 の問題です"
              value={desc} onChange={e => setDesc(e.target.value)} />
          </div>
          <button className="btn btn-primary btn-full mt-8"
            disabled={!title.trim()}
            onClick={() => setStep(2)}>次へ →</button>
        </div>
      )}

      {/* Step 2: Upload */}
      {step === 2 && (
        <div className="form-box" style={{maxWidth:560}}>
          <div className="form-title">② プリントをアップロード</div>
          <div className="upload-zone"
            onDragOver={onDragOver} onDrop={onDrop}
            onClick={() => fileRef.current.click()}>
            <div className="big">📄</div>
            <p>クリックまたはドラッグ＆ドロップで<br />画像（PNG/JPG）またはPDFをアップロード</p>
            <input ref={fileRef} type="file" accept="image/*,application/pdf"
              style={{display:'none'}}
              onChange={e => handleFile(e.target.files?.[0])} />
          </div>
          <div className="divider" />
          <div style={{textAlign:'center'}}>
            <div className="text-muted" style={{marginBottom:12}}>または</div>
            <button className="btn btn-ghost btn-full"
              onClick={() => { setImgUrl(null); setStep(3); }}>
              画像なしで進む（テキスト入力のみ）
            </button>
          </div>
          <button className="btn btn-ghost btn-sm mt-16" onClick={() => setStep(1)}>← 戻る</button>
        </div>
      )}

      {/* Step 3: Place fields */}
      {step === 3 && (
        <div className="creator-layout">
          {/* Canvas */}
          <div className="canvas-wrapper">
            <div className="canvas-toolbar">
              <span style={{fontSize:12, fontWeight:700, color:'var(--stone)'}}>回答欄の種類：</span>
              <button className={`btn btn-sm ${mode === 'text' ? 'btn-primary' : 'btn-ghost'}`}
                onClick={() => setMode('text')}>📝 テキスト</button>
              <button className={`btn btn-sm ${mode === 'number' ? 'btn-primary' : 'btn-ghost'}`}
                onClick={() => setMode('number')}>🔢 数値</button>
              <div style={{flex:1}} />
              <span style={{fontSize:11, color:'var(--stone)'}}>
                {imgUrl ? 'ドラッグして回答欄を配置' : 'プリントなし'}
              </span>
            </div>
            <div
              className="canvas-area"
              ref={canvasRef}
              onMouseDown={onPointerDown}
              onMouseMove={onPointerMove}
              onMouseUp={onPointerUp}
              onTouchStart={onPointerDown}
              onTouchMove={onPointerMove}
              onTouchEnd={onPointerUp}
            >
              {imgUrl ? (
                <>
                  <img ref={imgRef} src={imgUrl} alt="プリント" draggable={false} />
                  {fields.map(f => (
                    <div key={f.id}
                      className={`field-overlay ${selField === f.id ? 'selected' : ''}`}
                      style={{
                        left: f.x+'%', top: f.y+'%',
                        width: f.width+'%', height: f.height+'%',
                      }}
                      onClick={e => { e.stopPropagation(); setSelField(f.id); }}
                    >
                      <div className="field-label-chip">{f.label}</div>
                      <span style={{fontSize:10, opacity:.6, pointerEvents:'none'}}>
                        {f.type === 'number' ? '🔢' : '📝'}
                      </span>
                    </div>
                  ))}
                  {drawRect && <div className="draw-rect" style={drawRect} />}
                </>
              ) : (
                <div className="canvas-placeholder">
                  <div className="big-icon">📋</div>
                  <p>プリット画像なしモード<br />右パネルで回答欄を手動追加できます</p>
                </div>
              )}
            </div>
          </div>

          {/* Side panel */}
          <div className="side-panel">
            <div className="side-panel-title">回答欄リスト</div>

            {fields.length === 0 ? (
              <div className="empty-hint">
                {imgUrl
                  ? 'プリント上をドラッグして\n回答欄を配置してください'
                  : '下のボタンで回答欄を追加できます'}
              </div>
            ) : (
              <div className="field-list">
                {fields.map((f, i) => (
                  <div key={f.id} className={`field-item ${selField === f.id ? 'selected' : ''}`}
                    onClick={() => setSelField(f.id)}>
                    <div className="field-item-num">{i+1}</div>
                    <div className="field-item-info">
                      <div className="field-item-name">{f.label}</div>
                      <div className="field-item-type">
                        <span className={`type-pill ${f.type === 'number' ? 'type-number' : 'type-text'}`}>
                          {f.type === 'number' ? '数値' : 'テキスト'}
                        </span>
                      </div>
                    </div>
                    <button className="btn btn-sm btn-ghost"
                      style={{padding:'4px 8px', color:'var(--crimson)'}}
                      onClick={e => { e.stopPropagation(); deleteField(f.id); }}>
                      ✕
                    </button>
                  </div>
                ))}
              </div>
            )}

            {/* Manual add (no-image mode) */}
            {!imgUrl && (
              <>
                <div className="divider" />
                <div className="form-group" style={{gap:4}}>
                  <label className="form-label">手動で回答欄を追加</label>
                  <select className="form-select" value={mode} onChange={e => setMode(e.target.value)}>
                    <option value="text">テキスト</option>
                    <option value="number">数値</option>
                  </select>
                </div>
                <button className="btn btn-secondary btn-full"
                  onClick={() => {
                    const f = {
                      id: genId(), type: mode,
                      x: 5, y: 5 + fields.length * 8,
                      width: 40, height: 6,
                      label: `問${fields.length + 1}`,
                    };
                    setFields(fs => [...fs, f]);
                    setSelField(f.id);
                  }}>
                  ＋ 回答欄を追加
                </button>
              </>
            )}

            <div className="divider" />

            <button className="btn btn-primary btn-full"
              disabled={saving}
              onClick={save}>
              {saving ? '保存中…' : '💾 課題を保存する'}
            </button>
            <button className="btn btn-ghost btn-full btn-sm" onClick={() => setStep(2)}>
              ← プリントを変更
            </button>
          </div>
        </div>
      )}

      {/* Label modal */}
      {showLabelModal && (
        <div className="modal-overlay" onClick={() => { setShowLabelModal(false); setDrawing(null); }}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-title">回答欄のラベルを設定</div>
            <div className="form-group">
              <label className="form-label">ラベル（例: 問1、(ア)など）</label>
              <input className="form-input" value={labelInput}
                onChange={e => setLabelInput(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && confirmLabel()}
                autoFocus />
            </div>
            <div className="form-group">
              <label className="form-label">種類</label>
              <select className="form-select"
                value={pendingField?.type || mode}
                onChange={e => setPendingField(f => ({ ...f, type: e.target.value }))}>
                <option value="text">テキスト（文字・式）</option>
                <option value="number">数値</option>
              </select>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={() => { setShowLabelModal(false); }}>キャンセル</button>
              <button className="btn btn-primary" onClick={confirmLabel}>決定</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* Submission Reviewer */
function SubmissionReviewer({ task, onBack }) {
  const subs = DB.submissions.filter(s => s.taskId === task.id);
  const fields = task.answerFields || [];

  return (
    <div className="main">
      <div className="review-header">
        <button className="btn btn-ghost btn-sm" onClick={onBack}>← 戻る</button>
        <div className="review-title">{task.title} — 回答一覧</div>
        <span className={`badge ${task.isPublished ? 'badge-published' : 'badge-draft'}`}>
          {task.isPublished ? '公開中' : '非公開'}
        </span>
      </div>

      {subs.length === 0 ? (
        <div style={{textAlign:'center', padding:'60px 0', color:'var(--stone)'}}>
          <div style={{fontSize:40, marginBottom:10}}>📭</div>
          まだ提出がありません
        </div>
      ) : (
        <div style={{overflowX:'auto'}}>
          <table className="sub-table">
            <thead>
              <tr>
                <th>ニックネーム</th>
                <th>提出日時</th>
                {fields.map(f => <th key={f.id}>{f.label}</th>)}
              </tr>
            </thead>
            <tbody>
              {subs.map(sub => (
                <tr key={sub.id}>
                  <td><strong>{sub.nickname}</strong></td>
                  <td className="mono" style={{fontSize:12}}>{sub.submittedAt.slice(0,19).replace('T',' ')}</td>
                  {fields.map(f => (
                    <td key={f.id}>
                      {sub.answers[f.id]
                        ? <span className="answer-chip">{sub.answers[f.id]}</span>
                        : <span style={{color:'var(--stone-lt)',fontSize:12}}>未回答</span>
                      }
                    </td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════ */
function App() {
  const toast = useToast();
  const [role, setRole]       = useState(null);      // null | 'teacher' | 'student'
  const [teacher, setTeacher] = useState(null);
  const [view, setView]       = useState('dashboard'); // dashboard | create | review
  const [reviewTask, setReviewTask] = useState(null);

  /* Student */
  const [studentTask, setStudentTask] = useState(null);
  const [studentNick, setStudentNick] = useState('');

  const goHome = () => { setRole(null); setStudentTask(null); };

  /* seed demo data */
  useEffect(() => {
    if (DB.tasks.length > 0) return;
    const demo = {
      id: genId(),
      title: '一次方程式 練習プリント①',
      description: '教科書 p.42 の問題です。途中式も書いてください。',
      imageDataUrl: null,
      accessCode: 'DEMO01',
      createdBy: 'demo',
      createdAt: new Date().toISOString(),
      isPublished: true,
      answerFields: [
        { id: genId(), type: 'number', x: 5, y: 5, width: 35, height: 8, label: '問1' },
        { id: genId(), type: 'text',   x: 5, y: 18, width: 50, height: 8, label: '問2' },
        { id: genId(), type: 'number', x: 5, y: 31, width: 35, height: 8, label: '問3' },
      ],
    };
    DB.tasks.push(demo);
  }, []);

  const renderTeacher = () => {
    if (!teacher) return <TeacherLogin onLogin={u => { setTeacher(u); setView('dashboard'); }} />;
    if (view === 'create') return (
      <TaskCreator teacher={teacher} toast={toast}
        onDone={() => setView('dashboard')} />
    );
    if (view === 'review' && reviewTask) return (
      <SubmissionReviewer task={reviewTask} onBack={() => setView('dashboard')} />
    );
    return (
      <TeacherDashboard teacher={teacher} toast={toast}
        onCreate={() => setView('create')}
        onReview={t => { setReviewTask(t); setView('review'); }} />
    );
  };

  const renderStudent = () => {
    if (studentTask) return (
      <div className="main">
        <AnswerSheet task={studentTask} nickname={studentNick} onSubmit={() => {}} />
      </div>
    );
    return (
      <StudentCodeEntry toast={toast}
        onEnter={(task, nick) => { setStudentTask(task); setStudentNick(nick); }} />
    );
  };

  /* Landing */
  if (!role) return (
    <div className="app">
      <Header role={null} onRoleChange={setRole} onHome={goHome} />
      <div className="landing">
        <Kamon size={88} />
        <div className="landing-title">紅月計算塾</div>
        <div className="landing-subtitle">
          学習支援ボランティアのための<br />
          デジタル課題プラットフォーム
        </div>
        <div className="landing-cards">
          <div className="landing-card" onClick={() => setRole('teacher')}>
            <div className="card-icon teacher">📚</div>
            <div className="card-label">教える側</div>
            <div className="card-desc">問題プリントをアップロードし、回答欄を配置して課題を作成・管理します。</div>
            <div className="card-cta">ログインして始める →</div>
          </div>
          <div className="landing-card" onClick={() => setRole('student')}>
            <div className="card-icon student">✏️</div>
            <div className="card-label">生徒</div>
            <div className="card-desc">課題コードを入力して、プリントに回答し提出します。スマホ・PCどちらでも。</div>
            <div className="card-cta">課題を開く →</div>
          </div>
        </div>
        <div style={{fontSize:12, color:'var(--stone-lt)', marginTop:8}}>
          デモコード: <strong style={{fontFamily:'monospace', color:'var(--crimson)'}}>DEMO01</strong> で体験できます
        </div>
      </div>
      <Toasts toasts={toast.toasts} />
    </div>
  );

  return (
    <div className="app">
      <Header role={role}
        onRoleChange={r => { setRole(r); setStudentTask(null); setTeacher(null); setView('dashboard'); }}
        onHome={goHome} />
      {role === 'teacher' ? renderTeacher() : renderStudent()}
      <Toasts toasts={toast.toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
